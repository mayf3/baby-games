<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>时间小管家 - Time Keeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 天空动画 */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            transition: background 1s ease;
        }

        .sky.day {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }

        .sky.night {
            background: linear-gradient(180deg, #1a1a3e 0%, #2d2d5a 100%);
        }

        .sky.sunset {
            background: linear-gradient(180deg, #ff7e5f 0%, #feb47b 100%);
        }

        /* 太阳和月亮 */
        .celestial-body {
            position: absolute;
            font-size: 80px;
            transition: all 1s ease;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
        }

        .sun {
            top: 50px;
            right: 80px;
            animation: pulse 3s ease-in-out infinite;
        }

        .moon {
            top: 50px;
            right: 80px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 255, 200, 0.8)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 255, 200, 1)); }
        }

        /* 星星 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .stars.visible {
            opacity: 1;
        }

        .star {
            position: absolute;
            color: #FFD700;
            font-size: 20px;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 顶部信息栏 */
        .header {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .game-title {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .level-info {
            font-size: 20px;
            color: #34495e;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .score {
            font-size: 18px;
            color: #e74c3c;
            margin-top: 10px;
            font-weight: bold;
        }

        /* 游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* 关卡1: 早晚判断 */
        .time-question {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-btn {
            font-size: 24px;
            padding: 20px 40px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            font-weight: bold;
            min-width: 150px;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .option-btn:active {
            transform: translateY(0);
        }

        .btn-day {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #2c3e50;
        }

        .btn-night {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-morning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-noon {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #2c3e50;
        }

        .btn-evening {
            background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
            color: white;
        }

        /* 关卡2: 活动时间配对 */
        .activity-display {
            font-size: 100px;
            margin-bottom: 30px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .activity-name {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 15px;
        }

        /* 关卡3: 认识钟表 */
        .clock-container {
            background: white;
            border-radius: 50%;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .clock {
            width: 200px;
            height: 200px;
            border: 8px solid #2c3e50;
            border-radius: 50%;
            position: relative;
            background: white;
        }

        .clock-center {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
        }

        .hour-hand {
            width: 6px;
            height: 50px;
            background: #2c3e50;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 70px;
            background: #34495e;
            margin-left: -2px;
        }

        .clock-number {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* 反馈动画 */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            z-index: 1000;
            animation: feedbackPop 0.8s ease forwards;
            pointer-events: none;
        }

        @keyframes feedbackPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 星星飞舞 */
        .star-particle {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 999;
            animation: starFly 1s ease-out forwards;
        }

        @keyframes starFly {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) rotate(360deg);
            }
        }

        /* 完成界面 */
        .complete-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .complete-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .complete-title {
            font-size: 36px;
            color: #f39c12;
            margin-bottom: 20px;
        }

        .complete-stats {
            font-size: 24px;
            color: #2c3e50;
            margin: 20px 0;
        }

        .restart-btn {
            font-size: 24px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .game-title {
                font-size: 22px;
            }

            .level-info {
                font-size: 16px;
                padding: 6px 15px;
            }

            .time-question {
                font-size: 24px;
                padding: 15px 25px;
            }

            .option-btn {
                font-size: 20px;
                padding: 15px 30px;
                min-width: 120px;
            }

            .activity-display {
                font-size: 80px;
            }

            .activity-name {
                font-size: 22px;
                padding: 12px 20px;
            }

            .clock {
                width: 160px;
                height: 160px;
            }

            .hour-hand {
                height: 40px;
            }

            .minute-hand {
                height: 55px;
            }
        }

        /* 鼓励提示 */
        .encouragement {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 18px;
            color: #2c3e50;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            animation: floatUp 0.5s ease;
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 天空背景 -->
        <div class="sky day" id="sky">
            <div class="celestial-body sun" id="celestial">☀️</div>
            <div class="stars" id="stars"></div>
        </div>

        <!-- 顶部信息 -->
        <div class="header">
            <h1 class="game-title">⏰ 时间小管家</h1>
            <div class="level-info">
                <span id="levelText">关卡 1/3：早晚判断</span>
            </div>
            <div class="score">
                ⭐ <span id="score">0</span> 分
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area" id="gameArea">
            <!-- 动态生成游戏内容 -->
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            level: 1,
            score: 0,
            questionIndex: 0,
            questionsPerLevel: 5,
            correctAnswers: 0
        };

        // 关卡1题目：早晚判断
        const level1Questions = [
            { time: 'day', emoji: '☀️', question: '太阳出来了，现在是？', answer: '白天' },
            { time: 'night', emoji: '🌙', question: '月亮出来了，现在是？', answer: '黑夜' },
            { time: 'day', emoji: '🌤️', question: '天空很亮，可以出去玩啦！现在是？', answer: '白天' },
            { time: 'night', emoji: '⭐', question: '星星在眨眼睛，现在是？', answer: '黑夜' },
            { time: 'day', emoji: '🌈', question: '彩虹出来啦！现在是？', answer: '白天' }
        ];

        // 关卡2题目：活动时间配对
        const level2Questions = [
            { activity: '🌅', name: '起床刷牙', question: '起床刷牙是什么时候？', answer: '早上' },
            { activity: '🍚', name: '吃午餐', question: '吃午餐是什么时候？', answer: '中午' },
            { activity: '😴', name: '午睡时间', question: '午睡是什么时候？', answer: '中午' },
            { activity: '🌙', name: '睡觉觉', question: '睡觉觉是什么时候？', answer: '晚上' },
            { activity: '📚', name: '放学回家', question: '放学回家是什么时候？', answer: '下午' }
        ];

        // 关卡3题目：认识钟表（整点）
        const level3Questions = [
            { hour: 7, timeStr: '7:00', question: '几点了？（早上起床！）', answer: '7点' },
            { hour: 12, timeStr: '12:00', question: '几点了？（吃午餐啦！）', answer: '12点' },
            { hour: 3, timeStr: '15:00', question: '几点了？（下午3点，吃点心）', answer: '3点' },
            { hour: 6, timeStr: '18:00', question: '几点了？（晚餐时间！）', answer: '6点' },
            { hour: 8, timeStr: '20:00', question: '几点了？（该睡觉啦！）', answer: '8点' }
        ];

        // 初始化星星
        function initStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 切换白天黑夜
        function setDayNight(isDay) {
            const sky = document.getElementById('sky');
            const celestial = document.getElementById('celestial');
            const stars = document.getElementById('stars');

            if (isDay) {
                sky.className = 'sky day';
                celestial.textContent = '☀️';
                celestial.className = 'celestial-body sun';
                stars.classList.remove('visible');
            } else {
                sky.className = 'sky night';
                celestial.textContent = '🌙';
                celestial.className = 'celestial-body moon';
                stars.classList.add('visible');
            }
        }

        // 显示关卡1：早晚判断
        function showLevel1() {
            const question = level1Questions[gameState.questionIndex];
            const gameArea = document.getElementById('gameArea');

            // 切换背景
            setDayNight(question.time === 'day');

            gameArea.innerHTML = `
                <div class="time-question">${question.emoji}<br>${question.question}</div>
                <div class="options">
                    <button class="option-btn btn-day" onclick="checkAnswer('白天')">🌞 白天</button>
                    <button class="option-btn btn-night" onclick="checkAnswer('黑夜')">🌙 黑夜</button>
                </div>
            `;

            document.getElementById('levelText').textContent = '关卡 1/3：早晚判断';
        }

        // 显示关卡2：活动时间配对
        function showLevel2() {
            const question = level2Questions[gameState.questionIndex];
            const gameArea = document.getElementById('gameArea');

            setDayNight(true);

            gameArea.innerHTML = `
                <div class="activity-display">${question.activity}</div>
                <div class="activity-name">${question.name}</div>
                <div class="time-question">${question.question}</div>
                <div class="options">
                    <button class="option-btn btn-morning" onclick="checkAnswer('早上')">🌅 早上</button>
                    <button class="option-btn btn-noon" onclick="checkAnswer('中午')">☀️ 中午</button>
                    <button class="option-btn btn-evening" onclick="checkAnswer('晚上')">🌙 晚上</button>
                </div>
            `;

            document.getElementById('levelText').textContent = '关卡 2/3：活动时间配对';
        }

        // 显示关卡3：认识钟表
        function showLevel3() {
            const question = level3Questions[gameState.questionIndex];
            const gameArea = document.getElementById('gameArea');

            setDayNight(true);

            const hourAngle = (question.hour % 12) * 30;
            const minuteAngle = 0;

            // 生成钟表数字
            let clockNumbers = '';
            for (let i = 1; i <= 12; i++) {
                const angle = (i - 3) * 30 * (Math.PI / 180);
                const x = 80 * Math.cos(angle);
                const y = 80 * Math.sin(angle);
                clockNumbers += `<div class="clock-number" style="left: calc(50% + ${x}px - 10px); top: calc(50% + ${y}px - 12px);">${i}</div>`;
            }

            gameArea.innerHTML = `
                <div class="time-question">${question.question}</div>
                <div class="clock-container">
                    <div class="clock">
                        ${clockNumbers}
                        <div class="clock-hand hour-hand" style="transform: rotate(${hourAngle}deg);"></div>
                        <div class="clock-hand minute-hand" style="transform: rotate(${minuteAngle}deg);"></div>
                        <div class="clock-center"></div>
                    </div>
                </div>
                <div class="options">
                    <button class="option-btn btn-day" onclick="checkAnswer('6点')">6点</button>
                    <button class="option-btn btn-day" onclick="checkAnswer('7点')">7点</button>
                    <button class="option-btn btn-noon" onclick="checkAnswer('12点')">12点</button>
                    <button class="option-btn btn-day" onclick="checkAnswer('3点')">3点</button>
                    <button class="option-btn btn-evening" onclick="checkAnswer('8点')">8点</button>
                </div>
            `;

            document.getElementById('levelText').textContent = '关卡 3/3：认识钟表';
        }

        // 检查答案
        function checkAnswer(userAnswer) {
            let correctAnswer;
            let isCorrect = false;

            if (gameState.level === 1) {
                correctAnswer = level1Questions[gameState.questionIndex].answer;
                isCorrect = userAnswer === correctAnswer;
            } else if (gameState.level === 2) {
                correctAnswer = level2Questions[gameState.questionIndex].answer;
                isCorrect = userAnswer === correctAnswer;
            } else if (gameState.level === 3) {
                correctAnswer = level3Questions[gameState.questionIndex].answer;
                isCorrect = userAnswer === correctAnswer;
            }

            if (isCorrect) {
                // 正确！
                gameState.score += 10;
                gameState.correctAnswers++;
                document.getElementById('score').textContent = gameState.score;

                showFeedback('✨');
                createStarParticles();

                setTimeout(() => {
                    nextQuestion();
                }, 1000);
            } else {
                // 错误，鼓励
                showEncouragement('加油，再试试！');
                shakeScreen();
            }
        }

        // 显示反馈
        function showFeedback(emoji) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = emoji;
            document.body.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 800);
        }

        // 创建星星粒子
        function createStarParticles() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'star-particle';
                    star.textContent = '⭐';
                    star.style.left = Math.random() * window.innerWidth + 'px';
                    star.style.top = Math.random() * window.innerHeight + 'px';
                    document.body.appendChild(star);

                    setTimeout(() => {
                        star.remove();
                    }, 1000);
                }, i * 50);
            }
        }

        // 显示鼓励
        function showEncouragement(text) {
            const existing = document.querySelector('.encouragement');
            if (existing) existing.remove();

            const encouragement = document.createElement('div');
            encouragement.className = 'encouragement';
            encouragement.textContent = text;
            document.body.appendChild(encouragement);

            setTimeout(() => {
                encouragement.remove();
            }, 2000);
        }

        // 屏幕震动
        function shakeScreen() {
            const gameArea = document.getElementById('gameArea');
            gameArea.style.animation = 'none';
            gameArea.offsetHeight; // 触发重绘
            gameArea.style.animation = 'shake 0.5s ease';
        }

        // 添加震动动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // 下一题
        function nextQuestion() {
            gameState.questionIndex++;

            if (gameState.questionIndex >= gameState.questionsPerLevel) {
                // 当前关卡完成
                if (gameState.level < 3) {
                    // 进入下一关
                    gameState.level++;
                    gameState.questionIndex = 0;
                    showCurrentLevel();
                } else {
                    // 全部完成
                    showCompleteScreen();
                }
            } else {
                // 继续当前关卡
                showCurrentLevel();
            }
        }

        // 显示当前关卡
        function showCurrentLevel() {
            if (gameState.level === 1) {
                showLevel1();
            } else if (gameState.level === 2) {
                showLevel2();
            } else if (gameState.level === 3) {
                showLevel3();
            }
        }

        // 显示完成界面
        function showCompleteScreen() {
            const completeScreen = document.createElement('div');
            completeScreen.className = 'complete-screen';

            const accuracy = Math.round((gameState.correctAnswers / (gameState.questionsPerLevel * 3)) * 100);
            const stars = accuracy >= 80 ? '⭐⭐⭐' : accuracy >= 60 ? '⭐⭐' : '⭐';

            completeScreen.innerHTML = `
                <div class="complete-content">
                    <div class="complete-title">🎉 太棒了！</div>
                    <div class="complete-stats">
                        总分：${gameState.score} 分<br>
                        正确率：${accuracy}%<br>
                        ${stars}
                    </div>
                    <button class="restart-btn" onclick="restartGame()">再玩一次 🔄</button>
                </div>
            `;

            document.body.appendChild(completeScreen);
            createStarParticles();
        }

        // 重新开始
        function restartGame() {
            const completeScreen = document.querySelector('.complete-screen');
            if (completeScreen) {
                completeScreen.remove();
            }

            gameState.level = 1;
            gameState.score = 0;
            gameState.questionIndex = 0;
            gameState.correctAnswers = 0;

            document.getElementById('score').textContent = '0';
            showLevel1();
        }

        // 初始化游戏
        function init() {
            initStars();
            showLevel1();
        }

        // 启动
        init();
    </script>
</body>
</html>
