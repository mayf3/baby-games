<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>接水果 - 宝宝游戏乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            background: #87CEEB;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* 开始界面 */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 80%, #228B22 100%);
        }

        .overlay.hidden { display: none; }

        .overlay h1 {
            font-size: 52px;
            color: #FF6B35;
            text-shadow: 3px 3px 0 #fff, -1px -1px 0 #fff;
            margin-bottom: 10px;
        }

        .overlay .subtitle {
            font-size: 22px;
            color: #2E8B57;
            margin-bottom: 30px;
        }

        .title-emoji {
            font-size: 80px;
            margin-bottom: 15px;
            animation: bounce 1s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .difficulty-select {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .diff-btn {
            padding: 15px 28px;
            border: 4px solid rgba(255,255,255,0.8);
            border-radius: 25px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .diff-btn:hover, .diff-btn:active {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .diff-easy { background: #4CAF50; }
        .diff-medium { background: #FF9800; }
        .diff-hard { background: #F44336; }

        .start-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            border: 4px solid white;
            border-radius: 30px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.2s;
            font-family: inherit;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-btn:hover, .start-btn:active {
            transform: scale(1.1);
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .hud-score { color: #FF6B35; }
        .hud-timer { color: #2196F3; }
        .hud-combo { color: #9C27B0; }

        /* 结束界面 */
        .end-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0,0,0,0.5);
        }

        .end-overlay.hidden { display: none; }

        .end-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .end-card .end-emoji { font-size: 80px; margin-bottom: 10px; }
        .end-card h2 { font-size: 32px; color: #FF6B35; margin-bottom: 15px; }
        .end-card .end-score { font-size: 48px; color: #FFD700; font-weight: bold; margin: 10px 0; }
        
        .end-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .end-stat {
            text-align: center;
        }

        .end-stat .val {
            font-size: 28px;
            font-weight: bold;
            color: #FF6B35;
        }

        .end-stat .label {
            font-size: 14px;
            color: #999;
        }

        .end-card .again-btn {
            margin-top: 20px;
            padding: 15px 50px;
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            border: none;
            border-radius: 25px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
            transition: all 0.2s;
        }

        .end-card .again-btn:hover {
            transform: scale(1.05);
        }

        .end-card .home-btn {
            margin-top: 12px;
            padding: 10px 40px;
            background: #e0e0e0;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            color: #666;
            cursor: pointer;
            font-family: inherit;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* 星星飞舞 */
        .flying-star {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 200;
            animation: flyStar 0.8s ease-out forwards;
        }

        @keyframes flyStar {
            0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(360deg); }
        }

        /* 浮动文字 */
        .float-text {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            z-index: 200;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 1px 1px 0 white;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .overlay h1 { font-size: 36px; }
            .title-emoji { font-size: 60px; }
            .diff-btn { padding: 12px 20px; font-size: 18px; }
            .start-btn { padding: 15px 40px; font-size: 26px; }
            .hud-item { font-size: 18px; padding: 6px 14px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud" id="hud" style="display:none;">
        <div class="hud-item hud-score">🍎 <span id="score">0</span></div>
        <div class="hud-item hud-combo" id="comboDisplay" style="display:none;">🔥 <span id="combo">0</span>连击</div>
        <div class="hud-item hud-timer">⏱ <span id="timer">60</span></div>
    </div>

    <!-- 开始界面 -->
    <div class="overlay" id="startScreen">
        <div class="title-emoji">🧺🍎🍊🍋🍇</div>
        <h1>接水果</h1>
        <p class="subtitle">移动篮子，接住掉下来的水果吧！</p>
        <div class="difficulty-select">
            <button class="diff-btn diff-easy" onclick="startGame('easy')">🌱 简单</button>
            <button class="diff-btn diff-medium" onclick="startGame('medium')">🌟 中等</button>
            <button class="diff-btn diff-hard" onclick="startGame('hard')">🔥 挑战</button>
        </div>
        <button class="start-btn" onclick="startGame('easy')">开始游戏 🎮</button>
    </div>

    <!-- 结束界面 -->
    <div class="end-overlay hidden" id="endScreen">
        <div class="end-card">
            <div class="end-emoji">🎉</div>
            <h2>太棒了！</h2>
            <div class="end-score">⭐ <span id="endScore">0</span> 分</div>
            <div class="end-stats">
                <div class="end-stat">
                    <div class="val" id="endFruits">0</div>
                    <div class="label">接住水果</div>
                </div>
                <div class="end-stat">
                    <div class="val" id="endMissed">0</div>
                    <div class="label">漏掉水果</div>
                </div>
                <div class="end-stat">
                    <div class="val" id="endCombo">0</div>
                    <div class="label">最高连击</div>
                </div>
            </div>
            <button class="again-btn" onclick="restartGame()">再来一次 🔄</button>
            <button class="home-btn" onclick="goHome()">返回大厅 🏠</button>
        </div>
    </div>

    <script>
    // ====== 全局变量 ======
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let W, H, scale;
    let gameState = 'menu'; // menu, playing, ended
    let score = 0;
    let timeLeft = 60;
    let combo = 0;
    let maxCombo = 0;
    let totalCaught = 0;
    let totalMissed = 0;
    let difficulty = 'easy';
    let animFrame;
    let lastTime = 0;
    let spawnTimer = 0;
    let timerInterval;

    // 游戏对象
    let basket = { x: 0, y: 0, width: 100, height: 70 };
    let fruits = [];
    let particles = [];
    let clouds = [];
    let bgTrees = [];

    // 水果定义
    const FRUIT_TYPES = [
        { emoji: '🍎', name: '苹果', points: 1, color: '#FF4444' },
        { emoji: '🍊', name: '橙子', points: 1, color: '#FF8C00' },
        { emoji: '🍋', name: '柠檬', points: 1, color: '#FFD700' },
        { emoji: '🍇', name: '葡萄', points: 2, color: '#8B008B' },
        { emoji: '🍓', name: '草莓', points: 2, color: '#FF1493' },
        { emoji: '🍑', name: '桃子', points: 2, color: '#FFB6C1' },
        { emoji: '🍌', name: '香蕉', points: 1, color: '#FFE135' },
        { emoji: '🍉', name: '西瓜', points: 3, color: '#FF6666' },
        { emoji: '⭐', name: '星星', points: 5, color: '#FFD700', special: true },
    ];

    // 特殊物品（炸弹/坏水果）
    const BAD_ITEMS = [
        { emoji: '💣', name: '炸弹', color: '#333' },
        { emoji: '🐛', name: '虫子', color: '#654321' },
    ];

    // 难度配置
    const DIFFICULTY_CONFIG = {
        easy: { 
            fallSpeed: 1.5, spawnInterval: 1200, badChance: 0, 
            time: 60, basketWidth: 130, fruitSize: 50 
        },
        medium: { 
            fallSpeed: 2.5, spawnInterval: 900, badChance: 0.1, 
            time: 60, basketWidth: 110, fruitSize: 44 
        },
        hard: { 
            fallSpeed: 3.5, spawnInterval: 700, badChance: 0.18, 
            time: 60, basketWidth: 95, fruitSize: 40 
        }
    };

    // ====== 音效系统 ======
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            switch(type) {
                case 'catch':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(784, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'special':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1047, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                    // Second note
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(784, audioCtx.currentTime + 0.1);
                    osc2.frequency.exponentialRampToValueAtTime(1318, audioCtx.currentTime + 0.25);
                    gain2.gain.setValueAtTime(0.3, audioCtx.currentTime + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc2.start(audioCtx.currentTime + 0.1);
                    osc2.stop(audioCtx.currentTime + 0.4);
                    break;
                case 'bad':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'miss':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                    break;
                case 'combo':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(659, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(988, audioCtx.currentTime + 0.16);
                    gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.35);
                    break;
                case 'end':
                    [523, 587, 659, 784, 659, 784, 1047].forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.12);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.2);
                        o.start(audioCtx.currentTime + i * 0.12);
                        o.stop(audioCtx.currentTime + i * 0.12 + 0.2);
                    });
                    break;
            }
        } catch(e) {}
    }

    // ====== 尺寸初始化 ======
    function resize() {
        const dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        
        // 更新篮子位置
        basket.y = H - 90;
        basket.width = DIFFICULTY_CONFIG[difficulty].basketWidth;
        if (basket.x === 0) basket.x = W / 2;
        
        // 重新生成背景
        generateBackground();
    }

    function generateBackground() {
        clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * W,
                y: 30 + Math.random() * (H * 0.3),
                size: 40 + Math.random() * 60,
                speed: 0.2 + Math.random() * 0.3
            });
        }
        bgTrees = [];
        const treeCount = Math.floor(W / 120);
        for (let i = 0; i < treeCount; i++) {
            bgTrees.push({
                x: 30 + i * (W / treeCount) + Math.random() * 40,
                height: 60 + Math.random() * 50,
                width: 30 + Math.random() * 25
            });
        }
    }

    // ====== 渲染 ======
    function drawBackground() {
        // 天空渐变
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.75);
        skyGrad.addColorStop(0, '#4FC3F7');
        skyGrad.addColorStop(0.5, '#81D4FA');
        skyGrad.addColorStop(1, '#B3E5FC');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H * 0.75);

        // 草地
        const grassGrad = ctx.createLinearGradient(0, H * 0.72, 0, H);
        grassGrad.addColorStop(0, '#66BB6A');
        grassGrad.addColorStop(0.3, '#4CAF50');
        grassGrad.addColorStop(1, '#388E3C');
        ctx.fillStyle = grassGrad;
        ctx.beginPath();
        ctx.moveTo(0, H * 0.75);
        // 草地曲线
        for (let x = 0; x <= W; x += 50) {
            ctx.quadraticCurveTo(x + 25, H * 0.75 - 8 + Math.sin(x * 0.02) * 10, x + 50, H * 0.75);
        }
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fill();

        // 小花点缀
        const flowerColors = ['#FF6B6B', '#FFD93D', '#FF8ED4', '#FF9F43', '#FFF'];
        for (let i = 0; i < 12; i++) {
            const fx = 30 + (i * 73) % W;
            const fy = H * 0.77 + (i * 31) % 40;
            ctx.font = '14px Arial';
            ctx.fillText('🌸', fx, fy);
        }

        // 云朵
        clouds.forEach(c => {
            c.x += c.speed;
            if (c.x > W + 80) c.x = -80;
            drawCloud(c.x, c.y, c.size);
        });

        // 背景树木
        bgTrees.forEach(t => {
            drawTree(t.x, H * 0.75, t.height, t.width);
        });
    }

    function drawCloud(x, y, size) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.beginPath();
        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
        ctx.arc(x + size * 0.35, y - size * 0.15, size * 0.4, 0, Math.PI * 2);
        ctx.arc(x - size * 0.35, y - size * 0.1, size * 0.35, 0, Math.PI * 2);
        ctx.arc(x + size * 0.15, y - size * 0.3, size * 0.3, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawTree(x, groundY, height, width) {
        // 树干
        ctx.fillStyle = '#795548';
        ctx.fillRect(x - width * 0.15, groundY - height * 0.4, width * 0.3, height * 0.4);
        
        // 树冠（圆形）
        ctx.fillStyle = '#43A047';
        ctx.beginPath();
        ctx.arc(x, groundY - height * 0.55, width * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#66BB6A';
        ctx.beginPath();
        ctx.arc(x - width * 0.15, groundY - height * 0.65, width * 0.45, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawBasket() {
        const bx = basket.x;
        const by = basket.y;
        const bw = basket.width;
        const bh = basket.height;

        // 篮子阴影
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath();
        ctx.ellipse(bx, by + bh - 5, bw * 0.55, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        // 篮子主体 - 梯形
        ctx.fillStyle = '#D2691E';
        ctx.beginPath();
        ctx.moveTo(bx - bw * 0.4, by);
        ctx.lineTo(bx - bw * 0.5, by + bh * 0.8);
        ctx.quadraticCurveTo(bx, by + bh + 5, bx + bw * 0.5, by + bh * 0.8);
        ctx.lineTo(bx + bw * 0.4, by);
        ctx.closePath();
        ctx.fill();

        // 篮子深色条纹
        ctx.strokeStyle = '#A0522D';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
            const yy = by + 15 + i * (bh * 0.2);
            const shrink = (yy - by) / bh * 0.1;
            ctx.beginPath();
            ctx.moveTo(bx - bw * (0.4 - shrink), yy);
            ctx.lineTo(bx + bw * (0.4 - shrink), yy);
            ctx.stroke();
        }

        // 篮子口
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(bx - bw * 0.45, by + 3);
        ctx.lineTo(bx + bw * 0.45, by + 3);
        ctx.stroke();

        // 篮子把手
        ctx.strokeStyle = '#A0522D';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(bx, by - bh * 0.2, bw * 0.25, Math.PI * 1.15, Math.PI * 1.85);
        ctx.stroke();
    }

    function drawFruit(fruit) {
        ctx.font = `${fruit.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // 水果阴影
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath();
        ctx.ellipse(fruit.x, fruit.y + fruit.size * 0.4, fruit.size * 0.3, fruit.size * 0.1, 0, 0, Math.PI * 2);
        ctx.fill();

        // 水果本体（带轻微旋转和弹跳）
        ctx.save();
        ctx.translate(fruit.x, fruit.y);
        ctx.rotate(fruit.rotation);
        const bounce = Math.sin(fruit.time * 3) * 2;
        ctx.fillText(fruit.emoji, 0, bounce);
        ctx.restore();

        // 特殊物品发光
        if (fruit.special) {
            ctx.save();
            ctx.globalAlpha = 0.3 + Math.sin(fruit.time * 5) * 0.2;
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(fruit.x, fruit.y, fruit.size * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function drawParticle(p) {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.font = `${p.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(p.emoji, p.x, p.y);
        ctx.restore();
    }

    // ====== 游戏逻辑 ======
    function spawnFruit() {
        const config = DIFFICULTY_CONFIG[difficulty];
        const isBad = Math.random() < config.badChance;
        
        let fruit;
        if (isBad) {
            const bad = BAD_ITEMS[Math.floor(Math.random() * BAD_ITEMS.length)];
            fruit = {
                x: 40 + Math.random() * (W - 80),
                y: -40,
                emoji: bad.emoji,
                name: bad.name,
                color: bad.color,
                size: config.fruitSize,
                speed: config.fallSpeed * (0.8 + Math.random() * 0.4),
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.05,
                time: 0,
                bad: true,
                special: false
            };
        } else {
            // 星星概率 5%
            const isSpecial = Math.random() < 0.05;
            const type = isSpecial 
                ? FRUIT_TYPES[FRUIT_TYPES.length - 1] 
                : FRUIT_TYPES[Math.floor(Math.random() * (FRUIT_TYPES.length - 1))];
            fruit = {
                x: 40 + Math.random() * (W - 80),
                y: -40,
                emoji: type.emoji,
                name: type.name,
                color: type.color,
                points: type.points,
                size: config.fruitSize,
                speed: config.fallSpeed * (0.8 + Math.random() * 0.4),
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.05,
                time: 0,
                bad: false,
                special: type.special || false
            };
        }
        
        fruits.push(fruit);
    }

    function updateFruits(dt) {
        for (let i = fruits.length - 1; i >= 0; i--) {
            const f = fruits[i];
            f.y += f.speed * dt * 60;
            f.rotation += f.rotSpeed;
            f.time += dt;

            // 检查是否被接住
            if (f.y + f.size * 0.3 >= basket.y && 
                f.y - f.size * 0.3 <= basket.y + basket.height * 0.5 &&
                f.x >= basket.x - basket.width * 0.5 && 
                f.x <= basket.x + basket.width * 0.5) {
                
                if (f.bad) {
                    // 接到坏物品
                    combo = 0;
                    updateComboDisplay();
                    score = Math.max(0, score - 3);
                    updateScoreDisplay();
                    playSound('bad');
                    spawnFloatText(f.x, f.y, '-3', '#FF4444');
                    spawnParticles(f.x, f.y, ['💥', '💨'], 5);
                    // 篮子抖动
                    basket.shakeTime = 0.3;
                } else {
                    // 接到水果
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    totalCaught++;
                    
                    let pts = f.points;
                    if (combo >= 5) pts *= 2;
                    else if (combo >= 3) pts = Math.ceil(pts * 1.5);
                    
                    score += pts;
                    updateScoreDisplay();
                    updateComboDisplay();
                    
                    if (f.special) {
                        playSound('special');
                        spawnFloatText(f.x, f.y - 30, `+${pts} ⭐`, '#FFD700');
                        spawnParticles(f.x, f.y, ['⭐', '✨', '🌟', '💫'], 12);
                        spawnFlyingStars(f.x, f.y, 8);
                    } else {
                        playSound('catch');
                        spawnFloatText(f.x, f.y - 30, `+${pts}`, '#4CAF50');
                        spawnParticles(f.x, f.y, [f.emoji, '✨'], 6);
                    }

                    if (combo === 3 || combo === 5 || combo === 10 || combo === 15) {
                        playSound('combo');
                        spawnFloatText(W / 2, H / 2, `🔥${combo}连击！`, '#FF6B35');
                        spawnFlyingStars(W / 2, H / 2, 5);
                    }
                }
                fruits.splice(i, 1);
                continue;
            }

            // 掉出屏幕
            if (f.y > H + 50) {
                if (!f.bad) {
                    totalMissed++;
                    combo = 0;
                    updateComboDisplay();
                    playSound('miss');
                }
                fruits.splice(i, 1);
            }
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * dt * 60;
            p.y += p.vy * dt * 60;
            p.vy += 0.1;
            p.alpha -= dt * 1.5;
            p.size *= 0.99;
            if (p.alpha <= 0) particles.splice(i, 1);
        }
    }

    function spawnParticles(x, y, emojis, count) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 3;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 2,
                alpha: 1,
                size: 16 + Math.random() * 16,
                emoji: emojis[Math.floor(Math.random() * emojis.length)]
            });
        }
    }

    function spawnFloatText(x, y, text, color) {
        const el = document.createElement('div');
        el.className = 'float-text';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function spawnFlyingStars(x, y, count) {
        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'flying-star';
            star.textContent = ['⭐', '✨', '🌟'][Math.floor(Math.random() * 3)];
            star.style.left = x + 'px';
            star.style.top = y + 'px';
            const dx = (Math.random() - 0.5) * 200;
            const dy = -50 - Math.random() * 150;
            star.style.setProperty('--dx', dx + 'px');
            star.style.setProperty('--dy', dy + 'px');
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 800);
        }
    }

    function updateScoreDisplay() {
        document.getElementById('score').textContent = score;
    }

    function updateComboDisplay() {
        const el = document.getElementById('comboDisplay');
        if (combo >= 2) {
            el.style.display = '';
            document.getElementById('combo').textContent = combo;
        } else {
            el.style.display = 'none';
        }
    }

    // ====== 主循环 ======
    function gameLoop(timestamp) {
        if (gameState !== 'playing') return;
        
        const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
        lastTime = timestamp;

        // 清空画布
        ctx.clearRect(0, 0, W, H);

        // 画背景
        drawBackground();

        // 生成水果
        const config = DIFFICULTY_CONFIG[difficulty];
        spawnTimer += dt * 1000;
        // 随时间加速
        const speedMult = 1 + (60 - timeLeft) * 0.008;
        if (spawnTimer >= config.spawnInterval / speedMult) {
            spawnFruit();
            spawnTimer = 0;
        }

        // 更新
        updateFruits(dt);
        updateParticles(dt);

        // 篮子抖动
        if (basket.shakeTime > 0) {
            basket.shakeTime -= dt;
            basket.shakeOffsetX = (Math.random() - 0.5) * 8;
        } else {
            basket.shakeOffsetX = 0;
        }

        // 绘制水果
        fruits.forEach(f => drawFruit(f));

        // 绘制篮子
        const savedX = basket.x;
        basket.x += (basket.shakeOffsetX || 0);
        drawBasket();
        basket.x = savedX;

        // 绘制粒子
        particles.forEach(p => drawParticle(p));

        animFrame = requestAnimationFrame(gameLoop);
    }

    // ====== 输入处理 ======
    let touching = false;

    function moveBasket(clientX) {
        basket.x = Math.max(basket.width * 0.5, Math.min(W - basket.width * 0.5, clientX));
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touching = true;
        initAudio();
        moveBasket(e.touches[0].clientX);
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (touching) moveBasket(e.touches[0].clientX);
    });

    canvas.addEventListener('touchend', () => { touching = false; });

    canvas.addEventListener('mousemove', (e) => {
        if (gameState === 'playing') moveBasket(e.clientX);
    });

    canvas.addEventListener('mousedown', (e) => {
        initAudio();
        if (gameState === 'playing') moveBasket(e.clientX);
    });

    // 键盘控制（备用）
    document.addEventListener('keydown', (e) => {
        if (gameState !== 'playing') return;
        if (e.key === 'ArrowLeft') basket.x = Math.max(basket.width * 0.5, basket.x - 30);
        if (e.key === 'ArrowRight') basket.x = Math.min(W - basket.width * 0.5, basket.x + 30);
    });

    // ====== 游戏控制 ======
    function startGame(diff) {
        initAudio();
        difficulty = diff;
        score = 0;
        timeLeft = DIFFICULTY_CONFIG[diff].time;
        combo = 0;
        maxCombo = 0;
        totalCaught = 0;
        totalMissed = 0;
        fruits = [];
        particles = [];
        spawnTimer = 0;
        lastTime = 0;
        basket.width = DIFFICULTY_CONFIG[diff].basketWidth;
        basket.x = W / 2;

        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('endScreen').classList.add('hidden');
        document.getElementById('hud').style.display = '';
        
        updateScoreDisplay();
        updateComboDisplay();
        document.getElementById('timer').textContent = timeLeft;

        gameState = 'playing';
        animFrame = requestAnimationFrame(gameLoop);

        // 计时器
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameState !== 'playing') return;
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            
            // 最后10秒加速提示
            if (timeLeft <= 10 && timeLeft > 0) {
                document.getElementById('timer').parentElement.style.background = 'rgba(255,200,200,0.9)';
            }
            
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        gameState = 'ended';
        clearInterval(timerInterval);
        cancelAnimationFrame(animFrame);
        playSound('end');

        document.getElementById('hud').style.display = 'none';
        document.getElementById('endScreen').classList.remove('hidden');
        document.getElementById('endScore').textContent = score;
        document.getElementById('endFruits').textContent = totalCaught;
        document.getElementById('endMissed').textContent = totalMissed;
        document.getElementById('endCombo').textContent = maxCombo;

        // 根据分数选评语
        const endEmoji = document.querySelector('.end-emoji');
        const endTitle = document.querySelector('.end-card h2');
        if (score >= 100) {
            endEmoji.textContent = '🏆';
            endTitle.textContent = '超级厉害！';
        } else if (score >= 60) {
            endEmoji.textContent = '🌟';
            endTitle.textContent = '太棒了！';
        } else if (score >= 30) {
            endEmoji.textContent = '🎉';
            endTitle.textContent = '做得很好！';
        } else {
            endEmoji.textContent = '💪';
            endTitle.textContent = '继续加油！';
        }

        // 结束庆祝粒子
        setTimeout(() => {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    spawnFlyingStars(
                        50 + Math.random() * (W - 100),
                        100 + Math.random() * (H - 200),
                        3
                    );
                }, i * 100);
            }
        }, 200);
    }

    function restartGame() {
        document.getElementById('endScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
        // 重置HUD样式
        document.querySelector('.hud-timer').style.background = 'rgba(255,255,255,0.9)';
    }

    function goHome() {
        window.location.href = '../index.html';
    }

    // ====== 初始化 ======
    window.addEventListener('resize', resize);
    resize();

    // 开始界面也画背景
    function drawMenuBg() {
        if (gameState !== 'menu') return;
        ctx.clearRect(0, 0, W, H);
        drawBackground();
        requestAnimationFrame(drawMenuBg);
    }
    drawMenuBg();
    </script>
</body>
