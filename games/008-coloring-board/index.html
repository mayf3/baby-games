<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>涂色画板 - Coloring Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #FF6B9D;
            --secondary: #C44DFF;
            --accent: #FFD93D;
            --bg-start: #a18cd1;
            --bg-end: #fbc2eb;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* ====== Start Screen ====== */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            animation: fadeIn 0.6s ease;
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .start-emoji { font-size: 90px; margin-bottom: 15px; animation: float 2s ease infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .start-screen h1 {
            font-size: 44px; color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3); margin-bottom: 8px;
        }
        .start-screen .subtitle {
            color: rgba(255,255,255,0.9); font-size: 17px; margin-bottom: 35px;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 340px;
            width: 100%;
        }
        .template-card {
            background: white;
            border-radius: 18px;
            padding: 18px 12px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            border: 3px solid transparent;
        }
        .template-card:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .template-card:active { transform: scale(0.97); }
        .template-card .emoji { font-size: 50px; display: block; margin-bottom: 6px; }
        .template-card .name {
            font-size: 14px; color: #555; font-weight: bold;
        }

        .free-draw-btn {
            margin-top: 20px;
            padding: 16px 50px;
            background: linear-gradient(135deg, #FF6B9D, #C44DFF);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 6px 20px rgba(196,77,255,0.4);
        }
        .free-draw-btn:hover { transform: translateY(-3px) scale(1.05); }
        .free-draw-btn:active { transform: scale(0.97); }

        /* ====== Game Screen ====== */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            animation: fadeIn 0.3s ease;
        }
        .game-screen.active { display: flex; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .back-btn {
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 12px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            color: white;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.5); }
        .header-title { color: white; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .header-actions { display: flex; gap: 6px; }
        .icon-btn {
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.5); transform: scale(1.1); }
        .icon-btn:active { transform: scale(0.9); }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            min-height: 0;
        }
        #game-canvas {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            max-width: 100%;
            max-height: 100%;
            cursor: pointer;
        }

        /* Color Palette */
        .palette-bar {
            width: 100%;
            padding: 8px 10px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .palette-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .color-btn:hover { transform: scale(1.15); }
        .color-btn:active { transform: scale(0.95); }
        .color-btn.selected {
            border-color: white;
            transform: scale(1.2);
            box-shadow: 0 0 12px rgba(0,0,0,0.3);
        }

        /* Tool Bar */
        .tool-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 4px 0 2px;
        }
        .tool-btn {
            padding: 6px 14px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.4); }
        .tool-btn.active { background: white; color: #a18cd1; border-color: white; }

        .brush-size-control {
            display: flex;
            align-items: center;
            gap: 4px;
            color: white;
            font-size: 13px;
        }
        .brush-size-control input[type="range"] {
            width: 70px;
            accent-color: white;
        }

        /* Celebration overlay */
        .celebration {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .celebration.active { display: flex; }
        .celebration-card {
            background: white;
            border-radius: 30px;
            padding: 35px 40px;
            text-align: center;
            animation: popIn 0.5s ease;
            max-width: 90%;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .celebration-card .big-emoji { font-size: 80px; margin-bottom: 15px; }
        .celebration-card h2 { font-size: 28px; color: #C44DFF; margin-bottom: 10px; }
        .celebration-card p { color: #666; font-size: 16px; margin-bottom: 20px; }
        .celebration-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .cel-btn {
            padding: 12px 28px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .cel-btn:hover { transform: translateY(-2px); }
        .cel-primary {
            background: linear-gradient(135deg, #FF6B9D, #C44DFF);
            color: white;
            box-shadow: 0 4px 15px rgba(196,77,255,0.4);
        }
        .cel-secondary {
            background: #f0f0f0;
            color: #555;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 101;
        }
        .confetti-piece {
            position: absolute;
            top: -10px;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 400px) {
            .start-screen h1 { font-size: 34px; }
            .template-card .emoji { font-size: 40px; }
            .color-btn { width: 30px; height: 30px; }
            .palette-row { gap: 4px; }
        }
        @media (max-height: 600px) {
            .start-emoji { font-size: 60px; margin-bottom: 8px; }
            .start-screen h1 { font-size: 30px; }
            .start-screen .subtitle { margin-bottom: 15px; font-size: 14px; }
            .template-grid { gap: 10px; }
            .template-card { padding: 10px 8px 8px; }
            .template-card .emoji { font-size: 36px; }
        }
    </style>
</head>
<body>

<!-- ====== Start Screen ====== -->
<div class="start-screen" id="start-screen">
    <div class="start-emoji">🎨</div>
    <h1>涂色画板</h1>
    <p class="subtitle">选一个图案来涂色，或者自由画画！</p>

    <div class="template-grid" id="template-grid">
        <!-- filled by JS -->
    </div>

    <button class="free-draw-btn" onclick="startGame('free')">✏️ 自由画画</button>
</div>

<!-- ====== Game Screen ====== -->
<div class="game-screen" id="game-screen">
    <div class="header">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <span class="header-title" id="header-title">涂色画板</span>
        <div class="header-actions">
            <button class="icon-btn" onclick="undo()" title="撤销">↩️</button>
            <button class="icon-btn" onclick="clearCanvas()" title="清空">🗑️</button>
            <button class="icon-btn" onclick="celebrate()" title="完成">🎉</button>
        </div>
    </div>

    <div class="canvas-area">
        <canvas id="game-canvas"></canvas>
    </div>

    <div class="palette-bar">
        <div class="tool-bar">
            <button class="tool-btn active" id="brush-btn" onclick="setTool('brush')">🖌️ 画笔</button>
            <button class="tool-btn" id="fill-btn" onclick="setTool('fill')">🪣 填充</button>
            <button class="tool-btn" id="eraser-btn" onclick="setTool('eraser')">🧹 橡皮</button>
            <div class="brush-size-control">
                <span>大小</span>
                <input type="range" min="2" max="30" value="8" id="brush-size" oninput="setBrushSize(this.value)">
            </div>
        </div>
        <div class="palette-row" id="color-palette">
            <!-- filled by JS -->
        </div>
    </div>
</div>

<!-- ====== Celebration ====== -->
<div class="celebration" id="celebration">
    <div class="celebration-card">
        <div class="big-emoji">🌟</div>
        <h2>太棒了！</h2>
        <p>你的画真好看！小画家真厉害 🎨</p>
        <div class="celebration-actions">
            <button class="cel-btn cel-secondary" onclick="hideCelebration(); goBack();">返回首页</button>
            <button class="cel-btn cel-secondary" onclick="hideCelebration(); clearCanvas();">重新画</button>
            <button class="cel-btn cel-primary" onclick="hideCelebration(); celebrate();">再看一次 🎉</button>
        </div>
    </div>
</div>

<div class="confetti-container" id="confetti-container"></div>

<script>
(function() {
    // ============ CONFIG ============
    const COLORS = [
        '#FF6B6B', '#FF8E53', '#FFD93D', '#6BCB77',
        '#4ECDC4', '#45B7D1', '#6C5CE7', '#C44DFF',
        '#FF6B9D', '#A8E6CF', '#DDA0DD', '#F4A460',
        '#2D3436', '#636E72', '#DFE6E9', '#FFFFFF'
    ];

    const TEMPLATES = [
        { id: 'sun', name: '太阳', emoji: '☀️' },
        { id: 'flower', name: '花朵', emoji: '🌸' },
        { id: 'butterfly', name: '蝴蝶', emoji: '🦋' },
        { id: 'fish', name: '小鱼', emoji: '🐟' },
        { id: 'house', name: '小房子', emoji: '🏠' },
        { id: 'star', name: '星星', emoji: '⭐' },
    ];

    // ============ STATE ============
    let currentColor = COLORS[0];
    let currentTool = 'brush';
    let brushSize = 8;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let canvas, ctx;
    let undoStack = [];
    const MAX_UNDO = 20;
    let currentTemplate = null;

    // ============ INIT ============
    function init() {
        renderTemplateGrid();
        renderPalette();
    }

    function renderTemplateGrid() {
        const grid = document.getElementById('template-grid');
        grid.innerHTML = TEMPLATES.map(t =>
            `<div class="template-card" onclick="startGame('${t.id}')">
                <span class="emoji">${t.emoji}</span>
                <div class="name">${t.name}</div>
            </div>`
        ).join('');
    }

    function renderPalette() {
        const palette = document.getElementById('color-palette');
        palette.innerHTML = COLORS.map((c, i) =>
            `<div class="color-btn ${i === 0 ? 'selected' : ''}"
                  style="background:${c}"
                  onclick="selectColor(${i})"
                  data-index="${i}"></div>`
        ).join('');
    }

    // ============ START GAME ============
    window.startGame = function(templateId) {
        currentTemplate = templateId;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').classList.add('active');

        const titleMap = { free: '自由画画' };
        const tmpl = TEMPLATES.find(t => t.id === templateId);
        document.getElementById('header-title').textContent = tmpl ? `涂色 - ${tmpl.name}` : '自由画画';

        requestAnimationFrame(() => {
            initCanvas();
            if (templateId !== 'free') {
                drawTemplate(templateId);
            }
            saveUndoState();
        });
    };

    function initCanvas() {
        canvas = document.getElementById('game-canvas');
        ctx = canvas.getContext('2d');

        const area = document.querySelector('.canvas-area');
        const areaW = area.clientWidth - 16;
        const areaH = area.clientHeight - 16;
        const size = Math.min(areaW, areaH, 560);

        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Mouse events
        canvas.addEventListener('mousedown', onPointerDown);
        canvas.addEventListener('mousemove', onPointerMove);
        canvas.addEventListener('mouseup', onPointerUp);
        canvas.addEventListener('mouseleave', onPointerUp);

        // Touch events
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
    }

    // ============ TEMPLATES ============
    function drawTemplate(id) {
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#2D3436';

        switch (id) {
            case 'sun': drawSun(cx, cy, w); break;
            case 'flower': drawFlower(cx, cy, w); break;
            case 'butterfly': drawButterfly(cx, cy, w); break;
            case 'fish': drawFish(cx, cy, w); break;
            case 'house': drawHouse(cx, cy, w); break;
            case 'star': drawStar(cx, cy, w); break;
        }
    }

    function drawSun(cx, cy, w) {
        const r = w * 0.18;
        // Rays
        for (let i = 0; i < 12; i++) {
            const angle = (Math.PI * 2 / 12) * i;
            const innerR = r + 10;
            const outerR = r + w * 0.14;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
            ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
            ctx.lineWidth = w * 0.035;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
        // Circle
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.lineWidth = 3;
        ctx.stroke();
        // Eyes
        ctx.beginPath();
        ctx.arc(cx - r * 0.3, cy - r * 0.15, r * 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + r * 0.3, cy - r * 0.15, r * 0.08, 0, Math.PI * 2);
        ctx.fill();
        // Smile
        ctx.beginPath();
        ctx.arc(cx, cy + r * 0.05, r * 0.35, 0.1 * Math.PI, 0.9 * Math.PI);
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function drawFlower(cx, cy, w) {
        const petalR = w * 0.1;
        const centerR = w * 0.07;
        // Stem
        ctx.beginPath();
        ctx.moveTo(cx, cy + centerR + petalR);
        ctx.quadraticCurveTo(cx - 15, cy + w * 0.35, cx, cy + w * 0.42);
        ctx.lineWidth = w * 0.025;
        ctx.stroke();
        // Leaves
        ctx.beginPath();
        ctx.ellipse(cx - w * 0.08, cy + w * 0.28, w * 0.06, w * 0.025, -0.5, 0, Math.PI * 2);
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(cx + w * 0.07, cy + w * 0.34, w * 0.06, w * 0.025, 0.4, 0, Math.PI * 2);
        ctx.stroke();
        // Petals
        const petalCount = 6;
        for (let i = 0; i < petalCount; i++) {
            const angle = (Math.PI * 2 / petalCount) * i - Math.PI / 2;
            const px = cx + Math.cos(angle) * (petalR * 0.9);
            const py = cy + Math.sin(angle) * (petalR * 0.9);
            ctx.beginPath();
            ctx.ellipse(px, py, petalR, petalR * 0.7, angle + Math.PI / 2, 0, Math.PI * 2);
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        // Center
        ctx.beginPath();
        ctx.arc(cx, cy, centerR, 0, Math.PI * 2);
        ctx.stroke();
    }

    function drawButterfly(cx, cy, w) {
        // Body
        ctx.beginPath();
        ctx.ellipse(cx, cy, w * 0.025, w * 0.12, 0, 0, Math.PI * 2);
        ctx.lineWidth = 3;
        ctx.stroke();
        // Antennae
        ctx.beginPath();
        ctx.moveTo(cx - 3, cy - w * 0.1);
        ctx.quadraticCurveTo(cx - w * 0.1, cy - w * 0.25, cx - w * 0.12, cy - w * 0.28);
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx - w * 0.12, cy - w * 0.28, w * 0.02, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx + 3, cy - w * 0.1);
        ctx.quadraticCurveTo(cx + w * 0.1, cy - w * 0.25, cx + w * 0.12, cy - w * 0.28);
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx + w * 0.12, cy - w * 0.28, w * 0.02, 0, Math.PI * 2);
        ctx.fill();
        // Wings - upper
        ctx.beginPath();
        ctx.ellipse(cx - w * 0.16, cy - w * 0.06, w * 0.14, w * 0.1, -0.3, 0, Math.PI * 2);
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(cx + w * 0.16, cy - w * 0.06, w * 0.14, w * 0.1, 0.3, 0, Math.PI * 2);
        ctx.stroke();
        // Wings - lower
        ctx.beginPath();
        ctx.ellipse(cx - w * 0.12, cy + w * 0.08, w * 0.1, w * 0.08, -0.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(cx + w * 0.12, cy + w * 0.08, w * 0.1, w * 0.08, 0.5, 0, Math.PI * 2);
        ctx.stroke();
        // Wing circles (decorative)
        const decoR = w * 0.03;
        [[-0.16, -0.06], [0.16, -0.06], [-0.12, 0.08], [0.12, 0.08]].forEach(([dx, dy]) => {
            ctx.beginPath();
            ctx.arc(cx + w * dx, cy + w * dy, decoR, 0, Math.PI * 2);
            ctx.lineWidth = 2;
            ctx.stroke();
        });
    }

    function drawFish(cx, cy, w) {
        const bodyRx = w * 0.22;
        const bodyRy = w * 0.13;
        // Tail
        ctx.beginPath();
        ctx.moveTo(cx + bodyRx * 0.7, cy - bodyRy * 0.3);
        ctx.lineTo(cx + bodyRx * 1.4, cy - bodyRy * 1.1);
        ctx.lineTo(cx + bodyRx * 1.4, cy + bodyRy * 1.1);
        ctx.lineTo(cx + bodyRx * 0.7, cy + bodyRy * 0.3);
        ctx.lineWidth = 3;
        ctx.stroke();
        // Body
        ctx.beginPath();
        ctx.ellipse(cx, cy, bodyRx, bodyRy, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Eye
        ctx.beginPath();
        ctx.arc(cx - bodyRx * 0.45, cy - bodyRy * 0.2, w * 0.03, 0, Math.PI * 2);
        ctx.fill();
        // Mouth
        ctx.beginPath();
        ctx.arc(cx - bodyRx * 0.7, cy + bodyRy * 0.1, w * 0.025, 0.3, Math.PI * 0.7);
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Fin top
        ctx.beginPath();
        ctx.moveTo(cx - bodyRx * 0.2, cy - bodyRy * 0.9);
        ctx.quadraticCurveTo(cx, cy - bodyRy * 1.6, cx + bodyRx * 0.3, cy - bodyRy * 0.9);
        ctx.lineWidth = 3;
        ctx.stroke();
        // Scales (decorative arcs)
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(cx - bodyRx * 0.1 + i * bodyRx * 0.3, cy, bodyRy * 0.35, -0.7, 0.7);
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        // Bubbles
        ctx.beginPath();
        ctx.arc(cx - bodyRx * 1.0, cy - bodyRy * 0.5, w * 0.02, 0, Math.PI * 2);
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx - bodyRx * 1.15, cy - bodyRy * 0.8, w * 0.015, 0, Math.PI * 2);
        ctx.stroke();
    }

    function drawHouse(cx, cy, w) {
        const hw = w * 0.38;
        const hh = w * 0.22;
        const roofH = w * 0.18;
        const left = cx - hw / 2;
        const right = cx + hw / 2;
        const top = cy - hh / 2;
        const bottom = cy + hh / 2;
        // Roof
        ctx.beginPath();
        ctx.moveTo(left - w * 0.03, top);
        ctx.lineTo(cx, top - roofH);
        ctx.lineTo(right + w * 0.03, top);
        ctx.closePath();
        ctx.lineWidth = 3;
        ctx.stroke();
        // Walls
        ctx.strokeRect(left, top, hw, hh);
        // Door
        const dw = hw * 0.2;
        const dh = hh * 0.55;
        ctx.strokeRect(cx - dw / 2, bottom - dh, dw, dh);
        ctx.beginPath();
        ctx.arc(cx + dw * 0.25, bottom - dh * 0.5, w * 0.008, 0, Math.PI * 2);
        ctx.fill();
        // Windows
        const ww = hw * 0.18;
        const wh = hh * 0.28;
        ctx.strokeRect(left + hw * 0.12, top + hh * 0.2, ww, wh);
        ctx.strokeRect(right - hw * 0.12 - ww, top + hh * 0.2, ww, wh);
        // Window crosses
        [left + hw * 0.12, right - hw * 0.12 - ww].forEach(wx => {
            ctx.beginPath();
            ctx.moveTo(wx + ww / 2, top + hh * 0.2);
            ctx.lineTo(wx + ww / 2, top + hh * 0.2 + wh);
            ctx.moveTo(wx, top + hh * 0.2 + wh / 2);
            ctx.lineTo(wx + ww, top + hh * 0.2 + wh / 2);
            ctx.lineWidth = 1.5;
            ctx.stroke();
        });
        // Chimney
        ctx.strokeRect(cx + hw * 0.15, top - roofH * 0.7, hw * 0.1, roofH * 0.6);
        // Ground
        ctx.beginPath();
        ctx.moveTo(left - w * 0.1, bottom + 2);
        ctx.lineTo(right + w * 0.1, bottom + 2);
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    function drawStar(cx, cy, w) {
        const outerR = w * 0.28;
        const innerR = w * 0.12;
        const points = 5;
        // Star outline
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
            const r = i % 2 === 0 ? outerR : innerR;
            const angle = (Math.PI * 2 / (points * 2)) * i - Math.PI / 2;
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.lineWidth = 3;
        ctx.stroke();
        // Eyes
        ctx.beginPath();
        ctx.arc(cx - w * 0.06, cy - w * 0.02, w * 0.025, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + w * 0.06, cy - w * 0.02, w * 0.025, 0, Math.PI * 2);
        ctx.fill();
        // Smile
        ctx.beginPath();
        ctx.arc(cx, cy + w * 0.02, w * 0.06, 0.15 * Math.PI, 0.85 * Math.PI);
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Small stars around
        [[-0.38, -0.35, 0.04], [0.35, -0.32, 0.03], [-0.35, 0.3, 0.035], [0.38, 0.28, 0.04], [0, -0.38, 0.03]].forEach(([dx, dy, sr]) => {
            drawMiniStar(cx + w * dx, cy + w * dy, w * sr);
        });
    }

    function drawMiniStar(cx, cy, r) {
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
            const cr = i % 2 === 0 ? r : r * 0.4;
            const angle = (Math.PI * 2 / 10) * i - Math.PI / 2;
            const x = cx + Math.cos(angle) * cr;
            const y = cy + Math.sin(angle) * cr;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // ============ DRAWING ============
    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
    }

    function onPointerDown(e) {
        const pos = getCanvasPos(e);
        if (currentTool === 'fill') {
            floodFill(Math.round(pos.x), Math.round(pos.y));
            return;
        }
        isDrawing = true;
        lastX = pos.x;
        lastY = pos.y;
        // Draw a dot at start
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, (currentTool === 'eraser' ? brushSize * 1.5 : brushSize) / 2, 0, Math.PI * 2);
        ctx.fillStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
        ctx.fill();
    }

    function onPointerMove(e) {
        if (!isDrawing) return;
        const pos = getCanvasPos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
        ctx.lineWidth = currentTool === 'eraser' ? brushSize * 1.5 : brushSize;
        ctx.lineCap = 'round';
        ctx.stroke();
        lastX = pos.x;
        lastY = pos.y;
    }

    function onPointerUp() {
        if (isDrawing) {
            isDrawing = false;
            saveUndoState();
        }
    }

    function onTouchStart(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
        canvas.dispatchEvent(mouseEvent);
    }

    function onTouchMove(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
        canvas.dispatchEvent(mouseEvent);
    }

    function onTouchEnd(e) {
        const mouseEvent = new MouseEvent('mouseup');
        canvas.dispatchEvent(mouseEvent);
    }

    // ============ FLOOD FILL ============
    function floodFill(startX, startY) {
        if (startX < 0 || startY < 0 || startX >= canvas.width || startY >= canvas.height) return;

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const w = canvas.width;
        const h = canvas.height;

        // Parse fill color
        const fillColor = hexToRgb(currentColor);
        const startIdx = (startY * w + startX) * 4;
        const targetR = data[startIdx];
        const targetG = data[startIdx + 1];
        const targetB = data[startIdx + 2];
        const targetA = data[startIdx + 3];

        // Don't fill if same color
        if (targetR === fillColor.r && targetG === fillColor.g && targetB === fillColor.b && targetA === 255) return;

        const tolerance = 32;
        const stack = [[startX, startY]];
        const visited = new Uint8Array(w * h);

        function matches(idx) {
            return Math.abs(data[idx] - targetR) <= tolerance &&
                   Math.abs(data[idx + 1] - targetG) <= tolerance &&
                   Math.abs(data[idx + 2] - targetB) <= tolerance &&
                   Math.abs(data[idx + 3] - targetA) <= tolerance;
        }

        let count = 0;
        const maxPixels = w * h;
        while (stack.length > 0 && count < maxPixels) {
            const [x, y] = stack.pop();
            const pixelIdx = y * w + x;
            if (x < 0 || x >= w || y < 0 || y >= h) continue;
            if (visited[pixelIdx]) continue;

            const dataIdx = pixelIdx * 4;
            if (!matches(dataIdx)) continue;

            visited[pixelIdx] = 1;
            data[dataIdx] = fillColor.r;
            data[dataIdx + 1] = fillColor.g;
            data[dataIdx + 2] = fillColor.b;
            data[dataIdx + 3] = 255;
            count++;

            stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
        }

        ctx.putImageData(imageData, 0, 0);
        saveUndoState();
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }

    // ============ TOOLS ============
    window.selectColor = function(index) {
        currentColor = COLORS[index];
        document.querySelectorAll('.color-btn').forEach((btn, i) => {
            btn.classList.toggle('selected', i === index);
        });
        // Switch to brush if on eraser
        if (currentTool === 'eraser') {
            setTool('brush');
        }
    };

    window.setTool = function(tool) {
        currentTool = tool;
        document.getElementById('brush-btn').classList.toggle('active', tool === 'brush');
        document.getElementById('fill-btn').classList.toggle('active', tool === 'fill');
        document.getElementById('eraser-btn').classList.toggle('active', tool === 'eraser');
        canvas.style.cursor = tool === 'fill' ? 'cell' : tool === 'eraser' ? 'grab' : 'crosshair';
    };

    window.setBrushSize = function(size) {
        brushSize = parseInt(size);
    };

    // ============ UNDO ============
    function saveUndoState() {
        if (!canvas) return;
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > MAX_UNDO) undoStack.shift();
    }

    window.undo = function() {
        if (undoStack.length <= 1) return;
        undoStack.pop(); // remove current
        const prev = undoStack[undoStack.length - 1];
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = prev;
    };

    window.clearCanvas = function() {
        if (!canvas) return;
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (currentTemplate && currentTemplate !== 'free') {
            drawTemplate(currentTemplate);
        }
        saveUndoState();
    };

    // ============ NAVIGATION ============
    window.goBack = function() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('start-screen').style.display = 'flex';
        undoStack = [];
        // Remove old event listeners by replacing canvas
        const oldCanvas = document.getElementById('game-canvas');
        const newCanvas = oldCanvas.cloneNode(true);
        oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);
    };

    // ============ CELEBRATION ============
    window.celebrate = function() {
        showConfetti();
        document.getElementById('celebration').classList.add('active');
    };

    window.hideCelebration = function() {
        document.getElementById('celebration').classList.remove('active');
        document.getElementById('confetti-container').innerHTML = '';
    };

    function showConfetti() {
        const container = document.getElementById('confetti-container');
        container.innerHTML = '';
        const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4ECDC4', '#6C5CE7', '#FF6B9D', '#C44DFF', '#45B7D1'];
        for (let i = 0; i < 50; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + '%';
            piece.style.background = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            piece.style.animationDelay = Math.random() * 0.5 + 's';
            piece.style.width = (Math.random() * 8 + 6) + 'px';
            piece.style.height = (Math.random() * 8 + 6) + 'px';
            piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            container.appendChild(piece);
        }
        setTimeout(() => { container.innerHTML = ''; }, 4000);
    }

    // ============ START ============
    init();
})();
</script>
</body>
</html>
