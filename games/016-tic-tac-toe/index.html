<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>井字棋 - 宝宝游戏乐园</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            min-height:100vh;display:flex;justify-content:center;
            align-items:flex-start;padding:10px;
            user-select:none;-webkit-user-select:none;touch-action:manipulation;
        }
        .container{
            background:white;border-radius:30px;padding:20px 18px;
            max-width:460px;width:100%;box-shadow:0 15px 50px rgba(0,0,0,0.15);
        }
        .top-bar{
            display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;
        }
        .back-btn{
            background:none;border:none;font-size:15px;color:#999;
            cursor:pointer;padding:8px 12px;border-radius:15px;
            transition:all .2s;font-family:inherit;font-weight:600;
        }
        .back-btn:hover{background:#f0f0f0;color:#666}
        .title-area{text-align:center;flex:1}
        .title-area h1{font-size:22px;color:#2d3436;font-weight:800}
        .title-area .sub{font-size:12px;color:#aaa;margin-top:2px}
        .sound-btn{
            background:none;border:none;font-size:22px;cursor:pointer;
            padding:8px;border-radius:15px;transition:all .2s;
        }
        .sound-btn:hover{background:#f0f0f0}

        /* 玩家选择 */
        .player-select{
            display:flex;justify-content:center;gap:15px;margin-bottom:18px;
        }
        .player-chip{
            padding:8px 18px;border-radius:25px;font-size:15px;font-weight:700;
            border:3px solid transparent;transition:all .3s;cursor:pointer;
            display:flex;align-items:center;gap:6px;
        }
        .player-chip.p1{background:#e8f0fe;color:#4285f4}
        .player-chip.p2{background:#fce8ec;color:#ea4335}
        .player-chip.active{
            border-color:currentColor;transform:scale(1.08);
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        /* 比分 */
        .score-bar{
            display:flex;justify-content:center;gap:25px;margin-bottom:15px;
        }
        .score-item{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:#666}
        .score-item .val{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;padding:3px 14px;border-radius:20px;
            font-size:14px;font-weight:800;min-width:30px;text-align:center;
        }

        /* 状态 */
        .status-bar{
            text-align:center;font-size:18px;font-weight:800;
            padding:10px;margin-bottom:15px;border-radius:18px;
            transition:all .3s;
        }
        .status-bar.p1-turn{background:#e8f0fe;color:#4285f4}
        .status-bar.p2-turn{background:#fce8ec;color:#ea4335}
        .status-bar.win{background:#fff3e0;color:#ff9800;animation:winPulse .6s ease}
        .status-bar.draw{background:#f3e5f5;color:#9c27b0}
        @keyframes winPulse{0%{transform:scale(0.9)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

        /* 棋盘 */
        .board{
            display:grid;grid-template-columns:repeat(3,1fr);
            gap:10px;margin-bottom:15px;background:#f5f5f5;
            padding:12px;border-radius:22px;
        }
        .cell{
            background:white;border:none;border-radius:18px;
            aspect-ratio:1;font-size:52px;
            display:flex;justify-content:center;align-items:center;
            cursor:pointer;transition:all .2s;
            box-shadow:0 3px 10px rgba(0,0,0,0.06);
            -webkit-tap-highlight-color:transparent;
        }
        .cell:hover:not(.taken){background:#fafafa;transform:scale(1.04)}
        .cell:active:not(.taken){transform:scale(0.95)}
        .cell.taken{cursor:default}
        .cell.p1-mark{color:#4285f4}
        .cell.p2-mark{color:#ea4335}
        .cell.placed{animation:cellPlace .35s ease}
        @keyframes cellPlace{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
        .cell.winning{
            background:#fff8e1;
            box-shadow:0 0 20px rgba(255,193,7,0.4);
            animation:winCell .6s ease infinite alternate;
        }
        @keyframes winCell{0%{transform:scale(1)}100%{transform:scale(1.06)}}

        /* 按钮 */
        .btn-restart{
            display:block;width:100%;padding:15px;
            font-size:18px;font-weight:800;color:white;
            background:linear-gradient(135deg,#667eea,#764ba2);
            border:none;border-radius:18px;cursor:pointer;
            transition:all .3s;font-family:inherit;
            box-shadow:0 6px 20px rgba(102,126,234,0.3);
        }
        .btn-restart:hover{transform:translateY(-3px)}
        .btn-restart:active{transform:translateY(0)}

        /* 说明 */
        .instructions{
            background:#f9f9f9;padding:14px 18px;border-radius:16px;
            margin-top:15px;font-size:13px;color:#888;line-height:1.7;
        }
        .instructions strong{color:#667eea}

        /* 星星粒子 */
        .star-particle{
            position:fixed;font-size:24px;pointer-events:none;z-index:100;
            animation:starFly 1s ease forwards;
        }
        @keyframes starFly{
            0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
            100%{opacity:0;transform:translateY(-120px) scale(0.3) rotate(360deg)}
        }
        /* 彩带 */
        .confetti{
            position:fixed;top:-10px;pointer-events:none;z-index:99;
            animation:confettiFall 2.5s ease forwards;
        }
        @keyframes confettiFall{
            0%{opacity:1;transform:translateY(0) rotate(0deg)}
            100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
        }

        @media(max-width:480px){
            .container{padding:15px 12px;border-radius:24px}
            .title-area h1{font-size:18px}
            .cell{font-size:40px;border-radius:14px}
            .board{gap:8px;padding:10px;border-radius:18px}
            .btn-restart{font-size:16px;padding:13px}
            .status-bar{font-size:15px}
        }
        @media(max-width:360px){
            .cell{font-size:34px}
            .board{gap:6px;padding:8px}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="back-btn" onclick="location.href='../../index.html'">← 大厅</button>
        <div class="title-area">
            <h1>❌⭕ 井字棋</h1>
            <div class="sub">和好朋友一起玩！</div>
        </div>
        <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
    </div>

    <div class="player-select">
        <div class="player-chip p1 active" id="chip1">🐰 小兔</div>
        <div class="player-chip p2" id="chip2">🐻 小熊</div>
    </div>

    <div class="score-bar">
        <div class="score-item">🐰 <span class="val" id="score1">0</span></div>
        <div class="score-item">🤝 <span class="val" id="draws">0</span></div>
        <div class="score-item">🐻 <span class="val" id="score2">0</span></div>
    </div>

    <div class="status-bar p1-turn" id="status">🐰 小兔先走！</div>

    <div class="board" id="board"></div>

    <button class="btn-restart" onclick="restart()">🔄 再来一局</button>

    <div class="instructions">
        <strong>📖 怎么玩：</strong>轮流点击格子放下自己的棋子，三个连成一条线就赢啦！
        可以横着、竖着或斜着连线。和爸爸妈妈、好朋友一起玩吧！
    </div>
</div>

<script>
// === 音效系统 ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, soundEnabled = true;
function getCtx(){if(!audioCtx)audioCtx=new AudioCtx();return audioCtx}
function tone(f,d,t,v){
    if(!soundEnabled)return;
    try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(v||0.12,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}
}
function playPlace(){tone(600,0.1,'sine',0.15)}
function playWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.15),i*120))}
function playDraw(){tone(330,0.3,'triangle',0.1)}
function toggleSound(){soundEnabled=!soundEnabled;document.getElementById('soundBtn').textContent=soundEnabled?'🔊':'🔇'}

// === 游戏逻辑 ===
const P1 = '🐰', P2 = '🐻';
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board, current, active, scores = {p1:0, p2:0, draws:0};

function init(){
    board = Array(9).fill('');
    current = P1;
    active = true;
    renderBoard();
    updateStatus();
}

function renderBoard(){
    const b = document.getElementById('board');
    b.innerHTML = '';
    for(let i = 0; i < 9; i++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.idx = i;
        cell.addEventListener('click', onCellClick);
        b.appendChild(cell);
    }
}

function onCellClick(e){
    if(!active) return;
    const idx = parseInt(e.target.dataset.idx);
    if(board[idx]) return;

    board[idx] = current;
    const cell = e.target;
    cell.textContent = current;
    cell.classList.add('taken', current === P1 ? 'p1-mark' : 'p2-mark', 'placed');
    playPlace();

    const win = checkWin();
    if(win){
        active = false;
        win.forEach(i => document.querySelectorAll('.cell')[i].classList.add('winning'));
        const winner = current;
        if(winner === P1) scores.p1++; else scores.p2++;
        document.getElementById('status').textContent = `🎉 ${winner} 赢了！太厉害了！`;
        document.getElementById('status').className = 'status-bar win';
        playWin();
        spawnConfetti(25);
        updateChips();
    } else if(board.every(c => c)){
        active = false;
        scores.draws++;
        document.getElementById('status').textContent = '🤝 平局！都很棒！';
        document.getElementById('status').className = 'status-bar draw';
        playDraw();
        updateChips();
    } else {
        current = current === P1 ? P2 : P1;
        updateStatus();
        updateChips();
    }
    updateScores();
}

function checkWin(){
    for(const [a,b,c] of WINS){
        if(board[a] && board[a]===board[b] && board[b]===board[c]) return [a,b,c];
    }
    return null;
}

function updateStatus(){
    const s = document.getElementById('status');
    s.textContent = current === P1 ? '🐰 小兔来下！' : '🐻 小熊来下！';
    s.className = 'status-bar ' + (current === P1 ? 'p1-turn' : 'p2-turn');
}

function updateChips(){
    document.getElementById('chip1').classList.toggle('active', current === P1 && active);
    document.getElementById('chip2').classList.toggle('active', current === P2 && active);
}

function updateScores(){
    document.getElementById('score1').textContent = scores.p1;
    document.getElementById('score2').textContent = scores.p2;
    document.getElementById('draws').textContent = scores.draws;
}

function restart(){
    init();
}

// === 粒子效果 ===
function spawnConfetti(count){
    const colors = ['#ff6b6b','#4ecdc4','#ffe66d','#a29bfe','#ff6b9d','#55efc4','#ffa502'];
    for(let i=0;i<count;i++){
        const c=document.createElement('div');c.className='confetti';
        c.style.left=(Math.random()*100)+'vw';
        c.style.width=(8+Math.random()*10)+'px';
        c.style.height=(8+Math.random()*10)+'px';
        c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        c.style.borderRadius=Math.random()>0.5?'50%':'3px';
        c.style.animationDuration=(2+Math.random()*2)+'s';
        c.style.animationDelay=(Math.random()*0.8)+'s';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4500);
    }
}

// === 启动 ===
init();
</script>
</body>
</html>
