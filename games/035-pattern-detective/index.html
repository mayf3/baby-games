<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>模式小侦探 - Pattern Detective</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            animation: fadeInDown 0.5s ease;
        }

        .header h1 {
            font-size: clamp(28px, 5vw, 42px);
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            font-size: clamp(16px, 3vw, 20px);
            opacity: 0.95;
        }

        .level-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.5s ease 0.2s both;
        }

        .level-btn {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .level-btn.easy {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .level-btn.medium {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .level-btn.hard {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .level-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .level-btn.selected {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        .game-area {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 700px;
            min-height: 400px;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: zoomIn 0.5s ease;
        }

        .game-area.active {
            display: flex;
        }

        .pattern-display {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 80px;
            align-items: center;
        }

        .pattern-item {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease both;
            transition: transform 0.2s ease;
        }

        .pattern-item:hover {
            transform: scale(1.1);
        }

        .pattern-item.question {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border: 4px dashed #f39c12;
            color: #f39c12;
            animation: pulse 1s ease infinite;
        }

        .question-text {
            font-size: clamp(20px, 4vw, 26px);
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }

        .options-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }

        .option-btn {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .option-btn:active {
            transform: translateY(-2px) scale(1.05);
        }

        .option-btn.circle {
            border-radius: 50%;
        }

        .score-display {
            display: flex;
            gap: 30px;
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
            margin-top: 10px;
        }

        .stars {
            display: flex;
            gap: 5px;
        }

        .star {
            font-size: 30px;
            animation: starPop 0.5s ease;
        }

        .feedback {
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 35px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .feedback.correct {
            color: #27ae60;
        }

        .feedback.wrong {
            color: #e74c3c;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .next-btn {
            padding: 15px 40px;
            font-size: 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: none;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .next-btn.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confettiFall 3s ease-out forwards;
        }

        .completion-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: zoomIn 0.5s ease;
        }

        .completion-screen.active {
            display: flex;
        }

        .completion-screen h2 {
            font-size: clamp(32px, 6vw, 48px);
            color: #f39c12;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .completion-screen p {
            font-size: clamp(20px, 4vw, 26px);
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }

        .final-score {
            font-size: clamp(36px, 7vw, 52px);
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 20px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .home-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes starPop {
            0% {
                transform: scale(0) rotate(0deg);
            }
            50% {
                transform: scale(1.3) rotate(180deg);
            }
            100% {
                transform: scale(1) rotate(360deg);
            }
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .game-container {
                padding: 15px;
            }

            .level-selector {
                gap: 10px;
            }

            .level-btn {
                padding: 12px 20px;
                font-size: 18px;
            }

            .pattern-item {
                width: 55px;
                height: 55px;
                font-size: 30px;
            }

            .option-btn {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }

            .game-area {
                padding: 20px;
                min-height: 350px;
            }
        }

        @media (max-width: 400px) {
            .pattern-item {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }

            .option-btn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔍 模式小侦探</h1>
            <p>找规律，猜猜下一个是什么呢？</p>
        </div>

        <div class="level-selector" id="levelSelector">
            <button class="level-btn easy" data-level="easy">🌟 简单</button>
            <button class="level-btn medium" data-level="medium">⭐ 中等</button>
            <button class="level-btn hard" data-level="hard">💫 挑战</button>
        </div>

        <div class="game-area" id="gameArea">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="pattern-display" id="patternDisplay"></div>

            <p class="question-text" id="questionText">看仔细，找出规律！</p>

            <div class="options-container" id="optionsContainer"></div>

            <p class="feedback" id="feedback"></p>

            <div class="score-display">
                <span>第 <span id="currentRound">1</span> 关</span>
                <span class="stars" id="stars"></span>
            </div>

            <button class="next-btn" id="nextBtn">继续 ➡️</button>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 太棒了！</h2>
            <p>你完成了所有关卡！</p>
            <div class="final-score" id="finalScore"></div>
            <button class="restart-btn" id="restartBtn">再玩一次 🔄</button>
            <button class="home-btn" id="homeBtn">返回主页 🏠</button>
        </div>

        <div class="celebration" id="celebration"></div>
    </div>

    <script>
        // Audio context for sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            switch(type) {
                case 'correct':
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialDecayTo = 0.01;
                    gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.4);
                    break;
                case 'wrong':
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'click':
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
            }
        }

        // Game state
        let currentLevel = 'easy';
        let currentRound = 0;
        let totalRounds = 10;
        let score = 0;
        let selectedAnswer = null;
        let canAnswer = true;

        // Pattern generators
        const patterns = {
            easy: [
                {
                    type: 'color',
                    generate: () => {
                        const colors = [
                            {name: '红', bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'},
                            {name: '蓝', bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'},
                            {name: '黄', bg: 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)'},
                            {name: '绿', bg: 'linear-gradient(135deg, #55efc4 0%, #00b894 100%)'}
                        ];
                        const pair = [colors[0], colors[1]];
                        const pattern = [...pair, ...pair, '?'];
                        const correct = pair[0];
                        const wrongs = colors.filter(c => c !== correct && c !== pair[1]);
                        return { pattern, correct, wrongs, type: 'color' };
                    }
                },
                {
                    type: 'shape',
                    generate: () => {
                        const shapes = [
                            {name: '⭕', emoji: '⭕'},
                            {name: '⬜', emoji: '⬜'},
                            {name: '🔺', emoji: '🔺'},
                            {name: '⭐', emoji: '⭐'}
                        ];
                        const pair = [shapes[0], shapes[1]];
                        const pattern = [...pair, ...pair, '?'];
                        const correct = pair[0];
                        const wrongs = shapes.filter(s => s !== correct && s !== pair[1]);
                        return { pattern, correct, wrongs, type: 'shape' };
                    }
                },
                {
                    type: 'number',
                    generate: () => {
                        const pairs = [[1, 2], [2, 3], [1, 3], [2, 4]];
                        const pair = pairs[Math.floor(Math.random() * pairs.length)];
                        const pattern = [...pair, ...pair, '?'];
                        const correct = pair[0];
                        const wrongs = [1, 2, 3, 4].filter(n => n !== correct && n !== pair[1]).slice(0, 2);
                        return { pattern, correct, wrongs, type: 'number' };
                    }
                }
            ],
            medium: [
                {
                    type: 'color',
                    generate: () => {
                        const colors = [
                            {name: '红', bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'},
                            {name: '蓝', bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'},
                            {name: '黄', bg: 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)'},
                            {name: '绿', bg: 'linear-gradient(135deg, #55efc4 0%, #00b894 100%)'},
                            {name: '紫', bg: 'linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%)'}
                        ];
                        const triple = colors.slice(0, 3);
                        const pattern = [...triple, '?'];
                        const correct = triple[0];
                        const wrongs = colors.filter(c => !triple.includes(c));
                        return { pattern, correct, wrongs, type: 'color' };
                    }
                },
                {
                    type: 'shape',
                    generate: () => {
                        const shapes = [
                            {name: '⭕', emoji: '⭕'},
                            {name: '⬜', emoji: '⬜'},
                            {name: '🔺', emoji: '🔺'},
                            {name: '⭐', emoji: '⭐'},
                            {name: '💎', emoji: '💎'}
                        ];
                        const triple = shapes.slice(0, 3);
                        const pattern = [...triple, '?'];
                        const correct = triple[0];
                        const wrongs = shapes.filter(s => !triple.includes(s));
                        return { pattern, correct, wrongs, type: 'shape' };
                    }
                },
                {
                    type: 'number',
                    generate: () => {
                        const triples = [[1, 2, 3], [2, 3, 4], [1, 3, 5], [2, 4, 6]];
                        const triple = triples[Math.floor(Math.random() * triples.length)];
                        const pattern = [...triple, '?'];
                        const correct = triple[0] + (triple[1] - triple[0]);
                        const allNums = [1, 2, 3, 4, 5, 6];
                        const wrongs = allNums.filter(n => n !== correct);
                        return { pattern, correct, wrongs, type: 'number' };
                    }
                },
                {
                    type: 'size',
                    generate: () => {
                        const sizes = ['小', '大', '中'];
                        const pattern = ['小', '大', '小', '大', '?'];
                        const correct = '小';
                        const wrongs = ['中'];
                        return { pattern, correct, wrongs, type: 'size' };
                    }
                }
            ],
            hard: [
                {
                    type: 'color',
                    generate: () => {
                        const colors = [
                            {name: '红', bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'},
                            {name: '蓝', bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'},
                            {name: '黄', bg: 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)'},
                            {name: '绿', bg: 'linear-gradient(135deg, #55efc4 0%, #00b894 100%)'},
                            {name: '紫', bg: 'linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%)'},
                            {name: '橙', bg: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'}
                        ];
                        const sequence = [0, 1, 2, 0, 1, '?'];
                        const pattern = sequence.map(i => i === '?' ? '?' : colors[i]);
                        const correct = colors[2];
                        const wrongs = colors.slice(3);
                        return { pattern, correct, wrongs, type: 'color' };
                    }
                },
                {
                    type: 'shape',
                    generate: () => {
                        const shapes = [
                            {name: '⭕', emoji: '⭕'},
                            {name: '⬜', emoji: '⬜'},
                            {name: '🔺', emoji: '🔺'},
                            {name: '⭐', emoji: '⭐'},
                            {name: '💎', emoji: '💎'},
                            {name: '❤️', emoji: '❤️'}
                        ];
                        const sequence = [0, 1, 2, 3, 0, '?'];
                        const pattern = sequence.map(i => i === '?' ? '?' : shapes[i]);
                        const correct = shapes[1];
                        const wrongs = shapes.slice(4);
                        return { pattern, correct, wrongs, type: 'shape' };
                    }
                },
                {
                    type: 'number',
                    generate: () => {
                        const sequences = [[1, 2, 3, 4, '?'], [2, 4, 6, 8, '?'], [1, 3, 5, 7, '?']];
                        const seq = sequences[Math.floor(Math.random() * sequences.length)];
                        const pattern = [...seq];
                        let correct;
                        if (seq[1] - seq[0] === 1) correct = 5;
                        else if (seq[1] - seq[0] === 2) correct = 9;
                        else correct = 10;
                        const wrongs = [1, 2, 3, 4, 6, 7, 8].filter(n => n !== correct).slice(0, 3);
                        return { pattern, correct, wrongs, type: 'number' };
                    }
                },
                {
                    type: 'size',
                    generate: () => {
                        const pattern = ['小', '中', '大', '小', '中', '?'];
                        const correct = '大';
                        const wrongs = ['小', '中'];
                        return { pattern, correct, wrongs, type: 'size' };
                    }
                },
                {
                    type: 'mixed',
                    generate: () => {
                        const pattern = ['红', '⭕', '蓝', '⬜', '黄', '?'];
                        const correct = '🔺';
                        const wrongs = ['⭐', '💎'];
                        return { pattern, correct, wrongs, type: 'mixed' };
                    }
                }
            ]
        };

        function generateQuestion() {
            const levelPatterns = patterns[currentLevel];
            const patternGen = levelPatterns[Math.floor(Math.random() * levelPatterns.length)];
            return patternGen.generate();
        }

        function renderPattern(pattern, type) {
            const display = document.getElementById('patternDisplay');
            display.innerHTML = '';

            pattern.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'pattern-item';

                if (item === '?') {
                    div.classList.add('question');
                    div.textContent = '?';
                } else if (type === 'color') {
                    div.style.background = item.bg;
                    div.textContent = item.name;
                } else if (type === 'shape') {
                    div.textContent = item.emoji;
                    div.style.fontSize = '40px';
                } else if (type === 'number') {
                    div.textContent = item;
                    div.style.background = 'linear-gradient(135deg, #a8e6cf 0%, #3ee5a8 100%)';
                } else if (type === 'size') {
                    div.textContent = item;
                    if (item === '大') {
                        div.style.transform = 'scale(1.3)';
                        div.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                    } else if (item === '中') {
                        div.style.transform = 'scale(1)';
                        div.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                    } else {
                        div.style.transform = 'scale(0.7)';
                        div.style.background = 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)';
                    }
                } else if (type === 'mixed') {
                    div.textContent = typeof item === 'string' ? item : item.emoji;
                    if (item === '红') div.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                    else if (item === '蓝') div.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                    else if (item === '黄') div.style.background = 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)';
                }

                div.style.animationDelay = `${index * 0.1}s`;
                display.appendChild(div);
            });
        }

        function renderOptions(correct, wrongs, type) {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            const allOptions = [correct, ...wrongs.slice(0, 3)];
            const shuffled = allOptions.sort(() => Math.random() - 0.5);

            shuffled.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';

                if (type === 'color') {
                    btn.style.background = option.bg;
                } else if (type === 'shape') {
                    btn.textContent = option.emoji || option;
                    btn.classList.add('circle');
                } else if (type === 'number') {
                    btn.textContent = option;
                    btn.style.background = 'linear-gradient(135deg, #a8e6cf 0%, #3ee5a8 100%)';
                } else if (type === 'size') {
                    btn.textContent = option;
                    if (option === '大') {
                        btn.style.transform = 'scale(1.2)';
                        btn.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                    } else if (option === '中') {
                        btn.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                    } else {
                        btn.style.transform = 'scale(0.8)';
                        btn.style.background = 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)';
                    }
                } else if (type === 'mixed') {
                    btn.textContent = typeof option === 'string' ? option : option.emoji;
                    btn.classList.add('circle');
                    if (option === '🔺') btn.style.background = '#ffeaa7';
                    else if (option === '⭐') btn.style.background = '#f093fb';
                    else btn.style.background = '#4facfe';
                }

                btn.onclick = () => checkAnswer(option, correct, type);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, type) {
            if (!canAnswer) return;
            canAnswer = false;

            initAudio();
            const feedback = document.getElementById('feedback');
            const isCorrect = JSON.stringify(selected) === JSON.stringify(correct);

            if (isCorrect) {
                playSound('correct');
                score++;
                feedback.textContent = '太棒了！🎉';
                feedback.className = 'feedback correct';
                createStars();
            } else {
                playSound('wrong');
                feedback.textContent = '再试试看 💪';
                feedback.className = 'feedback wrong';
            }

            updateStars();
            showNextButton();
        }

        function createStars() {
            const celebration = document.getElementById('celebration');
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.textContent = '⭐';
                star.style.position = 'absolute';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = '-50px';
                star.style.fontSize = '30px';
                star.style.animation = `confettiFall ${1 + Math.random()}s ease-out forwards`;
                star.style.animationDelay = `${i * 0.1}s`;
                celebration.appendChild(star);
                setTimeout(() => star.remove(), 3000);
            }
        }

        function updateStars() {
            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            for (let i = 0; i < score; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.animationDelay = `${i * 0.1}s`;
                starsContainer.appendChild(star);
            }
        }

        function showNextButton() {
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.add('show');
        }

        function nextRound() {
            currentRound++;
            canAnswer = true;

            if (currentRound >= totalRounds) {
                showCompletion();
                return;
            }

            document.getElementById('nextBtn').classList.remove('show');
            document.getElementById('feedback').textContent = '';
            document.getElementById('currentRound').textContent = currentRound + 1;
            document.getElementById('progressFill').style.width = `${(currentRound / totalRounds) * 100}%`;

            startRound();
        }

        function startRound() {
            const question = generateQuestion();
            renderPattern(question.pattern, question.type);
            renderOptions(question.correct, question.wrongs, question.type);
        }

        function showCompletion() {
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('completionScreen').classList.add('active');
            document.getElementById('finalScore').textContent = `${score} ⭐`;

            if (score >= totalRounds * 0.8) {
                createConfetti();
            }
        }

        function createConfetti() {
            const celebration = document.getElementById('celebration');
            const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#ffeaa7', '#fdcb6e'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 2}s`;
                confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
                celebration.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function startGame(level) {
            initAudio();
            playSound('click');

            currentLevel = level;
            currentRound = 0;
            score = 0;
            canAnswer = true;

            document.getElementById('levelSelector').style.display = 'none';
            document.getElementById('gameArea').classList.add('active');
            document.getElementById('completionScreen').classList.remove('active');
            document.getElementById('currentRound').textContent = '1';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('feedback').textContent = '';
            document.getElementById('stars').innerHTML = '';
            document.getElementById('nextBtn').classList.remove('show');

            // Set total rounds based on difficulty
            totalRounds = level === 'easy' ? 8 : level === 'medium' ? 10 : 12;

            startRound();
        }

        function goHome() {
            initAudio();
            playSound('click');

            document.getElementById('levelSelector').style.display = 'flex';
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('completionScreen').classList.remove('active');

            // Remove selected class from all level buttons
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
        }

        // Event listeners
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                startGame(btn.dataset.level);
            });
        });

        document.getElementById('nextBtn').addEventListener('click', nextRound);
        document.getElementById('restartBtn').addEventListener('click', () => {
            playSound('click');
            document.getElementById('completionScreen').classList.remove('active');
            document.getElementById('levelSelector').style.display = 'flex';
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
        });
        document.getElementById('homeBtn').addEventListener('click', goHome);
    </script>
</body>
</html>
