<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>节奏小猴子 🐵</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Segoe UI', 'PingFang SC', sans-serif;
  overflow: hidden;
  background: #1a0a2e;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

#game-container {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ===== START SCREEN ===== */
#start-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  z-index: 100;
  transition: opacity 0.5s;
}

#start-screen.hidden { opacity: 0; pointer-events: none; }

.title-character {
  font-size: min(25vw, 140px);
  animation: bounce-in 0.8s ease-out;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
}

@keyframes bounce-in {
  0% { transform: scale(0) rotate(-20deg); }
  50% { transform: scale(1.2) rotate(5deg); }
  70% { transform: scale(0.9) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.game-title {
  font-size: min(8vw, 48px);
  color: white;
  text-shadow: 0 4px 12px rgba(0,0,0,0.3);
  margin: 10px 0 5px;
  font-weight: 800;
}

.game-subtitle {
  font-size: min(4vw, 20px);
  color: rgba(255,255,255,0.85);
  margin-bottom: 30px;
}

.start-btn {
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white;
  border: none;
  padding: 18px 60px;
  font-size: min(5vw, 28px);
  font-weight: 800;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(255,107,107,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  animation: pulse-btn 2s infinite;
}

.start-btn:active {
  transform: scale(0.92);
  box-shadow: 0 4px 12px rgba(255,107,107,0.3);
}

@keyframes pulse-btn {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ===== DIFFICULTY SELECT ===== */
.difficulty-select {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.diff-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid rgba(255,255,255,0.4);
  padding: 10px 24px;
  font-size: min(3.5vw, 18px);
  font-weight: 700;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
}

.diff-btn.active, .diff-btn:active {
  background: rgba(255,255,255,0.4);
  border-color: white;
}

.diff-label {
  color: rgba(255,255,255,0.7);
  font-size: min(3vw, 14px);
  margin-top: 15px;
}

/* ===== GAME SCREEN ===== */
#game-screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
}

#game-screen.active { display: flex; }

/* Background */
.game-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #1a0a2e 0%, #2d1b69 40%, #44318D 100%);
}

.bg-stars {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.bg-star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Stage / Platform */
.stage {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30%;
  background: linear-gradient(180deg, #e8d5b7 0%, #c4a882 30%, #a88c5e 100%);
  border-top: 4px solid #d4b896;
}

.stage::before {
  content: '';
  position: absolute;
  top: -30px;
  left: 0;
  right: 0;
  height: 30px;
  background: linear-gradient(180deg, transparent, rgba(232,213,183,0.5));
}

/* Monkey Character */
#monkey {
  position: absolute;
  bottom: 28%;
  left: 50%;
  transform: translateX(-50%);
  font-size: min(18vw, 100px);
  z-index: 10;
  transition: transform 0.1s;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
}

#monkey.dancing { animation: monkey-dance 0.3s ease-out; }

@keyframes monkey-dance {
  0% { transform: translateX(-50%) scale(1) rotate(0deg); }
  25% { transform: translateX(-50%) scale(1.15) rotate(-8deg); }
  50% { transform: translateX(-50%) scale(1.2) rotate(5deg); }
  75% { transform: translateX(-50%) scale(1.1) rotate(-3deg); }
  100% { transform: translateX(-50%) scale(1) rotate(0deg); }
}

#monkey.miss { animation: monkey-miss 0.4s ease-out; }

@keyframes monkey-miss {
  0%, 100% { transform: translateX(-50%) scale(1); }
  25% { transform: translateX(-50%) scale(0.9) rotate(-5deg); }
  50% { transform: translateX(-50%) scale(0.85); }
  75% { transform: translateX(-50%) scale(0.95) rotate(3deg); }
}

/* Score Display */
#score-display {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.4);
  color: white;
  padding: 8px 24px;
  border-radius: 30px;
  font-size: min(4vw, 22px);
  font-weight: 700;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(8px);
}

#combo-display {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: min(5vw, 28px);
  font-weight: 900;
  color: #FFD700;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.3s;
  text-shadow: 0 2px 8px rgba(255,215,0,0.5);
}

#combo-display.show {
  opacity: 1;
  animation: combo-pop 0.4s ease-out;
}

@keyframes combo-pop {
  0% { transform: translateX(-50%) scale(0.5); }
  50% { transform: translateX(-50%) scale(1.3); }
  100% { transform: translateX(-50%) scale(1); }
}

/* Lane Buttons */
#lanes {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 18%;
  display: flex;
  z-index: 15;
  padding: 4px;
  gap: 4px;
}

.lane-btn {
  flex: 1;
  border: none;
  border-radius: 16px 16px 8px 8px;
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: min(10vw, 56px);
  transition: transform 0.08s, filter 0.08s;
  box-shadow: inset 0 -4px 8px rgba(0,0,0,0.15);
  overflow: hidden;
}

.lane-btn:active {
  transform: scale(0.92);
  filter: brightness(1.3);
}

.lane-btn.lit {
  filter: brightness(1.5);
  animation: lane-flash 0.2s ease-out;
}

@keyframes lane-flash {
  0% { filter: brightness(2); }
  100% { filter: brightness(1); }
}

.lane-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.4) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.1s;
}

.lane-btn.lit::after { opacity: 1; }

.lane-0 { background: linear-gradient(180deg, #FF6B6B, #ee5a5a); }
.lane-1 { background: linear-gradient(180deg, #4ECDC4, #3dbdb5); }
.lane-2 { background: linear-gradient(180deg, #FFD93D, #f0c830); }
.lane-3 { background: linear-gradient(180deg, #6C5CE7, #5b4bd6); }

/* Falling Notes */
#notes-area {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 18%;
  z-index: 8;
  pointer-events: none;
}

.note {
  position: absolute;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: min(6vw, 36px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: opacity 0.15s;
  z-index: 8;
}

.note-0 { background: radial-gradient(circle at 35% 35%, #ff9a9a, #FF6B6B); }
.note-1 { background: radial-gradient(circle at 35% 35%, #80e8e0, #4ECDC4); }
.note-2 { background: radial-gradient(circle at 35% 35%, #ffe680, #FFD93D); }
.note-3 { background: radial-gradient(circle at 35% 35%, #9b8ff0, #6C5CE7); }

.note.perfect { animation: note-perfect 0.3s ease-out forwards; }
.note.good { animation: note-good 0.3s ease-out forwards; }
.note.miss { animation: note-miss 0.4s ease-out forwards; }

@keyframes note-perfect {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}

@keyframes note-good {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.6; }
  100% { transform: scale(0); opacity: 0; }
}

@keyframes note-miss {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.5) translateY(20px); opacity: 0; }
}

/* Hit Effects */
.hit-effect {
  position: absolute;
  pointer-events: none;
  z-index: 30;
  font-size: min(5vw, 28px);
  font-weight: 900;
  animation: hit-float 0.8s ease-out forwards;
}

@keyframes hit-float {
  0% { transform: translateY(0) scale(0.5); opacity: 0; }
  20% { transform: translateY(-10px) scale(1.2); opacity: 1; }
  100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
}

.hit-perfect { color: #FFD700; text-shadow: 0 2px 8px rgba(255,215,0,0.6); }
.hit-good { color: #4ECDC4; text-shadow: 0 2px 8px rgba(78,205,196,0.6); }
.hit-miss { color: #FF6B6B; text-shadow: 0 2px 8px rgba(255,107,107,0.6); }

/* Stars burst */
.star-particle {
  position: absolute;
  pointer-events: none;
  z-index: 25;
  font-size: min(4vw, 24px);
  animation: star-burst 0.6s ease-out forwards;
}

@keyframes star-burst {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { opacity: 0; }
}

/* Progress bar */
#progress-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  z-index: 20;
  background: rgba(255,255,255,0.15);
}

#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF6B6B, #FFD93D, #4ECDC4, #6C5CE7);
  width: 0%;
  transition: width 0.3s;
  border-radius: 0 3px 3px 0;
}

/* Pause button */
#pause-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  z-index: 25;
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Result Screen */
#result-screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  z-index: 100;
}

#result-screen.active { display: flex; }

.result-emoji {
  font-size: min(25vw, 140px);
  animation: bounce-in 0.8s ease-out;
}

.result-title {
  font-size: min(7vw, 42px);
  color: white;
  font-weight: 800;
  margin: 10px 0 5px;
  text-shadow: 0 3px 10px rgba(0,0,0,0.3);
}

.result-score {
  font-size: min(5vw, 28px);
  color: rgba(255,255,255,0.9);
  margin-bottom: 8px;
}

.result-stats {
  display: flex;
  gap: 20px;
  margin: 15px 0 25px;
}

.stat-item {
  text-align: center;
  color: white;
}

.stat-value {
  font-size: min(5vw, 28px);
  font-weight: 800;
}

.stat-label {
  font-size: min(3vw, 14px);
  opacity: 0.7;
}

.stars-row {
  font-size: min(8vw, 48px);
  margin-bottom: 20px;
}

.play-again-btn {
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white;
  border: none;
  padding: 16px 50px;
  font-size: min(5vw, 24px);
  font-weight: 800;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(255,107,107,0.4);
  transition: transform 0.15s;
}

.play-again-btn:active { transform: scale(0.92); }

.back-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
  padding: 10px 30px;
  font-size: min(3.5vw, 16px);
  font-weight: 600;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 12px;
}

/* Preview indicator */
#preview-area {
  position: absolute;
  bottom: 19%;
  left: 0;
  right: 0;
  height: 4px;
  background: rgba(255,255,255,0.2);
  z-index: 9;
}

/* Guide overlay */
#guide-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 50;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  backdrop-filter: blur(4px);
}

#guide-overlay.active { display: flex; }

.guide-title {
  font-size: min(6vw, 32px);
  font-weight: 800;
  margin-bottom: 15px;
}

.guide-steps {
  font-size: min(4vw, 20px);
  line-height: 2;
  margin-bottom: 25px;
}

.guide-steps span { font-size: 1.3em; }

.guide-start-btn {
  background: linear-gradient(135deg, #4ECDC4, #44a08d);
  color: white;
  border: none;
  padding: 14px 40px;
  font-size: min(4.5vw, 22px);
  font-weight: 700;
  border-radius: 40px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(78,205,196,0.4);
  transition: transform 0.15s;
}

.guide-start-btn:active { transform: scale(0.92); }

/* Confetti */
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  z-index: 200;
  animation: confetti-fall 2s ease-out forwards;
  pointer-events: none;
}

@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Responsive */
@media (max-height: 500px) {
  #monkey { font-size: 60px; bottom: 25%; }
  .lane-btn { font-size: 36px; }
  .note { font-size: 24px; }
}
</style>
</head>
<body>
<div id="game-container">

  <!-- START SCREEN -->
  <div id="start-screen">
    <div class="title-character">🐵</div>
    <div class="game-title">节奏小猴子</div>
    <div class="game-subtitle">跟着音乐节奏敲敲敲！🎵</div>
    <button class="start-btn" onclick="startGame()">开始演奏 🎶</button>
    <div class="diff-label">选择难度</div>
    <div class="difficulty-select">
      <button class="diff-btn active" onclick="setDifficulty(0, this)">简单</button>
      <button class="diff-btn" onclick="setDifficulty(1, this)">中等</button>
      <button class="diff-btn" onclick="setDifficulty(2, this)">挑战</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-bg">
      <div class="bg-stars" id="bg-stars"></div>
    </div>
    <div class="stage"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="score-display">⭐ <span id="score">0</span></div>
    <div id="combo-display"></div>
    <div id="monkey">🐵</div>
    <div id="notes-area"></div>
    <div id="preview-area"></div>
    <div id="lanes">
      <button class="lane-btn lane-0" data-lane="0" ontouchstart="hitLane(0, event)" onmousedown="hitLane(0, event)">🍎</button>
      <button class="lane-btn lane-1" data-lane="1" ontouchstart="hitLane(1, event)" onmousedown="hitLane(1, event)">🐸</button>
      <button class="lane-btn lane-2" data-lane="2" ontouchstart="hitLane(2, event)" onmousedown="hitLane(2, event)">🌟</button>
      <button class="lane-btn lane-3" data-lane="3" ontouchstart="hitLane(3, event)" onmousedown="hitLane(3, event)">💜</button>
    </div>
    <button id="pause-btn" onclick="togglePause()">⏸</button>
  </div>

  <!-- GUIDE OVERLAY -->
  <div id="guide-overlay">
    <div class="guide-title">🐵 怎么玩？</div>
    <div class="guide-steps">
      <span>🎵</span> 彩色音符会落下来<br>
      <span>👆</span> 看到音符按对应颜色的按钮<br>
      <span>⭐</span> 越准时分数越高！<br>
      <span>🔥</span> 连续正确有连击奖励！
    </div>
    <button class="guide-start-btn" onclick="dismissGuide()">我准备好了！🐵</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">太棒了！</div>
    <div class="result-score" id="result-score">得分：100</div>
    <div class="stars-row" id="result-stars">⭐⭐⭐</div>
    <div class="result-stats">
      <div class="stat-item">
        <div class="stat-value" id="stat-perfect">0</div>
        <div class="stat-label">完美 ✨</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-good">0</div>
        <div class="stat-label">不错 👍</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-combo">0</div>
        <div class="stat-label">最高连击 🔥</div>
      </div>
    </div>
    <button class="play-again-btn" onclick="playAgain()">再来一次 🎶</button>
    <button class="back-btn" onclick="goHome()">返回首页 🏠</button>
  </div>

</div>

<script>
// ===== AUDIO ENGINE (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Pentatonic scale notes for pleasant sounds
const NOTES_FREQ = {
  0: 523.25, // C5 - Red
  1: 587.33, // D5 - Teal
  2: 659.25, // E5 - Yellow
  3: 783.99, // G5 - Purple
};

function playNote(lane) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = NOTES_FREQ[lane];
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playHitSound(quality) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  if (quality === 'perfect') {
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  } else {
    osc.type = 'sine';
    osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  }
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

function playMissSound() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 150;
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playCelebration() {
  ensureAudio();
  const melody = [523.25, 659.25, 783.99, 1046.5];
  melody.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.12);
    osc.stop(audioCtx.currentTime + i * 0.12 + 0.35);
  });
}

function playComboSound(combo) {
  ensureAudio();
  const baseFreq = 440 + combo * 40;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = Math.min(baseFreq, 1200);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

// Beat (metronome-like)
let beatInterval = null;
let beatCount = 0;

function startBeat(bpm) {
  const interval = 60000 / bpm;
  beatCount = 0;
  beatInterval = setInterval(() => {
    if (state.paused) return;
    beatCount++;
    // subtle tick
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = beatCount % 4 === 1 ? 800 : 600;
    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.06);
  }, interval);
}

function stopBeat() {
  if (beatInterval) clearInterval(beatInterval);
  beatInterval = null;
}

// ===== GAME STATE =====
const state = {
  difficulty: 0,
  score: 0,
  combo: 0,
  maxCombo: 0,
  perfect: 0,
  good: 0,
  miss: 0,
  paused: false,
  running: false,
  notes: [],
  songIndex: 0,
  songLength: 0,
  noteIdCounter: 0,
  startTime: 0,
  lastNoteTime: 0,
  noteSpeed: 0,
  hitZoneY: 0,
};

// Difficulty settings
const DIFFICULTY = [
  { // Easy
    bpm: 80,
    noteSpeed: 0.4, // px per ms
    hitWindowPerfect: 120,
    hitWindowGood: 250,
    songLength: 16,
    lanes: 2, // only 2 lanes
    restChance: 0.3,
  },
  { // Medium
    bpm: 110,
    noteSpeed: 0.55,
    hitWindowPerfect: 100,
    hitWindowGood: 200,
    songLength: 24,
    lanes: 3,
    restChance: 0.2,
  },
  { // Hard
    bpm: 140,
    noteSpeed: 0.7,
    hitWindowPerfect: 80,
    hitWindowGood: 160,
    songLength: 32,
    lanes: 4,
    restChance: 0.15,
  },
];

// Song patterns (lane indices per beat)
// Each pattern is a sequence of arrays (can have multiple notes per beat)
function generateSong(difficulty) {
  const settings = DIFFICULTY[difficulty];
  const numLanes = settings.lanes;
  const song = [];
  const patterns = generatePatterns(numLanes);
  let beatIdx = 0;

  // Intro: single notes slow
  for (let i = 0; i < 4; i++) {
    song.push([i % numLanes]);
    beatIdx++;
  }

  // Main: use patterns with rests
  while (beatIdx < settings.songLength - 4) {
    if (Math.random() < settings.restChance) {
      song.push([]); // rest
    } else {
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      for (const note of pattern) {
        if (beatIdx >= settings.songLength - 4) break;
        song.push([note]);
        beatIdx++;
      }
    }
    beatIdx++;
  }

  // Ending: clear finish
  for (let i = 0; i < 4; i++) {
    song.push([i % numLanes]);
  }

  return song;
}

function generatePatterns(numLanes) {
  const patterns = [];
  // Simple repeating patterns
  for (let i = 0; i < numLanes; i++) {
    patterns.push([i]);
  }
  // Two-note sequences
  for (let i = 0; i < numLanes; i++) {
    patterns.push([i, (i + 1) % numLanes]);
    patterns.push([i, (i + numLanes - 1) % numLanes]);
  }
  // Three-note ascending
  if (numLanes >= 3) {
    for (let i = 0; i <= numLanes - 3; i++) {
      patterns.push([i, i + 1, i + 2]);
    }
  }
  return patterns;
}

// ===== DOM REFS =====
const $startScreen = document.getElementById('start-screen');
const $gameScreen = document.getElementById('game-screen');
const $resultScreen = document.getElementById('result-screen');
const $guideOverlay = document.getElementById('guide-overlay');
const $monkey = document.getElementById('monkey');
const $notesArea = document.getElementById('notes-area');
const $scoreDisplay = document.getElementById('score');
const $comboDisplay = document.getElementById('combo-display');
const $progressFill = document.getElementById('progress-fill');
const $lanes = document.getElementById('lanes');
const $bgStars = document.getElementById('bg-stars');

// ===== INIT =====
function init() {
  // Generate background stars
  for (let i = 0; i < 30; i++) {
    const star = document.createElement('div');
    star.className = 'bg-star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 60 + '%';
    star.style.animationDelay = Math.random() * 2 + 's';
    star.style.width = star.style.height = (2 + Math.random() * 4) + 'px';
    $bgStars.appendChild(star);
  }
}

// ===== DIFFICULTY =====
function setDifficulty(d, btn) {
  state.difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Update lanes visibility
  const laneBtns = document.querySelectorAll('.lane-btn');
  const numLanes = DIFFICULTY[d].lanes;
  laneBtns.forEach((btn, i) => {
    btn.style.display = i < numLanes ? 'flex' : 'none';
  });
}

// ===== START GAME =====
function startGame() {
  ensureAudio();
  $startScreen.classList.add('hidden');
  $gameScreen.classList.add('active');

  // Show lanes based on difficulty
  const settings = DIFFICULTY[state.difficulty];
  const laneBtns = document.querySelectorAll('.lane-btn');
  laneBtns.forEach((btn, i) => {
    btn.style.display = i < settings.lanes ? 'flex' : 'none';
  });

  // Show guide on first play
  const hasPlayed = localStorage.getItem('rhythm-monkey-played');
  if (!hasPlayed) {
    $guideOverlay.classList.add('active');
  } else {
    beginRound();
  }
}

function dismissGuide() {
  $guideOverlay.classList.remove('active');
  localStorage.setItem('rhythm-monkey-played', '1');
  beginRound();
}

function beginRound() {
  // Reset state
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.perfect = 0;
  state.good = 0;
  state.miss = 0;
  state.paused = false;
  state.running = true;
  state.notes = [];
  state.noteIdCounter = 0;
  $scoreDisplay.textContent = '0';
  $comboDisplay.classList.remove('show');
  $progressFill.style.width = '0%';
  $notesArea.innerHTML = '';

  const settings = DIFFICULTY[state.difficulty];
  state.noteSpeed = settings.noteSpeed;
  state.hitZoneY = window.innerHeight * 0.82; // just above lane buttons

  // Generate song
  const song = generateSong(state.difficulty);
  state.songLength = song.length;

  const beatInterval = 60000 / settings.bpm;
  state.startTime = performance.now() + 2000; // 2 second countdown

  // Schedule notes
  song.forEach((lanes, beatIdx) => {
    if (lanes.length === 0) return;
    const noteTime = state.startTime + beatIdx * beatInterval;
    lanes.forEach(lane => {
      scheduleNote(lane, noteTime, beatIdx);
    });
  });

  // Start beat
  startBeat(settings.bpm);

  // Start game loop
  requestAnimationFrame(gameLoop);
}

// ===== SCHEDULE NOTE =====
function scheduleNote(lane, targetTime, beatIndex) {
  const note = {
    id: state.noteIdCounter++,
    lane: lane,
    targetTime: targetTime,
    y: -60,
    hit: false,
    missed: false,
    element: null,
    beatIndex: beatIndex,
  };

  // Create DOM element
  const el = document.createElement('div');
  el.className = `note note-${lane}`;
  el.innerHTML = ['🍎', '🐸', '🌟', '💜'][lane];
  const size = Math.min(window.innerWidth * 0.15, 70);
  el.style.width = size + 'px';
  el.style.height = size + 'px';

  // Position horizontally
  const settings = DIFFICULTY[state.difficulty];
  const numLanes = settings.lanes;
  const laneWidth = window.innerWidth / numLanes;
  el.style.left = (lane * laneWidth + laneWidth / 2 - size / 2) + 'px';

  el.style.top = '-70px';
  $notesArea.appendChild(el);
  note.element = el;

  state.notes.push(note);
}

// ===== GAME LOOP =====
let lastFrameTime = 0;

function gameLoop(timestamp) {
  if (!state.running) return;
  if (state.paused) {
    requestAnimationFrame(gameLoop);
    return;
  }

  const dt = timestamp - lastFrameTime;
  lastFrameTime = timestamp;

  const now = performance.now();
  const settings = DIFFICULTY[state.difficulty];

  // Update each note
  for (let i = state.notes.length - 1; i >= 0; i--) {
    const note = state.notes[i];
    if (note.hit || note.missed) continue;

    // Calculate Y position based on time
    const timeDiff = note.targetTime - now;
    const distFromHit = timeDiff * state.noteSpeed;
    note.y = state.hitZoneY - distFromHit;

    note.element.style.top = note.y + 'px';

    // Check if note passed hit zone (missed)
    if (note.y > state.hitZoneY + 80) {
      note.missed = true;
      note.element.classList.add('miss');
      state.miss++;
      state.combo = 0;
      updateComboDisplay();
      playMissSound();
      $monkey.className = '';
      void $monkey.offsetWidth;
      $monkey.classList.add('miss');

      // Remove after animation
      setTimeout(() => {
        if (note.element.parentNode) note.element.remove();
        const idx = state.notes.indexOf(note);
        if (idx >= 0) state.notes.splice(idx, 1);
      }, 400);
    }
  }

  // Update progress
  const elapsed = now - state.startTime;
  const totalDuration = state.songLength * (60000 / settings.bpm);
  const progress = Math.min(elapsed / totalDuration * 100, 100);
  $progressFill.style.width = progress + '%';

  // Check if song is done
  if (elapsed > totalDuration + 1000 && state.notes.every(n => n.hit || n.missed)) {
    endGame();
    return;
  }

  requestAnimationFrame(gameLoop);
}

// ===== HIT LANE =====
function hitLane(lane, event) {
  if (event) event.preventDefault();
  if (!state.running || state.paused) return;

  ensureAudio();
  playNote(lane);

  // Visual feedback on button
  const btn = document.querySelector(`.lane-btn[data-lane="${lane}"]`);
  btn.classList.remove('lit');
  void btn.offsetWidth;
  btn.classList.add('lit');
  setTimeout(() => btn.classList.remove('lit'), 200);

  const now = performance.now();
  const settings = DIFFICULTY[state.difficulty];

  // Find closest unhit note in this lane
  let closestNote = null;
  let closestDist = Infinity;

  for (const note of state.notes) {
    if (note.hit || note.missed || note.lane !== lane) continue;
    const dist = Math.abs(now - note.targetTime);
    if (dist < closestDist) {
      closestDist = dist;
      closestNote = note;
    }
  }

  if (!closestNote) return;

  const timeDiff = Math.abs(now - closestNote.targetTime);

  if (timeDiff <= settings.hitWindowPerfect) {
    // PERFECT hit!
    closestNote.hit = true;
    state.perfect++;
    state.combo++;
    const comboBonus = Math.floor(state.combo / 3);
    state.score += 100 + comboBonus * 20;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    closestNote.element.classList.add('perfect');
    playHitSound('perfect');
    if (state.combo >= 3) playComboSound(state.combo);

    // Monkey dance
    $monkey.className = '';
    void $monkey.offsetWidth;
    $monkey.classList.add('dancing');

    // Show effect
    showHitEffect(closestNote, 'perfect');
    spawnStarParticles(closestNote);
    updateComboDisplay();

    setTimeout(() => {
      if (closestNote.element.parentNode) closestNote.element.remove();
      const idx = state.notes.indexOf(closestNote);
      if (idx >= 0) state.notes.splice(idx, 1);
    }, 300);

  } else if (timeDiff <= settings.hitWindowGood) {
    // GOOD hit
    closestNote.hit = true;
    state.good++;
    state.combo++;
    const comboBonus = Math.floor(state.combo / 3);
    state.score += 50 + comboBonus * 10;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    closestNote.element.classList.add('good');
    playHitSound('good');
    if (state.combo >= 3) playComboSound(state.combo);

    $monkey.className = '';
    void $monkey.offsetWidth;
    $monkey.classList.add('dancing');

    showHitEffect(closestNote, 'good');
    updateComboDisplay();

    setTimeout(() => {
      if (closestNote.element.parentNode) closestNote.element.remove();
      const idx = state.notes.indexOf(closestNote);
      if (idx >= 0) state.notes.splice(idx, 1);
    }, 300);
  }

  $scoreDisplay.textContent = state.score;
}

// ===== HIT EFFECTS =====
function showHitEffect(note, quality) {
  const eff = document.createElement('div');
  eff.className = `hit-effect hit-${quality}`;
  eff.textContent = quality === 'perfect' ? '完美! ✨' : '不错! 👍';
  const rect = note.element.getBoundingClientRect();
  eff.style.left = rect.left + rect.width / 2 - 40 + 'px';
  eff.style.top = rect.top - 10 + 'px';
  eff.style.width = '80px';
  eff.style.textAlign = 'center';
  document.getElementById('game-container').appendChild(eff);
  setTimeout(() => eff.remove(), 800);
}

function spawnStarParticles(note) {
  const rect = note.element.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['⭐', '✨', '🌟', '💫'];

  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'star-particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 / 6) * i;
    const dist = 40 + Math.random() * 40;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.animation = `star-burst 0.6s ease-out forwards`;
    // Override animation with custom end position
    p.animate([
      { transform: 'translate(0, 0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0.3)`, opacity: 0 }
    ], { duration: 500, easing: 'ease-out', fill: 'forwards' });
    document.getElementById('game-container').appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

function updateComboDisplay() {
  if (state.combo >= 3) {
    $comboDisplay.textContent = `🔥 ${state.combo} 连击!`;
    $comboDisplay.classList.add('show');
    // Re-trigger animation
    $comboDisplay.style.animation = 'none';
    void $comboDisplay.offsetWidth;
    $comboDisplay.style.animation = '';
    $comboDisplay.classList.remove('show');
    void $comboDisplay.offsetWidth;
    $comboDisplay.classList.add('show');
  } else {
    $comboDisplay.classList.remove('show');
  }
}

// ===== PAUSE =====
function togglePause() {
  state.paused = !state.paused;
  document.getElementById('pause-btn').textContent = state.paused ? '▶' : '⏸';
}

// ===== END GAME =====
function endGame() {
  state.running = false;
  stopBeat();

  const total = state.perfect + state.good + state.miss;
  const accuracy = total > 0 ? (state.perfect + state.good) / total : 0;
  const starCount = accuracy >= 0.9 ? 3 : accuracy >= 0.7 ? 2 : 1;

  // Determine result message
  let emoji, title;
  if (accuracy >= 0.9) { emoji = '🏆'; title = '超级明星！'; }
  else if (accuracy >= 0.7) { emoji = '🎉'; title = '太棒了！'; }
  else if (accuracy >= 0.5) { emoji = '😊'; title = '做得不错！'; }
  else { emoji = '💪'; title = '继续加油！'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `得分：${state.score}`;
  document.getElementById('result-stars').textContent = '⭐'.repeat(starCount) + '☆'.repeat(3 - starCount);
  document.getElementById('stat-perfect').textContent = state.perfect;
  document.getElementById('stat-good').textContent = state.good;
  document.getElementById('stat-combo').textContent = state.maxCombo;

  $gameScreen.classList.remove('active');
  $resultScreen.classList.add('active');

  playCelebration();
  if (accuracy >= 0.7) spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6C5CE7', '#FF8E53', '#a8e6cf'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = -10 + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.animationDuration = (1.5 + Math.random()) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.getElementById('result-screen').appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

function playAgain() {
  $resultScreen.classList.remove('active');
  $gameScreen.classList.add('active');
  beginRound();
}

function goHome() {
  $resultScreen.classList.remove('active');
  $gameScreen.classList.remove('active');
  $startScreen.classList.remove('hidden');
  stopBeat();
}

// ===== KEYBOARD SUPPORT =====
document.addEventListener('keydown', (e) => {
  if (!state.running) return;
  const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
  const lane = keyMap[e.key.toLowerCase()];
  if (lane !== undefined) {
    const settings = DIFFICULTY[state.difficulty];
    if (lane < settings.lanes) {
      hitLane(lane, null);
    }
  }
  if (e.key === 'Escape') togglePause();
});

// Prevent scrolling
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

// Handle resize
window.addEventListener('resize', () => {
  state.hitZoneY = window.innerHeight * 0.82;
});

// ===== INIT =====
init();

// Set default lanes
setDifficulty(0, document.querySelector('.diff-btn'));
</script>
</body>
