<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>合作小帮手 - Cooperation Helper</title>
  <style>
    :root {
      --bg1: #a8e6cf;
      --bg2: #ffd3b6;
      --bg3: #dcedc1;
      --card: rgba(255,255,255,0.93);
      --text: #2d3436;
      --shadow: 0 12px 32px rgba(45,52,54,0.15);
      --good: #00b894;
      --warn: #fdcb6e;
      --bear: #e17055;
      --bunny: #a29bfe;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background:
        radial-gradient(circle at 15% 25%, rgba(255,255,255,0.30) 0 12%, transparent 13%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.22) 0 10%, transparent 11%),
        radial-gradient(circle at 60% 85%, rgba(255,255,255,0.18) 0 12%, transparent 13%),
        linear-gradient(140deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      touch-action: none;
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.3;
      pointer-events: none;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      gap: 8px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      z-index: 2;
    }
    .pill {
      background: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 8px 14px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
      font-size: clamp(14px, 2vw, 18px);
    }
    .score-stars {
      font-size: clamp(16px, 2.4vw, 24px);
      letter-spacing: 2px;
    }

    /* ── Scene area ── */
    .scene {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .task-label {
      font-size: clamp(18px, 3.5vw, 30px);
      font-weight: 900;
      color: white;
      text-shadow: 0 3px 0 rgba(0,0,0,0.10);
      text-align: center;
      margin-bottom: 6px;
      z-index: 2;
    }

    .scene-canvas {
      position: relative;
      width: min(100%, 500px);
      aspect-ratio: 4/3;
      max-height: 45vh;
      background: rgba(255,255,255,0.35);
      border-radius: 24px;
      border: 3px solid rgba(255,255,255,0.5);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-emoji {
      font-size: clamp(60px, 12vw, 120px);
      filter: drop-shadow(0 8px 0 rgba(0,0,0,0.08));
      transition: transform 0.3s ease;
    }

    .scene-emoji.bounce {
      animation: bigBounce 0.5s ease;
    }

    @keyframes bigBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); }
      60% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .scene-characters {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 3;
    }

    .char {
      font-size: clamp(40px, 8vw, 70px);
      filter: drop-shadow(0 4px 0 rgba(0,0,0,0.06));
      animation: charBob 2s ease-in-out infinite;
    }
    .char:nth-child(2) { animation-delay: 0.5s; }

    @keyframes charBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .progress-bar {
      width: min(90%, 400px);
      height: 14px;
      background: rgba(255,255,255,0.45);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
      border: 2px solid rgba(255,255,255,0.5);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b894, #55efc4);
      border-radius: 999px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Instruction ── */
    .instruction {
      text-align: center;
      font-size: clamp(16px, 3vw, 24px);
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.08);
      min-height: 1.4em;
      z-index: 2;
    }

    /* ── Action buttons area ── */
    .actions {
      display: flex;
      gap: 14px;
      padding: 4px 0;
      z-index: 2;
    }

    .action-btn {
      flex: 1;
      max-width: 280px;
      min-height: clamp(100px, 18vh, 150px);
      border: none;
      border-radius: 28px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 10px 0 rgba(0,0,0,0.12), 0 16px 28px rgba(0,0,0,0.10);
    }

    .action-btn::after {
      content: "";
      position: absolute;
      top: -20%;
      left: -15%;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.40);
      filter: blur(3px);
      pointer-events: none;
    }

    .action-btn:active, .action-btn.pressed {
      transform: translateY(6px);
      box-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 6px 12px rgba(0,0,0,0.08);
    }

    .action-btn.disabled {
      pointer-events: none;
      opacity: 0.5;
      filter: grayscale(0.3);
    }

    .action-btn.active-pulse {
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .action-btn .emoji {
      font-size: clamp(36px, 7vw, 56px);
      line-height: 1;
    }

    .action-btn .label {
      font-size: clamp(16px, 2.8vw, 24px);
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.10);
    }

    .action-btn .role {
      font-size: clamp(12px, 2vw, 16px);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    .btn-bear {
      background: linear-gradient(180deg, #fab1a0, #e17055);
    }

    .btn-bunny {
      background: linear-gradient(180deg, #a29bfe, #6c5ce7);
    }

    .btn-both {
      background: linear-gradient(135deg, #fab1a0 0%, #a29bfe 100%);
    }

    /* ── Waiting indicator ── */
    .wait-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      margin: 0 3px;
      animation: waitPulse 1s ease-in-out infinite;
    }
    .wait-dot:nth-child(2) { animation-delay: 0.2s; }
    .wait-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes waitPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ── Feedback ── */
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 30;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 0 rgba(0,0,0,0.12);
      pointer-events: none;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .feedback.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* ── Overlays ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: linear-gradient(160deg, rgba(168,230,207,0.98), rgba(255,211,182,0.96));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.hidden { display: none; }

    .overlay-card {
      width: min(680px, 100%);
      background: rgba(255,255,255,0.96);
      border-radius: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      padding: 28px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .overlay-card::before {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      right: -40px;
      top: -50px;
      border-radius: 50%;
      background: rgba(168,230,207,0.3);
      pointer-events: none;
    }

    .overlay-card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      left: -30px;
      bottom: -40px;
      border-radius: 50%;
      background: rgba(255,211,182,0.3);
      pointer-events: none;
    }

    .ov-title {
      font-size: clamp(28px, 5.5vw, 48px);
      color: var(--good);
      margin-bottom: 6px;
      font-weight: 900;
    }

    .ov-subtitle {
      font-size: clamp(14px, 2.5vw, 20px);
      color: var(--text);
      margin-bottom: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .ov-big-emoji {
      font-size: clamp(56px, 10vw, 100px);
      margin: 6px 0 10px;
    }

    .ov-btn {
      border: none;
      background: linear-gradient(180deg, #55efc4, #00b894);
      color: white;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 900;
      border-radius: 999px;
      padding: 14px 32px;
      box-shadow: 0 8px 0 #009b77, 0 14px 24px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      font-family: inherit;
    }

    .ov-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #009b77, 0 6px 10px rgba(0,0,0,0.10);
    }

    .ov-result-stars {
      font-size: clamp(32px, 6vw, 52px);
      margin: 8px 0 10px;
      letter-spacing: 4px;
    }

    .ov-result-text {
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Player icons row ── */
    .players-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px 0;
    }
    .player-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .player-icon .p-emoji { font-size: 48px; }
    .player-icon .p-name { font-size: 16px; font-weight: 800; }

    /* ── Stars / sparkle ── */
    .star {
      position: fixed;
      z-index: 40;
      pointer-events: none;
      font-size: 26px;
      animation: starFly 900ms ease-out forwards;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,0.06));
    }

    .sparkle {
      position: fixed;
      z-index: 35;
      pointer-events: none;
      font-size: 22px;
      animation: sparklePop 650ms ease-out forwards;
    }

    .confetti {
      position: fixed;
      z-index: 38;
      pointer-events: none;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall 1.5s ease-out forwards;
    }

    @keyframes starFly {
      0% { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.3) rotate(200deg); }
    }

    @keyframes sparklePop {
      0% { opacity: 1; transform: translate(0, 0) scale(0.3); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.0); }
    }

    @keyframes confettiFall {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(720deg) scale(0.3); }
    }

    /* ── Responsive ── */
    @media (max-height: 600px) {
      .scene-canvas { max-height: 30vh; }
      .action-btn { min-height: 80px; }
      .app { gap: 4px; }
    }

    @media (max-width: 400px) {
      .app { padding: 8px; }
      .action-btn { border-radius: 20px; }
      .scene-canvas { border-radius: 18px; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="pill">🎯 第 <span id="taskNum">1</span>/<span id="taskTotal">6</span> 关</div>
    <div class="pill">⭐ <span id="stars" class="score-stars">☆☆☆☆☆</span></div>
    <div class="pill" id="diffLabel">简单</div>
  </div>

  <!-- Scene -->
  <div class="scene">
    <div id="taskLabel" class="task-label">一起搬箱子</div>
    <div class="scene-canvas" id="sceneCanvas">
      <div id="sceneEmoji" class="scene-emoji">📦</div>
      <div class="scene-characters">
        <div class="char" id="charBear">🐻</div>
        <div class="char" id="charBunny">🐰</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Instruction -->
  <div id="instruction" class="instruction">小熊和小兔一起搬箱子！</div>

  <!-- Action buttons -->
  <div class="actions" id="actionsArea">
    <!-- Dynamically filled -->
  </div>
</div>

<!-- Start overlay -->
<div id="startOverlay" class="overlay">
  <div class="overlay-card">
    <div class="ov-title">合作小帮手</div>
    <div class="ov-big-emoji">🤝</div>
    <div class="ov-subtitle">
      和爸爸妈妈一起玩游戏吧！<br>
      两个人合作才能完成任务哦！
    </div>
    <div class="players-row">
      <div class="player-icon">
        <div class="p-emoji">🐻</div>
        <div class="p-name" style="color:var(--bear)">小熊</div>
      </div>
      <div class="player-icon">
        <div class="p-emoji">❤️</div>
        <div class="p-name">一起</div>
      </div>
      <div class="player-icon">
        <div class="p-emoji">🐰</div>
        <div class="p-name" style="color:var(--bunny)">小兔</div>
      </div>
    </div>
    <button id="startBtn" class="ov-btn">🤝 开始合作！</button>
  </div>
</div>

<!-- Result overlay -->
<div id="resultOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="ov-title" id="resultTitle">太棒了！</div>
    <div class="ov-result-stars" id="resultStars">★★★★★</div>
    <div class="ov-result-text" id="resultText">你们合作得真好！</div>
    <button id="restartBtn" class="ov-btn">🔄 再玩一次</button>
  </div>
</div>

<!-- Feedback text -->
<div id="feedback" class="feedback"></div>

<script>
// ═══════════════════════════════════════════
// 合作小帮手 - Cooperation Helper
// 社交情感类双人协作游戏
// ═══════════════════════════════════════════

/* ── Audio ── */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(notes, type = 'triangle', vol = 0.14) {
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now + i * 0.09);
    gain.gain.setValueAtTime(0.001, now + i * 0.09);
    gain.gain.exponentialRampToValueAtTime(vol, now + i * 0.09 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.09 + 0.20);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.09);
    osc.stop(now + i * 0.09 + 0.22);
  });
}

function playSuccess() { playTone([523.25, 659.25, 783.99]); setTimeout(() => playTone([880, 1046.5]), 200); }
function playStep() { playTone([440, 554.37], 'sine', 0.10); }
function playTap() { playTone([660], 'sine', 0.08); }
function playCelebrate() { playTone([523, 659, 784, 1047, 1319]); }

/* ── VFX ── */
function starBurst(x, y, count = 14) {
  const symbols = ['⭐', '✨', '💫', '🌟'];
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = symbols[i % symbols.length];
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 120;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function confettiBurst(x, y, count = 20) {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9ff3','#ff6348'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = x + 'px';
    c.style.top = y + 'px';
    c.style.background = colors[i % colors.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 160;
    c.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    c.style.setProperty('--ty', Math.sin(angle) * dist - 60 + 'px');
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1600);
  }
}

function showFeedback(text) {
  const fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.classList.add('show');
  setTimeout(() => fb.classList.remove('show'), 800);
}

/* ── Game State ── */
const state = {
  taskIndex: 0,
  stars: 0,
  busy: false,
  step: 0,
  waitingFor: null, // 'both' | 'bear' | 'bunny' | null
  bearTapped: false,
  bunnyTapped: false,
  bothTimer: null,
  stepsDone: 0,
  totalSteps: 0,
};

/* ── Task Definitions ── */
const tasks = [
  {
    // Task 1: Both tap together to lift a box
    id: 'lift-box',
    label: '一起搬箱子',
    emoji: '📦',
    instruction: '两个人一起点，把箱子搬起来！',
    type: 'simultaneous', // both players must tap at the same time
    steps: 3, // need 3 simultaneous taps
    stepLabel: ['用力搬！','再搬一下！','最后一下！'],
    sceneEmojis: ['📦','🎒','🎁'],
  },
  {
    // Task 2: Take turns building a bridge
    id: 'build-bridge',
    label: '一起搭桥',
    emoji: '🌉',
    instruction: '轮流放木板，搭一座桥！',
    type: 'turns', // players take turns
    turns: ['bear','bunny','bear','bunny'], // alternating
    turnLabels: ['小熊放一块木板','小兔放一块木板','小熊再放一块','小兔再放一块'],
    sceneEmojis: ['🪵','🪵','🪵','🪵'],
    finalEmoji: '🌉',
  },
  {
    // Task 3: Sequential roles - plant a flower
    id: 'plant-flower',
    label: '一起种花',
    emoji: '🌻',
    instruction: '合作种出一朵美丽的花！',
    type: 'sequence', // specific player does specific step
    sequence: [
      { player: 'bear', label: '小熊挖一个坑', emoji: '🕳️' },
      { player: 'bunny', label: '小兔放进种子', emoji: '🌱' },
      { player: 'bear', label: '小熊浇浇水', emoji: '💧' },
      { player: 'bunny', label: '小兔晒太阳', emoji: '☀️' },
    ],
    finalEmoji: '🌻',
  },
  {
    // Task 4: Both do different things - make a cake
    id: 'make-cake',
    label: '一起做蛋糕',
    emoji: '🎂',
    instruction: '两个人一起做蛋糕！',
    type: 'sequence',
    sequence: [
      { player: 'bear', label: '小熊加面粉', emoji: '🌾' },
      { player: 'bunny', label: '小兔加鸡蛋', emoji: '🥚' },
      { player: 'bear', label: '小熊加糖', emoji: '🍬' },
      { player: 'both', label: '一起搅拌！', emoji: '🥄' },
    ],
    finalEmoji: '🎂',
  },
  {
    // Task 5: Share and take turns - eat cookies
    id: 'share-cookies',
    label: '一起分饼干',
    emoji: '🍪',
    instruction: '轮流分饼干给好朋友！',
    type: 'turns',
    turns: ['bear','bunny','bear','bunny','bear','bunny'],
    turnLabels: [
      '小熊分给小兔一块','小兔分给小熊一块',
      '小熊分给小狗一块','小兔分给小猫一块',
      '小熊自己吃一块','小兔自己吃一块'
    ],
    sceneEmojis: ['🍪','🍪','🍪','🍪','🍪','🍪'],
    finalEmoji: '😋',
  },
  {
    // Task 6: Celebration - both tap for fireworks
    id: 'celebrate',
    label: '一起庆祝',
    emoji: '🎉',
    instruction: '两个人一起点，放烟花庆祝！',
    type: 'simultaneous',
    steps: 3,
    stepLabel: ['放烟花！','再来一次！','最后一次！'],
    sceneEmojis: ['🎆','🎇','🎆'],
  },
];

/* ── DOM refs ── */
const $ = id => document.getElementById(id);
const taskNumEl = $('taskNum');
const taskTotalEl = $('taskTotal');
const starsEl = $('stars');
const diffLabelEl = $('diffLabel');
const taskLabelEl = $('taskLabel');
const sceneEmojiEl = $('sceneEmoji');
const progressFillEl = $('progressFill');
const instructionEl = $('instruction');
const actionsEl = $('actionsArea');
const charBear = $('charBear');
const charBunny = $('charBunny');

/* ── UI Updates ── */
function updateHeader() {
  taskNumEl.textContent = state.taskIndex + 1;
  taskTotalEl.textContent = tasks.length;
  starsEl.textContent = '★'.repeat(state.stars) + '☆'.repeat(5 - state.stars);
  const diff = state.taskIndex < 2 ? '简单' : state.taskIndex < 4 ? '中等' : '挑战';
  diffLabelEl.textContent = diff;
}

function setScene(emoji) {
  sceneEmojiEl.textContent = emoji;
  sceneEmojiEl.classList.remove('bounce');
  void sceneEmojiEl.offsetWidth; // reflow
  sceneEmojiEl.classList.add('bounce');
}

function setProgress(current, total) {
  progressFillEl.style.width = Math.min(100, (current / total) * 100) + '%';
}

/* ── Build Action Buttons ── */
function clearActions() {
  actionsEl.innerHTML = '';
}

function createButton(player, label, emoji) {
  const btn = document.createElement('button');
  const isBoth = player === 'both';
  const cls = isBoth ? 'btn-both' : player === 'bear' ? 'btn-bear' : 'btn-bunny';
  btn.className = `action-btn ${cls}`;
  btn.innerHTML = `
    <div class="emoji">${emoji}</div>
    <div class="label">${label}</div>
    <div class="role">${isBoth ? '一起点！' : player === 'bear' ? '🐻 小熊' : '🐰 小兔'}</div>
  `;
  return btn;
}

/* ── Task Logic ── */

// Simultaneous task: both players must tap within a time window
function startSimultaneousTask(task) {
  state.step = 0;
  state.bearTapped = false;
  state.bunnyTapped = false;
  state.totalSteps = task.steps;

  setScene(task.sceneEmojis[0]);
  setProgress(0, task.steps);
  instructionEl.textContent = task.instruction;

  const bearBtn = createButton('bear', '抬起！', '🐻');
  const bunnyBtn = createButton('bunny', '抬起！', '🐰');
  bearBtn.classList.add('active-pulse');
  bunnyBtn.classList.add('active-pulse');

  function resetTaps() {
    state.bearTapped = false;
    state.bunnyTapped = false;
    bearBtn.classList.remove('pressed','disabled');
    bunnyBtn.classList.remove('pressed','disabled');
    bearBtn.classList.add('active-pulse');
    bunnyBtn.classList.add('active-pulse');
  }

  function checkBoth() {
    if (state.bearTapped && state.bunnyTapped) {
      clearTimeout(state.bothTimer);
      state.step++;
      playSuccess();
      showFeedback(task.stepLabel[state.step - 1] || '太棒了！');
      starBurst(window.innerWidth / 2, window.innerHeight / 2, 10);
      setProgress(state.step, task.steps);

      if (state.step >= task.steps) {
        bearBtn.classList.add('disabled');
        bunnyBtn.classList.add('disabled');
        bearBtn.classList.remove('active-pulse');
        bunnyBtn.classList.remove('active-pulse');
        completeTask();
      } else {
        setScene(task.sceneEmojis[state.step]);
        instructionEl.textContent = task.stepLabel[state.step];
        setTimeout(resetTaps, 400);
      }
    }
  }

  bearBtn.addEventListener('pointerdown', () => {
    if (state.busy || state.bearTapped) return;
    ensureAudio();
    playTap();
    state.bearTapped = true;
    bearBtn.classList.add('pressed');
    bearBtn.classList.remove('active-pulse');
    // Start a window for the other player
    clearTimeout(state.bothTimer);
    state.bothTimer = setTimeout(() => {
      if (!state.bunnyTapped) {
        // Timeout - only bear tapped, show hint
        showFeedback('🐰 小兔也来帮忙！');
        state.bearTapped = false;
        bearBtn.classList.remove('pressed');
        bearBtn.classList.add('active-pulse');
      }
    }, 3000);
    checkBoth();
  });

  bunnyBtn.addEventListener('pointerdown', () => {
    if (state.busy || state.bunnyTapped) return;
    ensureAudio();
    playTap();
    state.bunnyTapped = true;
    bunnyBtn.classList.add('pressed');
    bunnyBtn.classList.remove('active-pulse');
    clearTimeout(state.bothTimer);
    state.bothTimer = setTimeout(() => {
      if (!state.bearTapped) {
        showFeedback('🐻 小熊也来帮忙！');
        state.bunnyTapped = false;
        bunnyBtn.classList.remove('pressed');
        bunnyBtn.classList.add('active-pulse');
      }
    }, 3000);
    checkBoth();
  });

  clearActions();
  actionsEl.appendChild(bearBtn);
  actionsEl.appendChild(bunnyBtn);
}

// Turn-based task: players alternate turns
function startTurnsTask(task) {
  state.step = 0;
  state.totalSteps = task.turns.length;
  const totalSteps = task.turns.length;

  setScene(task.sceneEmojis[0]);
  setProgress(0, totalSteps);
  instructionEl.textContent = task.instruction;

  function showTurn() {
    clearActions();
    const player = task.turns[state.step];
    const label = task.turnLabels[state.step];
    instructionEl.textContent = label;
    setScene(task.sceneEmojis[state.step]);

    const btn = createButton(player, '点这里！', player === 'bear' ? '🐻' : '🐰');
    btn.classList.add('active-pulse');

    btn.addEventListener('pointerdown', () => {
      if (state.busy) return;
      ensureAudio();
      playStep();
      state.step++;
      setProgress(state.step, totalSteps);
      starBurst(window.innerWidth / 2, window.innerHeight * 0.4, 8);
      showFeedback('✅');

      if (state.step >= totalSteps) {
        btn.classList.add('disabled');
        btn.classList.remove('active-pulse');
        if (task.finalEmoji) setScene(task.finalEmoji);
        completeTask();
      } else {
        setTimeout(showTurn, 500);
      }
    });

    actionsEl.appendChild(btn);
  }

  showTurn();
}

// Sequential task: specific player does each step
function startSequenceTask(task) {
  state.step = 0;
  state.totalSteps = task.sequence.length;
  const seq = task.sequence;

  setScene(seq[0].emoji);
  setProgress(0, seq.length);
  instructionEl.textContent = task.instruction;

  function showStep() {
    clearActions();
    const step = seq[state.step];
    instructionEl.textContent = step.label;
    setScene(step.emoji);

    if (step.player === 'both') {
      // Both need to tap simultaneously for this step
      const btn = createButton('both', '一起点！', '🤝');
      btn.classList.add('active-pulse');

      let tapCount = 0;
      btn.addEventListener('pointerdown', () => {
        if (state.busy) return;
        ensureAudio();
        tapCount++;
        playTap();
        if (tapCount >= 2) {
          state.step++;
          setProgress(state.step, seq.length);
          playSuccess();
          starBurst(window.innerWidth / 2, window.innerHeight * 0.4, 12);
          showFeedback('一起完成啦！');

          if (state.step >= seq.length) {
            btn.classList.add('disabled');
            btn.classList.remove('active-pulse');
            if (task.finalEmoji) setScene(task.finalEmoji);
            completeTask();
          } else {
            setTimeout(showStep, 500);
          }
        } else {
          showFeedback('再点一次！');
          btn.classList.remove('active-pulse');
          setTimeout(() => btn.classList.add('active-pulse'), 200);
        }
      });

      actionsEl.appendChild(btn);
    } else {
      const btn = createButton(step.player, '点这里！', step.player === 'bear' ? '🐻' : '🐰');
      btn.classList.add('active-pulse');

      btn.addEventListener('pointerdown', () => {
        if (state.busy) return;
        ensureAudio();
        playStep();
        state.step++;
        setProgress(state.step, seq.length);
        starBurst(window.innerWidth / 2, window.innerHeight * 0.4, 8);
        showFeedback('✅');

        if (state.step >= seq.length) {
          btn.classList.add('disabled');
          btn.classList.remove('active-pulse');
          if (task.finalEmoji) setScene(task.finalEmoji);
          completeTask();
        } else {
          setTimeout(showStep, 500);
        }
      });

      actionsEl.appendChild(btn);
    }
  }

  showStep();
}

/* ── Task Completion ── */
function completeTask() {
  state.busy = true;
  state.stars = Math.min(5, state.stars + 1);
  updateHeader();

  playCelebrate();
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  starBurst(cx, cy, 20);
  confettiBurst(cx, cy, 24);

  instructionEl.textContent = '🎉 合作成功！太棒了！';
  clearActions();

  setTimeout(() => {
    state.busy = false;
    state.taskIndex++;
    if (state.taskIndex >= tasks.length) {
      showResult();
    } else {
      startTask(state.taskIndex);
    }
  }, 1800);
}

/* ── Start Task ── */
function startTask(index) {
  const task = tasks[index];
  taskLabelEl.textContent = task.label;
  state.step = 0;
  state.busy = false;
  updateHeader();

  switch (task.type) {
    case 'simultaneous':
      startSimultaneousTask(task);
      break;
    case 'turns':
      startTurnsTask(task);
      break;
    case 'sequence':
      startSequenceTask(task);
      break;
  }
}

/* ── Result ── */
function showResult() {
  const earned = state.stars;
  $('resultStars').textContent = '★★★★★'.slice(0, earned) + '☆☆☆☆☆'.slice(0, 5 - earned);
  const praise = earned >= 5
    ? '你们是最棒的合作搭档！互相帮助，一起完成！'
    : earned >= 3
    ? '你们配合得很好！继续加油！'
    : '两个人一起努力，真了不起！';
  $('resultText').textContent = praise;
  $('resultOverlay').classList.remove('hidden');

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  setTimeout(() => {
    starBurst(cx, cy, 30);
    confettiBurst(cx, cy, 40);
    playCelebrate();
  }, 300);
  setTimeout(() => confettiBurst(cx - 80, cy + 40, 20), 800);
  setTimeout(() => confettiBurst(cx + 80, cy - 30, 20), 1200);
}

/* ── Game Init ── */
function startGame() {
  ensureAudio();
  $('startOverlay').classList.add('hidden');
  $('resultOverlay').classList.add('hidden');
  state.taskIndex = 0;
  state.stars = 0;
  state.busy = false;
  updateHeader();
  startTask(0);
}

$('startBtn').addEventListener('click', startGame);
$('restartBtn').addEventListener('click', startGame);
window.addEventListener('pointerdown', ensureAudio, { passive: true });
</script>
</body>
</html>
