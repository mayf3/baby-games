<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏀 3D投球游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* HUD overlay */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
        }

        .score-box .emoji {
            font-size: 28px;
        }

        .score-box .value {
            font-size: 32px;
            font-weight: bold;
            color: #FF6B6B;
        }

        .balls-left {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .balls-left .emoji {
            font-size: 24px;
        }

        .balls-left .value {
            font-size: 24px;
            font-weight: bold;
            color: #4ECDC4;
        }

        .combo-display {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            font-size: 56px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 0 #FF6B00, 6px 6px 0 rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transition: none;
        }

        .combo-display.show {
            animation: comboAnim 1.2s ease-out forwards;
        }

        @keyframes comboAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        /* Star burst particles */
        .star-particle {
            position: fixed;
            z-index: 15;
            font-size: 24px;
            pointer-events: none;
            animation: starFly 1s ease-out forwards;
        }

        @keyframes starFly {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }

        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .start-screen h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .start-screen .subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
        }

        .level-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-btn {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            min-width: 120px;
        }

        .level-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        .level-btn.easy {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d5016;
        }

        .level-btn.medium {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #8b4513;
        }

        .level-btn.hard {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #8b1a3f;
        }

        .level-btn .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }

        /* Game Over Screen */
        .gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .gameover-screen.show {
            display: flex;
        }

        .gameover-screen h2 {
            font-size: 42px;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }

        .gameover-screen .final-score {
            font-size: 64px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .gameover-screen .stats {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
        }

        .gameover-screen .stats div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .gameover-buttons {
            display: flex;
            gap: 15px;
        }

        .gameover-btn {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .gameover-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
        }

        .gameover-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Aim guide - shows drag direction */
        .aim-guide {
            position: fixed;
            background: rgba(255, 100, 100, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.8);
        }

        /* Power meter */
        .power-meter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            display: none;
            z-index: 10;
            border: 3px solid white;
        }

        .power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #84fab0 0%, #ffecd2 50%, #ff9a9e 100%);
            border-radius: 8px;
            transition: width 0.05s;
        }

        /* Hint text */
        .hint-text {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 18px;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            pointer-events: none;
            display: none;
            white-space: nowrap;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .start-screen h1 {
                font-size: 36px;
            }

            .start-screen .subtitle {
                font-size: 16px;
            }

            .level-buttons {
                gap: 10px;
            }

            .level-btn {
                padding: 15px 20px;
                font-size: 16px;
                min-width: 100px;
            }

            .level-btn .emoji {
                font-size: 24px;
            }

            .gameover-screen h2 {
                font-size: 32px;
            }

            .gameover-screen .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <h1>🏀 3D投球游戏</h1>
        <p class="subtitle">按住屏幕向上滑动投球！<br>锻炼距离感知和手眼协调能力</p>
        <div class="level-buttons">
            <button class="level-btn easy" onclick="startGame('easy')">
                <span class="emoji">😊</span>
                简单
            </button>
            <button class="level-btn medium" onclick="startGame('medium')">
                <span class="emoji">😃</span>
                中等
            </button>
            <button class="level-btn hard" onclick="startGame('hard')">
                <span class="emoji">😎</span>
                挑战
            </button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="gameover-screen" id="gameoverScreen">
        <h2>🎉 游戏结束！</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">
            <div>🎯 投进次数: <span id="finalHits">0</span></div>
            <div>🔥 最高连击: <span id="finalCombo">0</span></div>
            <div>⭐ 准确率: <span id="finalAccuracy">0%</span></div>
        </div>
        <div class="gameover-buttons">
            <button class="gameover-btn" onclick="showStartScreen()">返回主菜单</button>
            <button class="gameover-btn primary" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <!-- HUD -->
    <div class="hud" id="hud" style="display: none;">
        <div class="score-box">
            <span class="emoji">🏆</span>
            <span class="value" id="score">0</span>
        </div>
        <div class="balls-left">
            <span class="emoji">🏀</span>
            <span class="value" id="ballsLeft">5</span>
        </div>
    </div>

    <!-- Combo Display -->
    <div class="combo-display" id="comboDisplay"></div>

    <!-- Aim Guide -->
    <div class="aim-guide" id="aimGuide"></div>

    <!-- Power Meter -->
    <div class="power-meter" id="powerMeter">
        <div class="power-fill" id="powerFill"></div>
    </div>

    <!-- Hint -->
    <div class="hint-text" id="hintText">👆 按住向上滑投球！</div>

    <!-- 3D Canvas -->
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let gameState = {
            score: 0,
            ballsLeft: 5,
            hits: 0,
            misses: 0,
            combo: 0,
            maxCombo: 0,
            isDragging: false,
            currentLevel: 'easy',
            gameStarted: false
        };

        // Three.js variables
        let scene, camera, renderer;
        let ball, basket;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        let ballVelocity = { x: 0, y: 0, z: 0 };
        let isBallFlying = false;
        let animationId;
        let basketDirection = 1;
        let hasScored = false; // prevent double-scoring

        // Level configurations - easier for kids
        const levelConfigs = {
            easy: {
                basketZ: -6,
                basketRadius: 1.8,
                ballRadius: 0.4,
                basketMoves: false,
                balls: 6
            },
            medium: {
                basketZ: -9,
                basketRadius: 1.5,
                ballRadius: 0.4,
                basketMoves: true,
                basketSpeed: 0.012,
                balls: 6
            },
            hard: {
                basketZ: -12,
                basketRadius: 1.2,
                ballRadius: 0.4,
                basketMoves: true,
                basketSpeed: 0.02,
                balls: 6
            }
        };

        // Audio context for sound effects
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 'hit') {
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'miss') {
                    oscillator.frequency.setValueAtTime(250, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'throw') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                }
            } catch(e) {}
        }

        function initThreeJS() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 15, 50);

            // Camera - raised and angled to see the ball well
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4.5, 8);
            camera.lookAt(0, 1.5, -6);

            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('gameCanvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x7CFC00 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            ground.receiveShadow = true;
            scene.add(ground);

            // Decorations
            addDecorations();

            // Create ball
            createBall();

            // Create basket
            createBasket();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            setupInputHandlers();

            // Start animation loop
            animate();
        }

        function addDecorations() {
            const treePositions = [
                { x: -8, z: -15 }, { x: 8, z: -15 },
                { x: -12, z: -20 }, { x: 12, z: -20 },
                { x: -5, z: -18 }, { x: 5, z: -18 }
            ];

            treePositions.forEach(pos => {
                const tree = createTree();
                tree.position.set(pos.x, 0, pos.z);
                scene.add(tree);
            });

            for (let i = 0; i < 5; i++) {
                const cloud = createCloud();
                cloud.position.set(
                    (Math.random() - 0.5) * 30,
                    8 + Math.random() * 3,
                    -15 - Math.random() * 10
                );
                scene.add(cloud);
            }
        }

        function createTree() {
            const tree = new THREE.Group();
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.25;
            trunk.castShadow = true;
            tree.add(trunk);

            const foliageGeometry = new THREE.SphereGeometry(1, 8, 8);
            const foliageMaterial = new THREE.MeshLambertMaterial({ color: 0x228B22 });
            const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage.position.y = 1.5;
            foliage.castShadow = true;
            tree.add(foliage);

            return tree;
        }

        function createCloud() {
            const cloud = new THREE.Group();
            const cloudMaterial = new THREE.MeshLambertMaterial({ color: 0xffffff });

            for (let i = 0; i < 3; i++) {
                const cloudPart = new THREE.Mesh(
                    new THREE.SphereGeometry(0.8 + Math.random() * 0.4, 8, 8),
                    cloudMaterial
                );
                cloudPart.position.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                cloud.add(cloudPart);
            }

            return cloud;
        }

        // Ball resting position - raised up so it's visible
        const BALL_START = { x: 0, y: 1.5, z: 4 };

        function createBall() {
            const config = levelConfigs[gameState.currentLevel];
            const ballGeometry = new THREE.SphereGeometry(config.ballRadius, 32, 32);
            const ballMaterial = new THREE.MeshPhongMaterial({
                color: 0xFF6B35,
                shininess: 80,
                specular: 0x444444
            });
            ball = new THREE.Mesh(ballGeometry, ballMaterial);
            ball.position.set(BALL_START.x, BALL_START.y, BALL_START.z);
            ball.castShadow = true;
            scene.add(ball);

            // Add a glowing ring around the ball as a hint
            const ringGeometry = new THREE.TorusGeometry(0.6, 0.05, 8, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFF00, transparent: true, opacity: 0.6 });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            ring.name = 'ballHint';
            ball.add(ring);
        }

        function createBasket() {
            const config = levelConfigs[gameState.currentLevel];
            basket = new THREE.Group();

            // Backboard
            const backboardGeometry = new THREE.BoxGeometry(3, 2.5, 0.15);
            const backboardMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
            const backboard = new THREE.Mesh(backboardGeometry, backboardMaterial);
            backboard.position.set(0, 3.5, config.basketZ - 0.5);
            backboard.castShadow = true;
            basket.add(backboard);

            // Red square on backboard
            const sqGeometry = new THREE.BoxGeometry(1.2, 0.9, 0.02);
            const sqMaterial = new THREE.MeshBasicMaterial({ color: 0xFF4500 });
            const sq = new THREE.Mesh(sqGeometry, sqMaterial);
            sq.position.set(0, 2.8, config.basketZ - 0.42);
            basket.add(sq);

            // Rim
            const rimGeometry = new THREE.TorusGeometry(config.basketRadius, 0.08, 12, 32);
            const rimMaterial = new THREE.MeshPhongMaterial({ color: 0xFF4500 });
            const rim = new THREE.Mesh(rimGeometry, rimMaterial);
            rim.position.set(0, 2.2, config.basketZ);
            rim.rotation.x = Math.PI / 2;
            basket.add(rim);

            // Net
            const netGeometry = new THREE.CylinderGeometry(config.basketRadius, config.basketRadius * 0.4, 1.0, 16, 1, true);
            const netMaterial = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.6
            });
            const net = new THREE.Mesh(netGeometry, netMaterial);
            net.position.set(0, 1.7, config.basketZ);
            basket.add(net);

            // Pole
            const poleGeometry = new THREE.CylinderGeometry(0.12, 0.12, 5, 8);
            const poleMaterial = new THREE.MeshPhongMaterial({ color: 0x888888 });
            const pole = new THREE.Mesh(poleGeometry, poleMaterial);
            pole.position.set(0, 1.5, config.basketZ - 0.8);
            pole.castShadow = true;
            basket.add(pole);

            basket.position.set(0, 0, 0);
            scene.add(basket);
        }

        function setupInputHandlers() {
            const canvas = document.getElementById('gameCanvas');

            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('mousemove', onPointerMove);
            canvas.addEventListener('mouseup', onPointerUp);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onPointerDown(e.touches[0]);
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                onPointerMove(e.touches[0]);
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                // Use the last known dragEnd position
                onPointerUp(e);
            }, { passive: false });
        }

        function onPointerDown(event) {
            if (isBallFlying || gameState.ballsLeft <= 0 || !gameState.gameStarted) return;

            // ANY touch/click starts the drag — no need to aim at the ball
            gameState.isDragging = true;
            dragStart.x = event.clientX;
            dragStart.y = event.clientY;
            dragEnd.x = event.clientX;
            dragEnd.y = event.clientY;
        }

        function onPointerMove(event) {
            if (!gameState.isDragging) return;

            dragEnd.x = event.clientX;
            dragEnd.y = event.clientY;

            // Update aim guide
            const aimGuide = document.getElementById('aimGuide');
            const dx = dragStart.x - dragEnd.x;
            const dy = dragStart.y - dragEnd.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const power = Math.min(dist / 150, 1);

            // Show guide at the drag start point
            aimGuide.style.display = 'block';
            aimGuide.style.left = (dragStart.x - 15) + 'px';
            aimGuide.style.top = (dragStart.y - 15) + 'px';
            aimGuide.style.width = (30 + power * 30) + 'px';
            aimGuide.style.height = (30 + power * 30) + 'px';
            aimGuide.style.marginLeft = -(power * 15) + 'px';
            aimGuide.style.marginTop = -(power * 15) + 'px';

            // Update power meter
            document.getElementById('powerMeter').style.display = 'block';
            document.getElementById('powerFill').style.width = (power * 100) + '%';
        }

        function onPointerUp(event) {
            if (!gameState.isDragging) return;

            gameState.isDragging = false;
            document.getElementById('aimGuide').style.display = 'none';
            document.getElementById('powerMeter').style.display = 'none';

            const dx = dragStart.x - dragEnd.x;
            const dy = dragStart.y - dragEnd.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const power = Math.min(dist / 150, 1);

            // Only throw if dragged at least a bit upward
            if (power > 0.08 && dy > 20) {
                throwBall(dx, dy, power);
            }
        }

        function throwBall(dx, dy, power) {
            if (isBallFlying || gameState.ballsLeft <= 0) return;

            isBallFlying = true;
            hasScored = false;
            gameState.ballsLeft--;
            document.getElementById('ballsLeft').textContent = gameState.ballsLeft;

            // Hide hint after first throw
            document.getElementById('hintText').style.display = 'none';

            playSound('throw');

            // Hide the hint ring
            const hint = ball.getObjectByName('ballHint');
            if (hint) hint.visible = false;

            const config = levelConfigs[gameState.currentLevel];

            // Calculate throw direction
            // dy > 0 means dragged upward on screen → ball goes forward + up
            // dx controls left/right
            const clampedDx = Math.max(-200, Math.min(200, dx));

            // Main forward power: scale with drag distance
            const forwardSpeed = power * 0.6;
            // Upward arc: always give a nice arc
            const upSpeed = power * 0.32;
            // Side: based on horizontal drag
            const sideSpeed = -(clampedDx / 200) * power * 0.15;

            ballVelocity = {
                x: sideSpeed,
                y: upSpeed,
                z: -forwardSpeed
            };
        }

        function updateBall() {
            if (!isBallFlying) return;

            // Gravity
            ballVelocity.y -= 0.008;

            // Update position
            ball.position.x += ballVelocity.x;
            ball.position.y += ballVelocity.y;
            ball.position.z += ballVelocity.z;

            // Spin
            ball.rotation.x += ballVelocity.z * 0.15;
            ball.rotation.z -= ballVelocity.x * 0.15;

            // Score detection
            const config = levelConfigs[gameState.currentLevel];
            const basketX = basket.position.x;
            const basketY = 2.2;
            const basketZ = config.basketZ;

            // Check when ball passes through the rim plane
            if (!hasScored && ball.position.z <= basketZ + 0.3 && ball.position.z >= basketZ - 0.8) {
                const distXZ = Math.sqrt(
                    Math.pow(ball.position.x - basketX, 2) +
                    Math.pow(ball.position.y - basketY, 2)
                );

                if (distXZ < config.basketRadius * 0.9) {
                    hasScored = true;
                    onScore();
                    return;
                }
            }

            // Miss: ball hit ground or went too far
            if (ball.position.y < -0.8 || ball.position.z < -25 || Math.abs(ball.position.x) > 15) {
                onMiss();
            }
        }

        function onScore() {
            gameState.hits++;
            gameState.combo++;
            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);

            const baseScore = 10;
            const comboBonus = Math.min(gameState.combo - 1, 5) * 5;
            const points = baseScore + comboBonus;

            gameState.score += points;
            document.getElementById('score').textContent = gameState.score;

            if (gameState.combo > 1) {
                showCombo('🔥 x' + gameState.combo);
            } else {
                showCombo('⭐ 好棒！');
            }

            createStarBurst();
            playSound('hit');

            setTimeout(() => {
                resetBall();
                checkGameEnd();
            }, 1200);
        }

        function onMiss() {
            gameState.misses++;
            gameState.combo = 0;

            playSound('miss');

            setTimeout(() => {
                resetBall();
                checkGameEnd();
            }, 800);
        }

        function resetBall() {
            isBallFlying = false;
            ball.position.set(BALL_START.x, BALL_START.y, BALL_START.z);
            ball.rotation.set(0, 0, 0);
            ballVelocity = { x: 0, y: 0, z: 0 };

            // Show hint ring again
            const hint = ball.getObjectByName('ballHint');
            if (hint) hint.visible = true;
        }

        function checkGameEnd() {
            if (gameState.ballsLeft <= 0 && !isBallFlying) {
                setTimeout(() => {
                    showGameOver();
                }, 500);
            }
        }

        function updateBasket() {
            const config = levelConfigs[gameState.currentLevel];

            if (config.basketMoves) {
                basket.position.x += config.basketSpeed * basketDirection;

                if (basket.position.x > 3 || basket.position.x < -3) {
                    basketDirection *= -1;
                }
            }
        }

        function createStarBurst() {
            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();

            for (let i = 0; i < 10; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                star.textContent = ['⭐', '✨', '🌟', '💫', '🎉'][Math.floor(Math.random() * 5)];
                star.style.left = (rect.left + rect.width / 2) + 'px';
                star.style.top = (rect.top + rect.height * 0.35) + 'px';

                const angle = (Math.PI * 2 * i) / 10;
                const distance = 80 + Math.random() * 120;
                star.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                star.style.setProperty('--ty', Math.sin(angle) * distance + 'px');

                document.body.appendChild(star);

                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
        }

        function showCombo(text) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = text;
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth;
            comboDisplay.classList.add('show');
        }

        // Ball hint animation (pulsing)
        let hintPulse = 0;

        function animate() {
            animationId = requestAnimationFrame(animate);

            updateBall();
            updateBasket();

            // Pulse the hint ring when ball is idle
            if (!isBallFlying && ball) {
                hintPulse += 0.05;
                const hint = ball.getObjectByName('ballHint');
                if (hint && hint.visible) {
                    const s = 1 + Math.sin(hintPulse) * 0.15;
                    hint.scale.set(s, s, s);
                    hint.material.opacity = 0.4 + Math.sin(hintPulse) * 0.2;
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startGame(level) {
            initAudio();

            gameState = {
                score: 0,
                ballsLeft: levelConfigs[level].balls,
                hits: 0,
                misses: 0,
                combo: 0,
                maxCombo: 0,
                isDragging: false,
                currentLevel: level,
                gameStarted: true
            };

            // Update UI
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameoverScreen').classList.remove('show');
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('score').textContent = '0';
            document.getElementById('ballsLeft').textContent = gameState.ballsLeft;

            // Show hint
            document.getElementById('hintText').style.display = 'block';

            // Reset scene objects
            if (ball) scene.remove(ball);
            if (basket) scene.remove(basket);

            createBall();
            createBasket();
            resetBall();
        }

        function showGameOver() {
            const total = gameState.hits + gameState.misses;
            const accuracy = total > 0 ? Math.round((gameState.hits / total) * 100) : 0;

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalHits').textContent = gameState.hits;
            document.getElementById('finalCombo').textContent = gameState.maxCombo;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('gameoverScreen').classList.add('show');
        }

        function showStartScreen() {
            document.getElementById('gameoverScreen').classList.remove('show');
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('hintText').style.display = 'none';
            gameState.gameStarted = false;
        }

        function restartGame() {
            startGame(gameState.currentLevel);
        }

        // Initialize
        initThreeJS();
    </script>
</body>
</html>
