<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏀 3D投球游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* HUD overlay */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
        }

        .score-box .emoji {
            font-size: 28px;
        }

        .score-box .value {
            font-size: 32px;
            font-weight: bold;
            color: #FF6B6B;
        }

        .balls-left {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .balls-left .emoji {
            font-size: 24px;
        }

        .balls-left .value {
            font-size: 24px;
            font-weight: bold;
            color: #4ECDC4;
        }

        .combo-display {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            font-size: 56px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 0 #FF6B00, 6px 6px 0 rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transition: none;
        }

        .combo-display.show {
            animation: comboAnim 1.2s ease-out forwards;
        }

        @keyframes comboAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        /* Star burst particles */
        .star-particle {
            position: fixed;
            z-index: 15;
            font-size: 24px;
            pointer-events: none;
            animation: starFly 1s ease-out forwards;
        }

        @keyframes starFly {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }

        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .start-screen h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .start-screen .subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
        }

        .level-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-btn {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            min-width: 120px;
        }

        .level-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        .level-btn.easy {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d5016;
        }

        .level-btn.medium {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #8b4513;
        }

        .level-btn.hard {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #8b1a3f;
        }

        .level-btn .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }

        /* Game Over Screen */
        .gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .gameover-screen.show {
            display: flex;
        }

        .gameover-screen h2 {
            font-size: 42px;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }

        .gameover-screen .final-score {
            font-size: 64px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .gameover-screen .stats {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
        }

        .gameover-screen .stats div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .gameover-buttons {
            display: flex;
            gap: 15px;
        }

        .gameover-btn {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .gameover-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
        }

        .gameover-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Aim guide */
        .aim-guide {
            position: fixed;
            background: rgba(255, 100, 100, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.8);
        }

        /* Power meter */
        .power-meter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            display: none;
            z-index: 10;
            border: 3px solid white;
        }

        .power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #84fab0 0%, #ffecd2 50%, #ff9a9e 100%);
            border-radius: 8px;
            transition: width 0.05s;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .start-screen h1 {
                font-size: 36px;
            }

            .start-screen .subtitle {
                font-size: 16px;
            }

            .level-buttons {
                gap: 10px;
            }

            .level-btn {
                padding: 15px 20px;
                font-size: 16px;
                min-width: 100px;
            }

            .level-btn .emoji {
                font-size: 24px;
            }

            .gameover-screen h2 {
                font-size: 32px;
            }

            .gameover-screen .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <h1>🏀 3D投球游戏</h1>
        <p class="subtitle">拖动球瞄准，松手投掷！<br>锻炼距离感知和手眼协调能力</p>
        <div class="level-buttons">
            <button class="level-btn easy" onclick="startGame('easy')">
                <span class="emoji">😊</span>
                简单
            </button>
            <button class="level-btn medium" onclick="startGame('medium')">
                <span class="emoji">😃</span>
                中等
            </button>
            <button class="level-btn hard" onclick="startGame('hard')">
                <span class="emoji">😎</span>
                挑战
            </button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="gameover-screen" id="gameoverScreen">
        <h2>🎉 游戏结束！</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">
            <div>🎯 投进次数: <span id="finalHits">0</span></div>
            <div>🔥 最高连击: <span id="finalCombo">0</span></div>
            <div>⭐ 准确率: <span id="finalAccuracy">0%</span></div>
        </div>
        <div class="gameover-buttons">
            <button class="gameover-btn" onclick="showStartScreen()">返回主菜单</button>
            <button class="gameover-btn primary" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <!-- HUD -->
    <div class="hud" id="hud" style="display: none;">
        <div class="score-box">
            <span class="emoji">🏆</span>
            <span class="value" id="score">0</span>
        </div>
        <div class="balls-left">
            <span class="emoji">🏀</span>
            <span class="value" id="ballsLeft">5</span>
        </div>
    </div>

    <!-- Combo Display -->
    <div class="combo-display" id="comboDisplay"></div>

    <!-- Aim Guide -->
    <div class="aim-guide" id="aimGuide"></div>

    <!-- Power Meter -->
    <div class="power-meter" id="powerMeter">
        <div class="power-fill" id="powerFill"></div>
    </div>

    <!-- 3D Canvas -->
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let gameState = {
            score: 0,
            ballsLeft: 5,
            hits: 0,
            misses: 0,
            combo: 0,
            maxCombo: 0,
            isDragging: false,
            ballInFlight: false,
            currentLevel: 'easy',
            gameStarted: false
        };

        // Three.js variables
        let scene, camera, renderer;
        let ball, basket, basketRim;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        let ballVelocity = { x: 0, y: 0, z: 0 };
        let isBallFlying = false;
        let animationId;
        let basketDirection = 1;
        let basketSpeed = 0;

        // Level configurations
        const levelConfigs = {
            easy: {
                basketZ: -8,
                basketRadius: 1.5,
                ballRadius: 0.4,
                basketMoves: false,
                balls: 5
            },
            medium: {
                basketZ: -12,
                basketRadius: 1.3,
                ballRadius: 0.4,
                basketMoves: true,
                basketSpeed: 0.015,
                balls: 5
            },
            hard: {
                basketZ: -15,
                basketRadius: 1.0,
                ballRadius: 0.4,
                basketMoves: true,
                basketSpeed: 0.025,
                balls: 5
            }
        };

        // Audio context for sound effects
        let audioCtx;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'hit') {
                // Happy sound for successful hit
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'miss') {
                // Soft sound for miss
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'throw') {
                // Whoosh sound
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            }
        }

        function initThreeJS() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 5);
            camera.lookAt(0, 0, -10);

            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('gameCanvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x7CFC00 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            ground.receiveShadow = true;
            scene.add(ground);

            // Add some decorations
            addDecorations();

            // Create ball
            createBall();

            // Create basket
            createBasket();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            setupInputHandlers();

            // Start animation loop
            animate();
        }

        function addDecorations() {
            // Add some trees in the background
            const treePositions = [
                { x: -8, z: -15 }, { x: 8, z: -15 },
                { x: -12, z: -20 }, { x: 12, z: -20 },
                { x: -5, z: -18 }, { x: 5, z: -18 }
            ];

            treePositions.forEach(pos => {
                const tree = createTree();
                tree.position.set(pos.x, 0, pos.z);
                scene.add(tree);
            });

            // Add clouds
            for (let i = 0; i < 5; i++) {
                const cloud = createCloud();
                cloud.position.set(
                    (Math.random() - 0.5) * 30,
                    8 + Math.random() * 3,
                    -15 - Math.random() * 10
                );
                scene.add(cloud);
            }
        }

        function createTree() {
            const tree = new THREE.Group();

            // Trunk
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.25;
            trunk.castShadow = true;
            tree.add(trunk);

            // Foliage
            const foliageGeometry = new THREE.SphereGeometry(1, 8, 8);
            const foliageMaterial = new THREE.MeshLambertMaterial({ color: 0x228B22 });
            const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage.position.y = 1.5;
            foliage.castShadow = true;
            tree.add(foliage);

            return tree;
        }

        function createCloud() {
            const cloud = new THREE.Group();
            const cloudMaterial = new THREE.MeshLambertMaterial({ color: 0xffffff });

            for (let i = 0; i < 3; i++) {
                const cloudPart = new THREE.Mesh(
                    new THREE.SphereGeometry(0.8 + Math.random() * 0.4, 8, 8),
                    cloudMaterial
                );
                cloudPart.position.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                cloud.add(cloudPart);
            }

            return cloud;
        }

        function createBall() {
            const ballGeometry = new THREE.SphereGeometry(levelConfigs[gameState.currentLevel].ballRadius, 32, 32);
            const ballMaterial = new THREE.MeshLambertMaterial({ color: 0xFF6B35 });
            ball = new THREE.Mesh(ballGeometry, ballMaterial);
            ball.position.set(0, 0, 2);
            ball.castShadow = true;
            scene.add(ball);
        }

        function createBasket() {
            const config = levelConfigs[gameState.currentLevel];
            basket = new THREE.Group();

            // Backboard
            const backboardGeometry = new THREE.BoxGeometry(3, 2, 0.1);
            const backboardMaterial = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const backboard = new THREE.Mesh(backboardGeometry, backboardMaterial);
            backboard.position.set(0, 3, config.basketZ - 0.5);
            backboard.castShadow = true;
            basket.add(backboard);

            // Rim (ring)
            const rimGeometry = new THREE.TorusGeometry(config.basketRadius, 0.1, 8, 32);
            const rimMaterial = new THREE.MeshLambertMaterial({ color: 0xFF4500 });
            basketRim = new THREE.Mesh(rimGeometry, rimMaterial);
            basketRim.position.set(0, 1.5, config.basketZ);
            basketRim.rotation.x = Math.PI / 2;
            basket.add(basketRim);

            // Net (simple cone)
            const netGeometry = new THREE.ConeGeometry(config.basketRadius, 1, 32, 1, true);
            const netMaterial = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7
            });
            const net = new THREE.Mesh(netGeometry, netMaterial);
            net.position.set(0, 1, config.basketZ);
            basket.add(net);

            // Pole
            const poleGeometry = new THREE.CylinderGeometry(0.15, 0.15, 4, 8);
            const poleMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const pole = new THREE.Mesh(poleGeometry, poleMaterial);
            pole.position.set(0, 0, config.basketZ - 1);
            pole.castShadow = true;
            basket.add(pole);

            basket.position.set(0, 0, 0);
            scene.add(basket);
        }

        function setupInputHandlers() {
            const canvas = document.getElementById('gameCanvas');

            // Mouse events
            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('mousemove', onPointerMove);
            canvas.addEventListener('mouseup', onPointerUp);

            // Touch events
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onPointerDown(e.touches[0]);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                onPointerMove(e.touches[0]);
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                onPointerUp(e);
            });
        }

        function onPointerDown(event) {
            if (isBallFlying || gameState.ballsLeft <= 0) return;

            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            // Check if clicking near the ball
            const ballScreenPos = ball.position.clone().project(camera);
            const distance = Math.sqrt(
                Math.pow(x - ballScreenPos.x, 2) +
                Math.pow(y - ballScreenPos.y, 2)
            );

            if (distance < 0.2) {
                gameState.isDragging = true;
                dragStart.x = event.clientX;
                dragStart.y = event.clientY;
            }
        }

        function onPointerMove(event) {
            if (!gameState.isDragging) return;

            dragEnd.x = event.clientX;
            dragEnd.y = event.clientY;

            // Update aim guide
            const aimGuide = document.getElementById('aimGuide');
            const dx = dragStart.x - dragEnd.x;
            const dy = dragStart.y - dragEnd.y;
            const power = Math.min(Math.sqrt(dx * dx + dy * dy) / 200, 1);

            aimGuide.style.display = 'block';
            aimGuide.style.left = dragStart.x + 'px';
            aimGuide.style.top = dragStart.y + 'px';
            aimGuide.style.width = (20 + power * 30) + 'px';
            aimGuide.style.height = (20 + power * 30) + 'px';

            // Update power meter
            document.getElementById('powerMeter').style.display = 'block';
            document.getElementById('powerFill').style.width = (power * 100) + '%';
        }

        function onPointerUp(event) {
            if (!gameState.isDragging) return;

            gameState.isDragging = false;
            document.getElementById('aimGuide').style.display = 'none';
            document.getElementById('powerMeter').style.display = 'none';

            const dx = dragStart.x - dragEnd.x;
            const dy = dragStart.y - dragEnd.y;
            const power = Math.min(Math.sqrt(dx * dx + dy * dy) / 200, 1);

            if (power > 0.05) {
                throwBall(dx, dy, power);
            }
        }

        function throwBall(dx, dy, power) {
            if (isBallFlying || gameState.ballsLeft <= 0) return;

            isBallFlying = true;
            gameState.ballsLeft--;
            document.getElementById('ballsLeft').textContent = gameState.ballsLeft;

            playSound('throw');

            // Calculate velocity based on drag
            const forwardPower = power * 0.35;
            const upPower = power * 0.25;
            const sidePower = (dx / Math.abs(dx || 1)) * power * 0.08;

            ballVelocity = {
                x: sidePower,
                y: upPower,
                z: -forwardPower
            };
        }

        function updateBall() {
            if (!isBallFlying) return;

            // Apply gravity
            ballVelocity.y -= 0.012;

            // Update position
            ball.position.x += ballVelocity.x;
            ball.position.y += ballVelocity.y;
            ball.position.z += ballVelocity.z;

            // Rotate ball for visual effect
            ball.rotation.x += ballVelocity.z * 0.1;
            ball.rotation.z -= ballVelocity.x * 0.1;

            // Check if ball passed through basket
            const config = levelConfigs[gameState.currentLevel];
            const basketPos = new THREE.Vector3(0, 1.5, config.basketZ);

            if (ball.position.z <= basketPos.z && ball.position.z >= basketPos.z - 0.5) {
                const dist = Math.sqrt(
                    Math.pow(ball.position.x - basketPos.x, 2) +
                    Math.pow(ball.position.y - basketPos.y, 2)
                );

                if (dist < config.basketRadius * 0.8) {
                    // Score!
                    onScore();
                    return;
                }
            }

            // Check if ball hit ground or went too far
            if (ball.position.y < -0.5 || ball.position.z < -30) {
                onMiss();
            }
        }

        function onScore() {
            gameState.hits++;
            gameState.combo++;
            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);

            // Calculate score
            const baseScore = 10;
            const comboBonus = Math.min(gameState.combo - 1, 5) * 5;
            const points = baseScore + comboBonus;

            gameState.score += points;
            document.getElementById('score').textContent = gameState.score;

            // Show combo
            if (gameState.combo > 1) {
                showCombo(`🔥 x${gameState.combo}`);
            } else {
                showCombo('⭐ +1');
            }

            // Star burst effect
            createStarBurst();

            playSound('hit');

            // Reset ball after delay
            setTimeout(() => {
                resetBall();
                checkGameEnd();
            }, 1000);
        }

        function onMiss() {
            gameState.misses++;
            gameState.combo = 0;

            playSound('miss');

            // Reset ball after delay
            setTimeout(() => {
                resetBall();
                checkGameEnd();
            }, 800);
        }

        function resetBall() {
            isBallFlying = false;
            const config = levelConfigs[gameState.currentLevel];
            ball.position.set(0, 0, 2);
            ball.rotation.set(0, 0, 0);
            ballVelocity = { x: 0, y: 0, z: 0 };
        }

        function checkGameEnd() {
            if (gameState.ballsLeft <= 0 && !isBallFlying) {
                setTimeout(() => {
                    showGameOver();
                }, 500);
            }
        }

        function updateBasket() {
            const config = levelConfigs[gameState.currentLevel];

            if (config.basketMoves) {
                basket.position.x += config.basketSpeed * basketDirection;

                if (basket.position.x > 3 || basket.position.x < -3) {
                    basketDirection *= -1;
                }
            }
        }

        function createStarBurst() {
            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();

            for (let i = 0; i < 8; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                star.textContent = ['⭐', '✨', '🌟', '💫'][Math.floor(Math.random() * 4)];
                star.style.left = rect.left + rect.width / 2 + 'px';
                star.style.top = rect.top + rect.height / 2 + 'px';

                const angle = (Math.PI * 2 * i) / 8;
                const distance = 100 + Math.random() * 100;
                star.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                star.style.setProperty('--ty', Math.sin(angle) * distance + 'px');

                document.body.appendChild(star);

                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
        }

        function showCombo(text) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = text;
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth; // Trigger reflow
            comboDisplay.classList.add('show');
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            updateBall();
            updateBasket();

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startGame(level) {
            initAudio();

            gameState = {
                score: 0,
                ballsLeft: levelConfigs[level].balls,
                hits: 0,
                misses: 0,
                combo: 0,
                maxCombo: 0,
                isDragging: false,
                ballInFlight: false,
                currentLevel: level,
                gameStarted: true
            };

            // Update UI
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameoverScreen').classList.remove('show');
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('score').textContent = '0';
            document.getElementById('ballsLeft').textContent = gameState.ballsLeft;

            // Reset ball and basket
            if (ball) {
                scene.remove(ball);
            }
            if (basket) {
                scene.remove(basket);
            }

            createBall();
            createBasket();
            resetBall();
        }

        function showGameOver() {
            const total = gameState.hits + gameState.misses;
            const accuracy = total > 0 ? Math.round((gameState.hits / total) * 100) : 0;

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalHits').textContent = gameState.hits;
            document.getElementById('finalCombo').textContent = gameState.maxCombo;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('gameoverScreen').classList.add('show');
        }

        function showStartScreen() {
            document.getElementById('gameoverScreen').classList.remove('show');
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
        }

        function restartGame() {
            startGame(gameState.currentLevel);
        }

        // Initialize
        initThreeJS();
    </script>
</body>
</html>
