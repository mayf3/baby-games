<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>形状分类游戏 - 宝宝游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive, sans-serif;
            background: linear-gradient(135deg, #FFE5B4 0%, #FFB347 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 600px;
        }

        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .header h1 {
            color: #333;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 8px;
            padding: 0 50px;
        }

        .score-board {
            background: white;
            border-radius: 25px;
            padding: 10px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1.2rem;
            color: #FF6B6B;
            font-weight: bold;
            display: inline-block;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .shapes-container {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .shape {
            width: 80px;
            height: 80px;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            user-select: none;
        }

        .shape.selected {
            transform: scale(1.15);
            box-shadow: 0 0 0 4px #FFD700;
        }

        .shape.circle {
            background: #FF6B6B;
            border-radius: 50%;
        }

        .shape.square {
            background: #4ECDC4;
            border-radius: 10px;
        }

        .shape.triangle {
            width: 0;
            height: 0;
            background: transparent;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid #FFE66D;
            border-radius: 0;
        }

        .drop-zones {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .drop-zone {
            background: rgba(255, 255, 255, 0.9);
            border: 3px dashed #ccc;
            border-radius: 20px;
            padding: 15px 10px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .drop-zone.active {
            border-color: #FF6B6B;
            background: rgba(255, 107, 107, 0.1);
            transform: scale(1.03);
        }

        .drop-zone.correct {
            border-color: #4ECDC4;
            background: rgba(78, 205, 196, 0.2);
            animation: successPulse 0.4s ease;
        }

        .drop-zone.wrong {
            animation: shake 0.4s ease;
        }

        .drop-zone-label {
            font-size: 1rem;
            font-weight: bold;
            color: #555;
            margin-top: 10px;
        }

        .drop-zone-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .success-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .success-content {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            animation: scaleUp 0.3s ease;
            max-width: 400px;
        }

        .success-content h2 {
            font-size: 2.5rem;
            color: #4ECDC4;
            margin-bottom: 15px;
        }

        .success-content p {
            font-size: 1.3rem;
            color: #666;
            margin-bottom: 25px;
        }

        .play-again-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 15px 35px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .play-again-btn:active {
            transform: scale(0.95);
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Mobile optimization */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .back-btn {
                width: 40px;
                height: 40px;
                top: 5px;
                left: 5px;
                font-size: 1.3rem;
            }

            .header h1 {
                font-size: 1.5rem;
                padding: 0 45px;
            }

            .score-board {
                padding: 8px 20px;
                font-size: 1.1rem;
            }

            .shape {
                width: 65px;
                height: 65px;
                font-size: 2rem;
            }

            .shape.triangle {
                border-left-width: 32px;
                border-right-width: 32px;
                border-bottom-width: 56px;
            }

            .drop-zones {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .drop-zone {
                flex-direction: row;
                gap: 15px;
                padding: 15px 20px;
                min-height: 80px;
            }

            .drop-zone-icon {
                font-size: 2.5rem;
            }

            .drop-zone-label {
                font-size: 1.1rem;
                margin-top: 0;
            }
        }

        /* Extra small screens */
        @media (max-width: 360px) {
            .shape {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
            }

            .shape.triangle {
                border-left-width: 27px;
                border-right-width: 27px;
                border-bottom-width: 48px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../index.html'">←</button>

    <div class="header">
        <h1>🔷 形状分类游戏</h1>
        <div class="score-board">
            得分: <span id="score">0</span> / 6
        </div>
    </div>

    <div class="game-area">
        <div class="shapes-container" id="shapesContainer">
            <!-- Shapes will be generated by JavaScript -->
        </div>

        <div class="drop-zones">
            <div class="drop-zone" data-shape="circle">
                <div class="drop-zone-icon">⭕</div>
                <div class="drop-zone-label">圆形</div>
            </div>
            <div class="drop-zone" data-shape="square">
                <div class="drop-zone-icon">⬜</div>
                <div class="drop-zone-label">正方形</div>
            </div>
            <div class="drop-zone" data-shape="triangle">
                <div class="drop-zone-icon">🔺</div>
                <div class="drop-zone-label">三角形</div>
            </div>
        </div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="success-content">
            <h2>🎉 太棒了！</h2>
            <p>你完成了所有形状分类！</p>
            <button class="play-again-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        let score = 0;
        let selectedShape = null;
        let shapes = [];
        const totalShapes = 6;

        function initGame() {
            score = 0;
            selectedShape = null;
            document.getElementById('score').textContent = score;
            generateShapes();
            setupClickHandlers();
        }

        function generateShapes() {
            const container = document.getElementById('shapesContainer');
            container.innerHTML = '';
            shapes = [];

            const shapeTypes = ['circle', 'square', 'triangle'];
            const emojis = {
                circle: '🔴',
                square: '🟦',
                triangle: '🔺'
            };

            // Generate 2 of each shape
            for (let i = 0; i < totalShapes; i++) {
                const shapeType = shapeTypes[i % 3];
                shapes.push({
                    id: `shape-${i}`,
                    type: shapeType,
                    emoji: emojis[shapeType]
                });
            }

            // Shuffle shapes
            shapes.sort(() => Math.random() - 0.5);

            // Create shape elements
            shapes.forEach(shape => {
                const shapeEl = document.createElement('div');
                shapeEl.className = `shape ${shape.type}`;
                shapeEl.id = shape.id;
                shapeEl.textContent = shape.emoji;
                shapeEl.dataset.type = shape.type;
                container.appendChild(shapeEl);
            });
        }

        function setupClickHandlers() {
            const shapes = document.querySelectorAll('.shape');
            const dropZones = document.querySelectorAll('.drop-zone');

            // Shape click handlers
            shapes.forEach(shape => {
                shape.addEventListener('click', handleShapeClick);
                shape.addEventListener('touchend', handleShapeClick);
            });

            // Drop zone click handlers
            dropZones.forEach(zone => {
                zone.addEventListener('click', handleZoneClick);
                zone.addEventListener('touchend', handleZoneClick);
            });
        }

        function handleShapeClick(e) {
            e.preventDefault();
            e.stopPropagation();

            const shape = e.target;

            // If this shape is already selected, deselect it
            if (selectedShape === shape) {
                shape.classList.remove('selected');
                selectedShape = null;
                return;
            }

            // Deselect previous shape
            if (selectedShape) {
                selectedShape.classList.remove('selected');
            }

            // Select this shape
            selectedShape = shape;
            shape.classList.add('selected');

            // Provide visual feedback
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        function handleZoneClick(e) {
            e.preventDefault();
            e.stopPropagation();

            if (!selectedShape) {
                // No shape selected - give feedback
                const zone = e.currentTarget;
                zone.classList.add('wrong');
                setTimeout(() => {
                    zone.classList.remove('wrong');
                }, 300);
                return;
            }

            const zone = e.currentTarget;
            const shapeType = selectedShape.dataset.type;
            const expectedType = zone.dataset.shape;

            if (shapeType === expectedType) {
                // Correct!
                zone.classList.add('correct');
                selectedShape.style.display = 'none';
                selectedShape.classList.remove('selected');
                selectedShape = null;
                score++;
                document.getElementById('score').textContent = score;

                // Success feedback
                if (navigator.vibrate) {
                    navigator.vibrate([50, 50, 50]);
                }

                setTimeout(() => {
                    zone.classList.remove('correct');
                    checkWin();
                }, 400);
            } else {
                // Wrong!
                zone.classList.add('wrong');
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]);
                }
                setTimeout(() => {
                    zone.classList.remove('wrong');
                }, 400);
            }
        }

        function checkWin() {
            if (score >= totalShapes) {
                setTimeout(() => {
                    document.getElementById('successModal').classList.add('show');
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100, 50, 100]);
                    }
                }, 300);
            }
        }

        function restartGame() {
            document.getElementById('successModal').classList.remove('show');
            initGame();
        }

        // Prevent default touch behaviors
        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('.shape') || e.target.closest('.drop-zone')) {
                e.preventDefault();
            }
        }, { passive: false });

        // Initialize game on load
        initGame();
    </script>
</body>
</html>
