<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D颜色泡泡 - Color Bubbles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            pointer-events: none;
            z-index: 100;
        }
        #targetColor {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 20px 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 300px;
            margin: 0 auto;
        }
        #targetColor h2 {
            font-size: 1.2em;
            color: #333;
        }
        #colorDisplay {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        #colorDisplay.pulse {
            transform: scale(1.1);
        }
        #score {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #764ba2;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        #startScreen, #endScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(102, 126, 234, 0.95);
            z-index: 200;
            padding: 20px;
        }
        #endScreen {
            display: none;
        }
        #startScreen h1, #endScreen h1 {
            font-size: 3em;
            color: white;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        #startScreen p, #endScreen p {
            font-size: 1.3em;
            color: white;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }
        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.5);
        }
        .btn:active {
            transform: scale(0.98);
        }
        #feedback {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 150;
        }
        #feedback.show {
            opacity: 1;
        }
        @media (max-width: 768px) {
            #targetColor {
                padding: 15px 20px;
            }
            #colorDisplay {
                width: 70px;
                height: 70px;
            }
            #startScreen h1, #endScreen h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🫧 3D颜色泡泡 🫧</h1>
        <p>点击飘浮的泡泡，找出和目标颜色相同的泡泡！<br>每个泡泡都值得尝试～</p>
        <button class="btn" onclick="startGame()">开始游戏！</button>
    </div>

    <div id="endScreen">
        <h1>🎉 太棒了！</h1>
        <p>你找到了 <span id="finalScore">0</span> 个泡泡！<br>继续加油，颜色小达人！</p>
        <button class="btn" onclick="restartGame()">再玩一次！</button>
    </div>

    <div id="ui" style="display: none;">
        <div id="targetColor">
            <h2>找这个颜色：</h2>
            <div id="colorDisplay"></div>
        </div>
        <div id="score">⭐ 0</div>
    </div>

    <div id="feedback"></div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 游戏状态
        let scene, camera, renderer;
        let bubbles = [];
        let stars = [];
        let targetColor = null;
        let score = 0;
        let gameActive = false;
        let bubbleInterval;
        let gameDuration = 120; // 游戏时长（秒）
        let timeLeft = gameDuration;

        // 颜色定义
        const colors = [
            { name: '红色', hex: 0xff4757, css: '#ff4757' },
            { name: '橙色', hex: 0xffa502, css: '#ffa502' },
            { name: '黄色', hex: 0xfffa65, css: '#fffa65' },
            { name: '绿色', hex: 0x7bed9f, css: '#7bed9f' },
            { name: '蓝色', hex: 0x70a1ff, css: '#70a1ff' },
            { name: '紫色', hex: 0xa29bfe, css: '#a29bfe' },
            { name: '粉色', hex: 0xff6b81, css: '#ff6b81' },
            { name: '青色', hex: 0x00d2d3, css: '#00d2d3' }
        ];

        // 初始化 Three.js
        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('gameCanvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // 环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // 点光源
            const pointLight = new THREE.PointLight(0xffffff, 0.8);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            // 点击检测
            renderer.domElement.addEventListener('click', onBubbleClick);
            renderer.domElement.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                onBubbleClick({ clientX: touch.clientX, clientY: touch.clientY });
            });

            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 创建泡泡
        function createBubble() {
            const colorData = colors[Math.floor(Math.random() * colors.length)];
            
            const geometry = new THREE.SphereGeometry(1 + Math.random() * 0.5, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: colorData.hex,
                shininess: 100,
                transparent: true,
                opacity: 0.9
            });
            
            const bubble = new THREE.Mesh(geometry, material);
            
            // 随机位置
            bubble.position.x = (Math.random() - 0.5) * 20;
            bubble.position.y = -10 - Math.random() * 5;
            bubble.position.z = (Math.random() - 0.5) * 10;
            
            // 随机上升速度
            bubble.userData = {
                colorData: colorData,
                speed: 0.03 + Math.random() * 0.04,
                wobbleSpeed: Math.random() * 2,
                wobbleAmount: Math.random() * 0.5
            };
            
            scene.add(bubble);
            bubbles.push(bubble);

            // 限制泡泡数量
            if (bubbles.length > 15) {
                const oldBubble = bubbles.shift();
                scene.remove(oldBubble);
                oldBubble.geometry.dispose();
                oldBubble.material.dispose();
            }
        }

        // 点击泡泡
        function onBubbleClick(event) {
            if (!gameActive) return;

            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(bubbles);

            if (intersects.length > 0) {
                const clickedBubble = intersects[0].object;
                const bubbleColor = clickedBubble.userData.colorData;

                if (bubbleColor.hex === targetColor.hex) {
                    // 正确！
                    score++;
                    document.getElementById('score').textContent = '⭐ ' + score;
                    createStarExplosion(clickedBubble.position.clone(), bubbleColor.css);
                    showFeedback('太棒了！', true);
                    playSound('correct');

                    // 移除泡泡
                    scene.remove(clickedBubble);
                    bubbles = bubbles.filter(b => b !== clickedBubble);

                    // 更换目标颜色
                    setNewTargetColor();

                    // 每5分增加难度
                    if (score % 5 === 0) {
                        createBubble();
                        createBubble();
                    }
                } else {
                    // 错误，温柔提示
                    showFeedback('这个是' + bubbleColor.name + '哦～', false);
                    playSound('wrong');
                }
            }
        }

        // 设置新的目标颜色
        function setNewTargetColor() {
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            const colorDisplay = document.getElementById('colorDisplay');
            colorDisplay.style.backgroundColor = targetColor.css;
            colorDisplay.classList.add('pulse');
            setTimeout(() => colorDisplay.classList.remove('pulse'), 300);
        }

        // 创建星星爆炸效果
        function createStarExplosion(position, color) {
            for (let i = 0; i < 10; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: color });
                const star = new THREE.Mesh(geometry, material);
                
                star.position.copy(position);
                star.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.3,
                        Math.random() * 0.3,
                        (Math.random() - 0.5) * 0.3
                    ),
                    life: 1
                };
                
                scene.add(star);
                stars.push(star);
            }
        }

        // 更新星星
        function updateStars() {
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                star.position.add(star.userData.velocity);
                star.userData.velocity.y -= 0.01; // 重力
                star.userData.life -= 0.02;
                star.scale.setScalar(star.userData.life);

                if (star.userData.life <= 0) {
                    scene.remove(star);
                    stars.splice(i, 1);
                    star.geometry.dispose();
                    star.material.dispose();
                }
            }
        }

        // 更新泡泡
        function updateBubbles() {
            const time = Date.now() * 0.001;
            
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                bubble.position.y += bubble.userData.speed;
                bubble.position.x += Math.sin(time * bubble.userData.wobbleSpeed) * 0.01 * bubble.userData.wobbleAmount;
                bubble.rotation.x += 0.01;
                bubble.rotation.y += 0.01;

                // 移除超出屏幕的泡泡
                if (bubble.position.y > 15) {
                    scene.remove(bubble);
                    bubbles.splice(i, 1);
                    bubble.geometry.dispose();
                    bubble.material.dispose();
                }
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            updateBubbles();
            updateStars();
            
            renderer.render(scene, camera);
        }

        // 显示反馈
        function showFeedback(text, isCorrect) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = text;
            feedback.style.color = isCorrect ? '#7bed9f' : '#ff6b81';
            feedback.classList.add('show');
            setTimeout(() => feedback.classList.remove('show'), 1000);
        }

        // 播放音效（使用 Web Audio API）
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'correct') {
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
            } else {
                oscillator.frequency.setValueAtTime(392, audioContext.currentTime); // G4
            }

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            
            score = 0;
            document.getElementById('score').textContent = '⭐ ' + score;
            
            setNewTargetColor();
            
            // 清理旧泡泡
            bubbles.forEach(b => {
                scene.remove(b);
                b.geometry.dispose();
                b.material.dispose();
            });
            bubbles = [];
            
            gameActive = true;
            
            // 生成泡泡
            bubbleInterval = setInterval(() => {
                if (gameActive) {
                    createBubble();
                }
            }, 1500);

            // 游戏计时
            setTimeout(() => {
                endGame();
            }, gameDuration * 1000);
        }

        // 结束游戏
        function endGame() {
            gameActive = false;
            clearInterval(bubbleInterval);
            
            document.getElementById('ui').style.display = 'none';
            document.getElementById('endScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
        }

        // 重新开始
        function restartGame() {
            document.getElementById('endScreen').style.display = 'none';
            startGame();
        }

        // 初始化
        initThree();
    </script>
</body>
</html>
