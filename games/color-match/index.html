<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色配对游戏 - Color Match</title>
    <link rel="stylesheet" href="../css/lobby.css">
    <style>
        /* 游戏特定样式 */
        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        .score-board {
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
        }

        .instructions {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .color-palette {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .target-color {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .target-color:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .items-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .item {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .item:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .item.matched {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            display: none;
            z-index: 1000;
            animation: popIn 0.5s ease;
        }

        .feedback.success {
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
        }

        .feedback.error {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 胜利界面 */
        .victory-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .victory-content {
            text-align: center;
            color: white;
            animation: fadeInUp 0.8s ease;
        }

        .victory-emoji {
            font-size: 8rem;
            margin-bottom: 20px;
        }

        .victory-title {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .victory-message {
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        .restart-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
        }

        /* 家长提示 */
        .parent-tip {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            color: white;
            backdrop-filter: blur(10px);
        }

        .parent-tip h3 {
            margin-bottom: 10px;
        }

        .parent-tip p {
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <button class="back-btn" onclick="location.href='../../'">← 返回大厅</button>
            <div class="score-board">
                ⭐ 得分: <span id="score">0</span> / 8
            </div>
        </div>

        <div class="instructions">
            🎯 点击下方和目标颜色相同的物品
        </div>

        <div class="color-palette">
            <div class="target-color" id="targetColor" style="background-color: #FF6B6B;"></div>
        </div>

        <div class="items-container" id="itemsContainer">
            <!-- 物品将由 JavaScript 动态生成 -->
        </div>

        <div class="parent-tip">
            <h3>💡 家长提示</h3>
            <p>这个游戏帮助孩子认识颜色，培养观察力和分类能力。在孩子游戏时，您可以：<br>
            • 用语言描述颜色："这是红色，像苹果一样的红色"<br>
            • 鼓励孩子说出颜色名称<br>
            • 一起寻找生活中相同颜色的物品</p>
        </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="victory-screen" id="victoryScreen">
        <div class="victory-content">
            <div class="victory-emoji">🎉</div>
            <h1 class="victory-title">太棒了！</h1>
            <p class="victory-message">你完成了所有颜色配对！</p>
            <button class="restart-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
