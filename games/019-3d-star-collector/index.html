<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D星星收集 - 3D Star Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a2e, #1a1a4e);
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #levelDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        #targetDisplay {
            position: absolute;
            top: 60px;
            left: 20px;
            color: #87CEEB;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(135, 206, 235, 0.8);
        }

        #collectedDisplay {
            position: absolute;
            top: 100px;
            left: 20px;
            color: #FF69B4;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        #starIcons {
            position: absolute;
            top: 150px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 200px;
        }

        .star-icon {
            font-size: 30px;
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .star-icon.collected {
            opacity: 1;
            transform: scale(1.2);
            animation: starPop 0.5s ease;
        }

        @keyframes starPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1.2); }
        }

        #startScreen, #winScreen, #levelScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 46, 0.95);
            z-index: 100;
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #FFD700;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            text-align: center;
        }

        .subtitle {
            color: #87CEEB;
            font-size: 20px;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        .btn {
            padding: 20px 60px;
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 50px;
            color: #0a0a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #winScreen h2 {
            color: #FFD700;
            font-size: 56px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: celebration 1s ease infinite;
        }

        @keyframes celebration {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.1) rotate(5deg); }
        }

        .stars-collected {
            color: #FF69B4;
            font-size: 72px;
            margin: 20px 0;
            animation: bounce 0.5s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .level-number {
            color: #FFD700;
            font-size: 128px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin: 20px 0;
        }

        #hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            .btn { padding: 15px 40px; font-size: 24px; }
            .level-number { font-size: 96px; }
            #collectedDisplay { font-size: 28px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="levelDisplay">第 <span id="levelNum">1</span> 关</div>
        <div id="targetDisplay">收集 <span id="targetNum">1</span> 颗星星</div>
        <div id="collectedDisplay"><span id="collectedNum">0</span> / <span id="totalNum">1</span></div>
        <div id="starIcons"></div>
        <div id="hint">点击屏幕移动飞船去收集星星！</div>
    </div>

    <div id="startScreen">
        <h1>⭐ 3D星星收集 ⭐</h1>
        <p class="subtitle">在美丽的夜空中收集星星，学习数字1-10！点击屏幕移动小飞船去触碰星星。</p>
        <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <div id="levelScreen" class="hidden">
        <h1>第 <span id="levelTitleNum">1</span> 关</h1>
        <div class="level-number" id="levelTarget">1</div>
        <p class="subtitle">收集 <span id="levelTargetText">1</span> 颗星星！</p>
        <button class="btn" id="levelBtn">开始</button>
    </div>

    <div id="winScreen" class="hidden">
        <h2>🎉 太棒了！🎉</h2>
        <p class="stars-collected">⭐ <span id="finalStars">1</span> ⭐</p>
        <p class="subtitle">你成功收集了所有星星！</p>
        <button class="btn" id="nextLevelBtn">下一关</button>
        <button class="btn" id="restartBtn">重新开始</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const state = {
            currentLevel: 1,
            targetStars: 1,
            collectedStars: 0,
            isPlaying: false,
            stars: [],
            ship: null,
            shipTarget: new THREE.Vector3(),
            particles: []
        };

        // Audio Context
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playCollectSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        function playWinSound() {
            initAudio();
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);

                oscillator.start(audioCtx.currentTime + i * 0.15);
                oscillator.stop(audioCtx.currentTime + i * 0.15 + 0.3);
            });
        }

        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('gameCanvas'),
            antialias: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Create starfield background
        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];

            // 优化：从5000减少到3000，提升低端设备性能
            for (let i = 0; i < 3000; i++) {
                vertices.push(
                    (Math.random() - 0.5) * 200,
                    (Math.random() - 0.5) * 200,
                    (Math.random() - 0.5) * 200 - 50
                );
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.12,
                transparent: true,
                opacity: 0.8
            });

            return new THREE.Points(geometry, material);
        }

        const starfield = createStarfield();
        scene.add(starfield);

        // Create collectible stars
        function createStar(x, y, z) {
            const group = new THREE.Group();

            // Core sphere
            const coreGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const coreMaterial = new THREE.MeshPhongMaterial({
                color: 0xFFD700,
                emissive: 0xFFA500,
                emissiveIntensity: 0.5,
                shininess: 100
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            group.add(core);

            // Glow effect
            const glowGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xFFD700,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            group.add(glow);

            // Points
            for (let i = 0; i < 5; i++) {
                const pointGeometry = new THREE.ConeGeometry(0.1, 0.4, 4);
                const pointMaterial = new THREE.MeshPhongMaterial({
                    color: 0xFFFF00,
                    emissive: 0xFFA500,
                    emissiveIntensity: 0.8
                });
                const point = new THREE.Mesh(pointGeometry, pointMaterial);

                const angle = (i / 5) * Math.PI * 2;
                point.position.x = Math.cos(angle) * 0.5;
                point.position.y = Math.sin(angle) * 0.5;
                point.rotation.z = angle - Math.PI / 2;

                group.add(point);
            }

            group.position.set(x, y, z);
            group.userData = { isCollectible: true, rotationSpeed: Math.random() * 0.02 + 0.01 };

            return group;
        }

        // Create spaceship
        function createSpaceship() {
            const group = new THREE.Group();

            // Body
            const bodyGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const bodyMaterial = new THREE.MeshPhongMaterial({
                color: 0x87CEEB,
                emissive: 0x4169E1,
                emissiveIntensity: 0.3,
                shininess: 100
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            group.add(body);

            // Cockpit
            const cockpitGeometry = new THREE.SphereGeometry(0.25, 16, 16);
            const cockpitMaterial = new THREE.MeshPhongMaterial({
                color: 0xFF69B4,
                emissive: 0xFF1493,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.8
            });
            const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
            cockpit.position.z = 0.3;
            group.add(cockpit);

            // Engine glow
            const engineGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const engineMaterial = new THREE.MeshBasicMaterial({
                color: 0xFF4500,
                transparent: true,
                opacity: 0.8
            });
            const engine = new THREE.Mesh(engineGeometry, engineMaterial);
            engine.position.z = -0.5;
            group.add(engine);

            group.position.set(0, 0, 5);
            return group;
        }

        // Create particle effect
        function createParticles(position) {
            for (let i = 0; i < 20; i++) {
                const geometry = new THREE.SphereGeometry(0.05, 8, 8);
                const material = new THREE.MeshBasicMaterial({
                    color: Math.random() > 0.5 ? 0xFFD700 : 0xFF69B4,
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(geometry, material);

                particle.position.copy(position);
                particle.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.2,
                        (Math.random() - 0.5) * 0.2,
                        (Math.random() - 0.5) * 0.2
                    ),
                    life: 1
                };

                scene.add(particle);
                state.particles.push(particle);
            }
        }

        // Initialize level
        function initLevel() {
            // Clear existing stars
            state.stars.forEach(star => scene.remove(star));
            state.stars = [];
            state.collectedStars = 0;

            // Create stars for current level
            const numStars = state.targetStars;
            for (let i = 0; i < numStars; i++) {
                const x = (Math.random() - 0.5) * 15;
                const y = (Math.random() - 0.5) * 10;
                const z = -Math.random() * 10 - 5;
                const star = createStar(x, y, z);
                scene.add(star);
                state.stars.push(star);
            }

            // Update UI
            updateUI();
        }

        // Update UI
        function updateUI() {
            document.getElementById('levelNum').textContent = state.currentLevel;
            document.getElementById('targetNum').textContent = state.targetStars;
            document.getElementById('collectedNum').textContent = state.collectedStars;
            document.getElementById('totalNum').textContent = state.targetStars;

            // Update star icons
            const starIconsContainer = document.getElementById('starIcons');
            starIconsContainer.innerHTML = '';
            for (let i = 0; i < state.targetStars; i++) {
                const icon = document.createElement('span');
                icon.className = 'star-icon' + (i < state.collectedStars ? ' collected' : '');
                icon.textContent = '⭐';
                starIconsContainer.appendChild(icon);
            }
        }

        // Collect star
        function collectStar(star) {
            createParticles(star.position);
            scene.remove(star);
            state.stars = state.stars.filter(s => s !== star);
            state.collectedStars++;

            playCollectSound();
            updateUI();

            // Check win condition
            if (state.collectedStars >= state.targetStars) {
                setTimeout(() => {
                    showWinScreen();
                }, 500);
            }
        }

        // Check collision
        function checkCollision() {
            if (!state.ship) return;

            const shipPosition = state.ship.position;

            state.stars.forEach(star => {
                const distance = shipPosition.distanceTo(star.position);
                if (distance < 1) {
                    collectStar(star);
                }
            });
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate starfield
            starfield.rotation.y += 0.0001;

            // Rotate stars
            state.stars.forEach(star => {
                star.rotation.y += star.userData.rotationSpeed;
                star.rotation.z += star.userData.rotationSpeed * 0.5;

                // Make stars float
                star.position.y += Math.sin(Date.now() * 0.001 + star.position.x) * 0.002;
            });

            // Move ship towards target
            if (state.ship && state.isPlaying) {
                const direction = new THREE.Vector3().subVectors(state.shipTarget, state.ship.position);
                const distance = direction.length();

                if (distance > 0.1) {
                    direction.normalize();
                    state.ship.position.add(direction.multiplyScalar(0.1));

                    // Rotate ship to face movement direction
                    state.ship.lookAt(state.shipTarget);
                }
            }

            // Update particles
            state.particles = state.particles.filter(particle => {
                particle.position.add(particle.userData.velocity);
                particle.userData.life -= 0.02;
                particle.material.opacity = particle.userData.life;

                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    return false;
                }
                return true;
            });

            // Check collisions
            checkCollision();

            renderer.render(scene, camera);
        }

        // Handle input
        function handleInput(event) {
            if (!state.isPlaying || !state.ship) return;

            event.preventDefault();

            let x, y;
            if (event.touches) {
                x = event.touches[0].clientX;
                y = event.touches[0].clientY;
            } else {
                x = event.clientX;
                y = event.clientY;
            }

            // Convert to normalized device coordinates
            const mouse = new THREE.Vector2(
                (x / window.innerWidth) * 2 - 1,
                -(y / window.innerHeight) * 2 + 1
            );

            // Project onto z=0 plane
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, target);

            // Clamp target position
            target.x = Math.max(-8, Math.min(8, target.x));
            target.y = Math.max(-5, Math.min(5, target.y));
            target.z = 5;

            state.shipTarget.copy(target);
        }

        // Event listeners
        document.addEventListener('mousedown', handleInput);
        document.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) handleInput(e);
        });
        document.addEventListener('touchstart', handleInput);
        document.addEventListener('touchmove', handleInput);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // UI Event handlers
        document.getElementById('startBtn').addEventListener('click', () => {
            initAudio();
            document.getElementById('startScreen').classList.add('hidden');
            showLevelScreen();
        });

        document.getElementById('levelBtn').addEventListener('click', () => {
            document.getElementById('levelScreen').classList.add('hidden');
            startLevel();
        });

        document.getElementById('nextLevelBtn').addEventListener('click', () => {
            state.currentLevel++;
            if (state.currentLevel > 10) {
                state.currentLevel = 1;
            }
            state.targetStars = state.currentLevel;
            document.getElementById('winScreen').classList.add('hidden');
            showLevelScreen();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            state.currentLevel = 1;
            state.targetStars = 1;
            document.getElementById('winScreen').classList.add('hidden');
            showLevelScreen();
        });

        function showLevelScreen() {
            document.getElementById('levelTitleNum').textContent = state.currentLevel;
            document.getElementById('levelTarget').textContent = state.targetStars;
            document.getElementById('levelTargetText').textContent = state.targetStars;
            document.getElementById('levelScreen').classList.remove('hidden');
        }

        function startLevel() {
            state.isPlaying = true;

            // Create ship if it doesn't exist
            if (!state.ship) {
                state.ship = createSpaceship();
                scene.add(state.ship);
            }

            state.ship.position.set(0, 0, 5);
            state.shipTarget.set(0, 0, 5);

            initLevel();
        }

        function showWinScreen() {
            state.isPlaying = false;
            playWinSound();
            document.getElementById('finalStars').textContent = state.collectedStars;
            document.getElementById('winScreen').classList.remove('hidden');
        }

        // Camera position
        camera.position.z = 10;

        // Start animation loop
        animate();
    </script>
</body>
</html>
