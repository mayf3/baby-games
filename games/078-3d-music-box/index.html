<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D音乐盒 🎵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a0533 0%, #2d1b69 30%, #4a1a8a 60%, #6b21a8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: none;
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #6b21a8 100%);
        }

        .start-title {
            font-size: clamp(36px, 8vw, 64px);
            color: #fff;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 40px rgba(168, 85, 247, 0.5);
            margin-bottom: 10px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-subtitle {
            font-size: clamp(16px, 4vw, 24px);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border: none;
            border-radius: 50px;
            padding: 18px 60px;
            font-size: clamp(20px, 5vw, 28px);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: btnBounce 1.5s ease-in-out infinite;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        @keyframes btnBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .floating-notes {
            position: absolute;
            font-size: 40px;
            opacity: 0.3;
            animation: floatNote 4s ease-in-out infinite;
        }

        @keyframes floatNote {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 12px 16px;
            display: none;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            font-size: clamp(14px, 3vw, 18px);
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }

        .score-stars {
            color: #fbbf24;
        }

        /* Controls */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 12px 16px 20px;
            display: none;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 10px 18px;
            color: white;
            font-size: clamp(14px, 3vw, 18px);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }

        .ctrl-btn.active {
            background: rgba(168, 85, 247, 0.5);
            border-color: rgba(168, 85, 247, 0.8);
        }

        /* Instrument selector */
        #instrument-bar {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 14px;
        }

        .inst-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .inst-btn.active {
            background: rgba(168, 85, 247, 0.6);
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        .inst-btn:active {
            transform: scale(0.9);
        }

        /* Celebration */
        #celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .celebration-content {
            text-align: center;
            animation: celebPop 0.5s ease-out;
        }

        @keyframes celebPop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .celeb-emoji {
            font-size: 80px;
            margin-bottom: 16px;
        }

        .celeb-text {
            font-size: clamp(24px, 6vw, 36px);
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .celeb-sub {
            font-size: clamp(16px, 4vw, 20px);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 8px;
        }

        .celeb-btn {
            margin-top: 24px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border: none;
            border-radius: 30px;
            padding: 14px 40px;
            font-size: clamp(18px, 4vw, 24px);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        .celeb-btn-secondary {
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 10px 30px;
            font-size: clamp(14px, 3vw, 18px);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* Note hit effect */
        .hit-effect {
            position: fixed;
            z-index: 20;
            font-size: 40px;
            pointer-events: none;
            animation: hitPop 0.8s ease-out forwards;
        }

        @keyframes hitPop {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-60px); opacity: 0; }
        }

        /* Mode indicator */
        #mode-label {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            font-size: clamp(28px, 7vw, 48px);
            color: white;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
            display: none;
            animation: modeFlash 1.5s ease-out forwards;
        }

        @keyframes modeFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Stars container for particle effects */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleFly 1s ease-out forwards;
        }

        @keyframes particleFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(0); opacity: 0; }
        }

        /* Recording indicator */
        #rec-indicator {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: recBlink 0.8s ease-in-out infinite;
        }

        @keyframes recBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== Audio Engine =====
class AudioEngine {
    constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.instrument = 'xylophone';
        this.noteFreqs = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25
        };
        this.noteNames = ['C4','D4','E4','F4','G4','A4','B4','C5'];
    }

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.5;
        this.masterGain.connect(this.ctx.destination);
    }

    playNote(noteIdx, duration = 0.5) {
        if (!this.ctx) this.init();
        const freq = this.noteFreqs[this.noteNames[noteIdx]];
        if (!freq) return;
        const now = this.ctx.currentTime;

        switch (this.instrument) {
            case 'xylophone': this._playXylophone(freq, now, duration); break;
            case 'piano': this._playPiano(freq, now, duration); break;
            case 'drum': this._playDrum(freq, now); break;
            case 'harp': this._playHarp(freq, now, duration); break;
        }
    }

    _playXylophone(freq, now, dur) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.6, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + dur * 1.5);
        osc.connect(gain);
        gain.connect(this.masterGain);
        // Add harmonics for xylophone feel
        const osc2 = this.ctx.createOscillator();
        const gain2 = this.ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 3;
        gain2.gain.setValueAtTime(0.15, now);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + dur);
        osc2.connect(gain2);
        gain2.connect(this.masterGain);
        osc.start(now); osc.stop(now + dur * 1.5);
        osc2.start(now); osc2.stop(now + dur);
    }

    _playPiano(freq, now, dur) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + dur * 2);
        osc.connect(gain);
        gain.connect(this.masterGain);
        const osc2 = this.ctx.createOscillator();
        const gain2 = this.ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2;
        gain2.gain.setValueAtTime(0.2, now);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + dur);
        osc2.connect(gain2);
        gain2.connect(this.masterGain);
        osc.start(now); osc.stop(now + dur * 2);
        osc2.start(now); osc2.stop(now + dur);
    }

    _playDrum(freq, now) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq * 0.5, now);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.1, now + 0.2);
        gain.gain.setValueAtTime(0.8, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain);
        gain.connect(this.masterGain);
        // Click
        const osc2 = this.ctx.createOscillator();
        const gain2 = this.ctx.createGain();
        osc2.type = 'square';
        osc2.frequency.value = freq * 4;
        gain2.gain.setValueAtTime(0.3, now);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc2.connect(gain2);
        gain2.connect(this.masterGain);
        osc.start(now); osc.stop(now + 0.3);
        osc2.start(now); osc2.stop(now + 0.05);
    }

    _playHarp(freq, now, dur) {
        for (let i = 0; i < 3; i++) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq * (1 + i * 0.005);
            gain.gain.setValueAtTime(0.3 / (i + 1), now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + dur * 2);
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start(now + i * 0.01);
            osc.stop(now + dur * 2);
        }
    }

    setInstrument(inst) {
        this.instrument = inst;
    }
}

// ===== Game State =====
const audio = new AudioEngine();
let scene, camera, renderer, controls;
let musicBox, bars = [], barLights = [];
let score = 0;
let mode = 'free'; // free, follow, record
let isRecording = false;
let recordedNotes = [];
let recordStartTime = 0;
let playbackTimeouts = [];
let followSequence = [];
let followIndex = 0;
let followActive = false;
let followHighlights = [];

// Note colors - rainbow
const NOTE_COLORS = [
    0xff4444, // C - Red
    0xff8844, // D - Orange
    0xffcc00, // E - Yellow
    0x44cc44, // F - Green
    0x44aaff, // G - Blue
    0x6644ff, // A - Indigo
    0xcc44ff, // B - Purple
    0xff44aa, // C5 - Pink
];

const NOTE_EMOJIS = ['🔴','🟠','🟡','🟢','🔵','🟣','💜','💗'];

// Melodies for follow mode
const MELODIES = [
    { name: '小星星', notes: [0,0,4,4,5,5,4, 3,3,2,2,1,1,0] },
    { name: '两只老虎', notes: [0,1,2,0, 0,1,2,0, 2,3,4, 2,3,4] },
    { name: '生日快乐', notes: [0,0,1,0,3,2, 0,0,1,0,4,3] },
    { name: '欢乐颂', notes: [2,2,3,4,4,3,2,1,0,0,1,2,2,1,1] },
    { name: '玛丽的小羊', notes: [4,3,2,3,4,4,4, 3,3,3, 4,6,6] },
];

// ===== Three.js Setup =====
function initScene() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x1a0533, 0.015);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 14);
    camera.lookAt(0, 1, 0);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('game-canvas'),
        antialias: true,
        alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // Controls
    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minPolarAngle = Math.PI / 6;
    controls.minDistance = 8;
    controls.maxDistance = 22;
    controls.target.set(0, 1, 0);
    controls.enablePan = false;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x6644aa, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    // Spotlight on the music box
    const spotLight = new THREE.SpotLight(0xff88ff, 1.5, 30, Math.PI / 4, 0.5);
    spotLight.position.set(0, 15, 0);
    spotLight.castShadow = true;
    scene.add(spotLight);

    // Point lights for ambiance
    const colors = [0xff4488, 0x4488ff, 0x44ff88, 0xffaa44];
    colors.forEach((c, i) => {
        const pl = new THREE.PointLight(c, 0.5, 15);
        const angle = (i / 4) * Math.PI * 2;
        pl.position.set(Math.cos(angle) * 8, 3, Math.sin(angle) * 8);
        scene.add(pl);
    });

    // Floor - reflective dark surface
    const floorGeo = new THREE.CircleGeometry(20, 64);
    const floorMat = new THREE.MeshStandardMaterial({
        color: 0x110022,
        roughness: 0.3,
        metalness: 0.8,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Decorative ring on floor
    const ringGeo = new THREE.RingGeometry(5.5, 6, 64);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x8844cc,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.01;
    scene.add(ring);

    createMusicBox();
    createStarfield();

    window.addEventListener('resize', onResize);
}

function createMusicBox() {
    musicBox = new THREE.Group();

    // Box base - elegant rounded platform
    const baseGeo = new THREE.CylinderGeometry(5, 5.5, 0.6, 64);
    const baseMat = new THREE.MeshStandardMaterial({
        color: 0x3d1a6e,
        roughness: 0.2,
        metalness: 0.9,
    });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = 0.3;
    base.castShadow = true;
    base.receiveShadow = true;
    musicBox.add(base);

    // Gold trim ring
    const trimGeo = new THREE.TorusGeometry(5.25, 0.1, 16, 64);
    const trimMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        roughness: 0.1,
        metalness: 1.0,
    });
    const trim = new THREE.Mesh(trimGeo, trimMat);
    trim.rotation.x = Math.PI / 2;
    trim.position.y = 0.6;
    musicBox.add(trim);

    // Central pedestal
    const pedGeo = new THREE.CylinderGeometry(0.8, 1.2, 1.5, 32);
    const pedMat = new THREE.MeshStandardMaterial({
        color: 0x5522aa,
        roughness: 0.3,
        metalness: 0.7,
    });
    const pedestal = new THREE.Mesh(pedGeo, pedMat);
    pedestal.position.y = 1.5;
    pedestal.castShadow = true;
    musicBox.add(pedestal);

    // Spinning star on top
    const starGeo = new THREE.OctahedronGeometry(0.5, 0);
    const starMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        roughness: 0.1,
        metalness: 1.0,
        emissive: 0xffa500,
        emissiveIntensity: 0.3,
    });
    const topStar = new THREE.Mesh(starGeo, starMat);
    topStar.position.y = 2.8;
    topStar.userData.isTopStar = true;
    musicBox.add(topStar);

    // Create the 8 note bars arranged in a circle
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
        const radius = 3.5;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;

        // Bar - cylindrical pillar with rounded top
        const barGroup = new THREE.Group();
        barGroup.position.set(x, 0.6, z);
        barGroup.userData = { noteIndex: i, originalY: 0.6, isAnimating: false };

        // Base cylinder
        const barGeo = new THREE.CylinderGeometry(0.45, 0.5, 1.2, 32);
        const barMat = new THREE.MeshStandardMaterial({
            color: NOTE_COLORS[i],
            roughness: 0.3,
            metalness: 0.6,
            emissive: NOTE_COLORS[i],
            emissiveIntensity: 0.15,
        });
        const bar = new THREE.Mesh(barGeo, barMat);
        bar.position.y = 0.6;
        bar.castShadow = true;
        barGroup.add(bar);

        // Top sphere
        const topGeo = new THREE.SphereGeometry(0.35, 32, 32);
        const topMat = new THREE.MeshStandardMaterial({
            color: NOTE_COLORS[i],
            roughness: 0.2,
            metalness: 0.8,
            emissive: NOTE_COLORS[i],
            emissiveIntensity: 0.2,
        });
        const topSphere = new THREE.Mesh(topGeo, topMat);
        topSphere.position.y = 1.45;
        topSphere.castShadow = true;
        barGroup.add(topSphere);

        // Point light
        const light = new THREE.PointLight(NOTE_COLORS[i], 0.4, 4);
        light.position.y = 1.5;
        barGroup.add(light);
        barLights.push(light);

        // Note label using small ring
        const labelRing = new THREE.TorusGeometry(0.15, 0.03, 8, 16);
        const labelMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.6
        });
        const label = new THREE.Mesh(labelRing, labelMat);
        label.position.y = 2.0;
        label.rotation.x = Math.PI / 2;
        barGroup.add(label);

        musicBox.add(barGroup);
        bars.push(barGroup);
    }

    scene.add(musicBox);
}

function createStarfield() {
    const starCount = 200;
    const positions = new Float32Array(starCount * 3);
    const sizes = new Float32Array(starCount);

    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.4;
        const r = 20 + Math.random() * 30;
        positions[i * 3] = Math.cos(theta) * Math.sin(phi) * r;
        positions[i * 3 + 1] = Math.cos(phi) * r + 5;
        positions[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * r;
        sizes[i] = 0.5 + Math.random() * 1.5;
    }

    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.3,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true,
    });

    const stars = new THREE.Points(starGeo, starMat);
    stars.userData.isStarfield = true;
    scene.add(stars);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ===== Raycaster for touch/click =====
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function onPointerDown(event) {
    event.preventDefault();
    const x = event.clientX || (event.touches && event.touches[0].clientX);
    const y = event.clientY || (event.touches && event.touches[0].clientY);
    if (x === undefined) return;

    pointer.x = (x / window.innerWidth) * 2 - 1;
    pointer.y = -(y / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(pointer, camera);

    // Check each bar group's children
    for (const bar of bars) {
        const intersects = raycaster.intersectObjects(bar.children, true);
        if (intersects.length > 0) {
            hitBar(bar.userData.noteIndex);
            break;
        }
    }
}

function hitBar(noteIdx) {
    if (noteIdx < 0 || noteIdx >= 8) return;

    // Play sound
    audio.playNote(noteIdx);

    // Visual feedback - animate bar
    const bar = bars[noteIdx];
    if (!bar.userData.isAnimating) {
        bar.userData.isAnimating = true;
        const origY = bar.userData.originalY;
        bar.position.y = origY + 0.3;

        // Increase glow
        barLights[noteIdx].intensity = 2;

        // Emissive boost on children
        bar.children.forEach(child => {
            if (child.material && child.material.emissiveIntensity !== undefined) {
                child.material.emissiveIntensity = 0.8;
            }
        });

        setTimeout(() => {
            bar.position.y = origY;
            barLights[noteIdx].intensity = 0.4;
            bar.children.forEach(child => {
                if (child.material && child.material.emissiveIntensity !== undefined) {
                    child.material.emissiveIntensity = 0.2;
                }
            });
            bar.userData.isAnimating = false;
        }, 300);
    }

    // Spawn particles
    spawnParticles(noteIdx);

    // Score
    score++;
    document.getElementById('score').textContent = score;

    // Recording
    if (isRecording) {
        const elapsed = Date.now() - recordStartTime;
        recordedNotes.push({ note: noteIdx, time: elapsed });
    }

    // Follow mode check
    if (mode === 'follow' && followActive) {
        checkFollowNote(noteIdx);
    }

    // Check celebration milestones
    if (score === 20 || score === 50 || score === 100) {
        showCelebration();
    }
}

function spawnParticles(noteIdx) {
    const container = document.getElementById('particles');
    const bar = bars[noteIdx];
    const pos = new THREE.Vector3();
    bar.getWorldPosition(pos);
    pos.y += 1.5;

    // Project to screen
    const screenPos = pos.clone().project(camera);
    const sx = (screenPos.x + 1) / 2 * window.innerWidth;
    const sy = (-screenPos.y + 1) / 2 * window.innerHeight;

    const emojis = ['✨','⭐','🎵','🎶','💫','🌟','✧'];
    for (let i = 0; i < 5; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (sx + (Math.random() - 0.5) * 60) + 'px';
        el.style.top = (sy + (Math.random() - 0.5) * 30) + 'px';
        el.style.fontSize = (16 + Math.random() * 20) + 'px';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
}

// ===== Follow Mode =====
function startFollowMode() {
    mode = 'follow';
    document.getElementById('hud-mode').textContent = '👀 跟我学';
    showModeLabel('👀 跟我学模式');

    const melody = MELODIES[Math.floor(Math.random() * MELODIES.length)];
    followSequence = melody.notes;
    followIndex = 0;
    followActive = true;

    // Play the melody once first
    playMelodySequence(followSequence, 0, () => {
        // Brief pause then start follow mode
        showModeLabel('👉 轮到你啦！');
        setTimeout(() => {
            highlightNext();
        }, 1500);
    });
}

function playMelodySequence(seq, idx, callback) {
    if (idx >= seq.length) {
        if (callback) callback();
        return;
    }

    const noteIdx = seq[idx];
    audio.playNote(noteIdx, 0.4);

    // Visual highlight
    const bar = bars[noteIdx];
    bar.children.forEach(child => {
        if (child.material && child.material.emissiveIntensity !== undefined) {
            child.material.emissiveIntensity = 1.0;
        }
    });
    barLights[noteIdx].intensity = 3;

    setTimeout(() => {
        bar.children.forEach(child => {
            if (child.material && child.material.emissiveIntensity !== undefined) {
                child.material.emissiveIntensity = 0.2;
            }
        });
        barLights[noteIdx].intensity = 0.4;
        playMelodySequence(seq, idx + 1, callback);
    }, 450);
}

function highlightNext() {
    if (!followActive || followIndex >= followSequence.length) {
        followActive = false;
        if (followIndex >= followSequence.length) {
            // Completed melody!
            showCelebration('🎵 旋律完成！太棒了！');
        }
        return;
    }

    const noteIdx = followSequence[followIndex];
    const bar = bars[noteIdx];

    // Pulse highlight
    barLights[noteIdx].intensity = 1.5;
    bar.children.forEach(child => {
        if (child.material && child.material.emissiveIntensity !== undefined) {
            child.material.emissiveIntensity = 0.5;
        }
    });

    followHighlights.push({ noteIdx, timeout: setTimeout(() => {
        barLights[noteIdx].intensity = 0.4;
        bar.children.forEach(child => {
            if (child.material && child.material.emissiveIntensity !== undefined) {
                child.material.emissiveIntensity = 0.2;
            }
        });
    }, 1000) });
}

function checkFollowNote(noteIdx) {
    if (!followActive) return;

    const expected = followSequence[followIndex];
    if (noteIdx === expected) {
        // Correct!
        followIndex++;
        // Clear old highlights
        followHighlights.forEach(h => clearTimeout(h.timeout));
        followHighlights = [];
        // Reset all lights
        barLights.forEach(l => l.intensity = 0.4);
        bars.forEach(b => b.children.forEach(c => {
            if (c.material && c.material.emissiveIntensity !== undefined) {
                c.material.emissiveIntensity = 0.2;
            }
        }));

        if (followIndex >= followSequence.length) {
            followActive = false;
            showCelebration('🎵 旋律完成！你真厉害！');
        } else {
            highlightNext();
        }
    } else {
        // Wrong note - gentle shake feedback
        const bar = bars[noteIdx];
        const origX = bar.position.x;
        bar.position.x = origX + 0.2;
        setTimeout(() => { bar.position.x = origX - 0.2; }, 100);
        setTimeout(() => { bar.position.x = origX; }, 200);
    }
}

// ===== Record & Playback =====
function toggleRecord() {
    if (isRecording) {
        // Stop recording
        isRecording = false;
        document.getElementById('rec-indicator').style.display = 'none';
        document.getElementById('btn-record').classList.remove('active');
        if (recordedNotes.length > 0) {
            showModeLabel('⏺️ 录制完成！');
        }
    } else {
        // Start recording
        isRecording = true;
        recordedNotes = [];
        recordStartTime = Date.now();
        document.getElementById('rec-indicator').style.display = 'flex';
        document.getElementById('btn-record').classList.add('active');
        showModeLabel('⏺️ 开始录制');
    }
}

function playback() {
    if (recordedNotes.length === 0) {
        showModeLabel('❌ 还没有录制');
        return;
    }

    showModeLabel('▶️ 回放中...');

    // Clear previous playback
    playbackTimeouts.forEach(t => clearTimeout(t));
    playbackTimeouts = [];

    recordedNotes.forEach((noteData, i) => {
        const t = setTimeout(() => {
            hitBar(noteData.note);
        }, noteData.time);
        playbackTimeouts.push(t);
    });

    // End playback
    const lastTime = recordedNotes[recordedNotes.length - 1].time;
    playbackTimeouts.push(setTimeout(() => {
        showModeLabel('✅ 回放完成');
    }, lastTime + 500));
}

// ===== UI Helpers =====
function showModeLabel(text) {
    const el = document.getElementById('mode-label');
    el.textContent = text;
    el.style.display = 'block';
    el.style.animation = 'none';
    el.offsetHeight; // trigger reflow
    el.style.animation = 'modeFlash 1.5s ease-out forwards';
    setTimeout(() => { el.style.display = 'none'; }, 1500);
}

function showCelebration(text) {
    const celeb = document.getElementById('celebration');
    const sub = document.getElementById('celeb-sub');
    sub.textContent = text || (score >= 100 ? '百分音乐大师！' : score >= 50 ? '半个百啦！继续加油！' : '你是个小音乐家！');
    celeb.style.display = 'flex';

    // Burst particles
    const container = document.getElementById('particles');
    const emojis = ['🎉','🎊','⭐','🌟','✨','🎵','🎶','💫'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (Math.random() * window.innerWidth) + 'px';
        el.style.top = (Math.random() * window.innerHeight * 0.6) + 'px';
        el.style.fontSize = (20 + Math.random() * 30) + 'px';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
}

// ===== Animation Loop =====
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    controls.update();

    // Rotate music box slowly
    if (musicBox) {
        musicBox.rotation.y += 0.002;

        // Animate top star
        musicBox.children.forEach(child => {
            if (child.userData && child.userData.isTopStar) {
                child.rotation.y += 0.03;
                child.rotation.x = Math.sin(time * 2) * 0.2;
                child.position.y = 2.8 + Math.sin(time * 3) * 0.15;
            }
        });
    }

    // Gentle bar float animation
    bars.forEach((bar, i) => {
        if (!bar.userData.isAnimating) {
            bar.position.y = bar.userData.originalY + Math.sin(time * 2 + i * 0.5) * 0.03;
        }
    });

    // Animate starfield
    scene.children.forEach(child => {
        if (child.userData && child.userData.isStarfield) {
            child.rotation.y += 0.0003;
        }
    });

    renderer.render(scene, camera);
}

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('controls').style.display = 'block';
    document.getElementById('instrument-bar').style.display = 'flex';

}
