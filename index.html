<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝游戏大厅 - Baby Games Lobby</title>
    <link rel="stylesheet" href="css/lobby.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">🎮 宝宝游戏大厅</h1>
            <p class="subtitle">选择一个游戏开始玩耍吧！</p>
        </header>

        <div class="games-grid">
            <!-- 游戏1: 颜色配对 -->
            <div class="game-card" onclick="location.href='games/color-match/'">
                <div class="game-icon">🎨</div>
                <h2 class="game-title">颜色配对</h2>
                <p class="game-description">认识颜色，配对相同颜色的物品</p>
                <div class="game-tags">
                    <span class="tag">认知</span>
                    <span class="tag">3-5岁</span>
                </div>
            </div>

            <!-- 更多游戏占位 -->
            <div class="game-card coming-soon">
                <div class="game-icon">🔷</div>
                <h2 class="game-title">形状分类</h2>
                <p class="game-description">即将推出...</p>
            </div>

            <div class="game-card coming-soon">
                <div class="game-icon">🔢</div>
                <h2 class="game-title">数字乐园</h2>
                <p class="game-description">即将推出...</p>
            </div>

            <div class="game-card coming-soon">
                <div class="game-icon">🧩</div>
                <h2 class="game-title">拼图游戏</h2>
                <p class="game-description">即将推出...</p>
            </div>
        </div>

        <footer class="footer">
            <p>💡 家长提示：请陪伴孩子一起游戏，享受亲子时光</p>
        </footer>
    </div>

    <script>
        // 添加卡片悬停动画效果
        document.querySelectorAll('.game-card:not(.coming-soon)').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'scale(1.05) translateY(-10px)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'scale(1) translateY(0)';
            });
        });
    </script>
</body>
</html>
