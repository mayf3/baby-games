<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宝宝游戏乐园 - Baby Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-1: #ffecd2;
            --bg-2: #fcb69f;
            --purple: #764ba2;
            --pink: #ff6b9d;
            --blue: #4ecdc4;
            --yellow: #ffe66d;
            --green: #55efc4;
            --orange: #ffa502;
            --cognitive: #ffeaa7;
            --cognitive-t: #d63031;
            --logic: #74b9ff;
            --logic-t: #0984e3;
            --creative: #fab1a0;
            --creative-t: #e17055;
            --motor: #55efc4;
            --motor-t: #00b894;
            --social: #a29bfe;
            --social-t: #6c5ce7;
        }

        body {
            font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, #ff9a9e 100%);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        /* 浮动装饰 */
        .floating-decor {
            position: fixed;
            font-size: 30px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: floatAround 20s infinite ease-in-out;
        }
        @keyframes floatAround {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(10deg); }
            50% { transform: translateY(10px) rotate(-5deg); }
            75% { transform: translateY(-20px) rotate(8deg); }
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 25px 0 15px;
        }

        .logo-area {
            display: inline-block;
            position: relative;
        }

        h1 {
            font-size: 40px;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.15);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .filter-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }

        .filter-btn.active {
            background: white;
            color: #e17055;
            border-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .game-card {
            background: white;
            border-radius: 24px;
            padding: 20px 15px 18px;
            text-align: center;
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(25px);
            animation: cardIn 0.45s ease forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .game-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* NEW 标签 */
        .badge-new {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 1px;
            animation: badgePulse 2s infinite;
        }
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-emoji {
            font-size: 64px;
            margin-bottom: 10px;
            display: block;
            transition: transform 0.3s ease;
        }

        .game-card:hover .game-emoji { transform: scale(1.15) rotate(-5deg); }

        .game-title {
            font-size: 18px;
            color: #2d3436;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .game-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.4;
        }

        .tag-cognitive { background: var(--cognitive); color: var(--cognitive-t); }
        .tag-logic { background: var(--logic); color: var(--logic-t); }
        .tag-creative { background: var(--creative); color: var(--creative-t); }
        .tag-motor { background: var(--motor); color: var(--motor-t); }
        .tag-social-emotional { background: var(--social); color: var(--social-t); }
        .tag-3d {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
        }
        .tag-age { background: #dfe6e9; color: #636e72; }
        .tag-easy { background: #dfe6e9; color: #636e72; }
        .tag-medium { background: #ffeaa7; color: #d63031; }

        .game-description {
            color: #888;
            font-size: 13px;
            line-height: 1.5;
            margin-top: 4px;
        }

        /* 分区标题 */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 25px 0 15px;
            padding: 0 5px;
        }
        .section-divider .line {
            flex: 1;
            height: 2px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .section-divider .label {
            color: white;
            font-size: 16px;
            font-weight: 800;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        /* 加载 */
        .loading {
            text-align: center;
            color: white;
            padding: 50px 20px;
            font-size: 18px;
        }
        .loading .spinner {
            display: inline-block;
            width: 45px; height: 45px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.85);
            padding: 20px 0 30px;
            font-size: 14px;
        }
        footer .tip {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: inline-block;
            max-width: 500px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 30px; }
            .subtitle { font-size: 14px; }
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .game-emoji { font-size: 48px; }
            .game-title { font-size: 15px; }
            .game-description { font-size: 11px; }
            .game-card { padding: 15px 10px 14px; border-radius: 18px; }
            .filter-bar { gap: 5px; }
            .filter-btn { padding: 6px 13px; font-size: 12px; }
            .stat-chip { font-size: 13px; padding: 6px 14px; }
            .badge-new { font-size: 9px; padding: 2px 8px; }
        }

        @media (max-width: 360px) {
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 浮动装饰 -->
    <div class="floating-decor" style="top:5%;left:5%;animation-delay:0s">🎈</div>
    <div class="floating-decor" style="top:15%;right:8%;animation-delay:3s">⭐</div>
    <div class="floating-decor" style="top:40%;left:3%;animation-delay:6s">🌈</div>
    <div class="floating-decor" style="top:60%;right:5%;animation-delay:9s">🦋</div>
    <div class="floating-decor" style="top:80%;left:8%;animation-delay:12s">🎪</div>
    <div class="floating-decor" style="top:25%;left:50%;animation-delay:15s">🌟</div>
    <div class="floating-decor" style="top:70%;right:15%;animation-delay:4s">🎵</div>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>🎮 宝宝游戏乐园</h1>
                <p class="subtitle">适合 2-6 岁宝贝的益智小游戏</p>
            </div>
            <div class="stats-bar">
                <div class="stat-chip">🎯 <strong id="game-count">...</strong> 个游戏</div>
                <div class="stat-chip">🌈 <strong id="type-count">...</strong> 种类型</div>
                <div class="stat-chip">🧊 <strong id="3d-count">...</strong> 个 3D</div>
            </div>
        </header>

        <nav class="filter-bar" id="filter-bar"></nav>

        <main id="games-container"></main>

        <footer>
            <div class="tip">
                💝 每天一个新游戏，陪伴宝宝快乐成长！<br>
                <span style="font-size:12px;opacity:0.8">💡 小贴士：建议家长陪同玩耍，每次不超过 20 分钟哦～</span>
            </div>
        </footer>
    </div>

    <script>
    (async function() {
        try {
            const resp = await fetch('games.json');
            if (!resp.ok) throw new Error('Failed to load games.json');
            const games = await resp.json();

            // Stats
            const types = [...new Set(games.map(g => g.typeLabel))];
            const threeDCount = games.filter(g => g.dimension === '3D').length;
            document.getElementById('game-count').textContent = games.length;
            document.getElementById('type-count').textContent = types.length;
            document.getElementById('3d-count').textContent = threeDCount;

            // NEW badge logic: games from last 7 days
            const now = Date.now();
            const NEW_MS = 7 * 24 * 60 * 60 * 1000;

            // Filter buttons
            const filterBar = document.getElementById('filter-bar');
            const allBtn = mkBtn('🎯 全部', 'all', true);
            filterBar.appendChild(allBtn);
            types.forEach(label => {
                const t = games.find(g => g.typeLabel === label);
                filterBar.appendChild(mkBtn(label, t.type, false));
            });
            // Add 3D filter if we have 3D games
            if (threeDCount > 0) {
                filterBar.appendChild(mkBtn('🧊 3D专区', 'dimension-3d', false));
            }

            // Render
            renderGames(games);

            // Filter click
            filterBar.addEventListener('click', function(e) {
                if (!e.target.classList.contains('filter-btn')) return;
                filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const f = e.target.dataset.filter;
                let filtered;
                if (f === 'all') filtered = games;
                else if (f === 'dimension-3d') filtered = games.filter(g => g.dimension === '3D');
                else filtered = games.filter(g => g.type === f);
                renderGames(filtered);
            });

            function mkBtn(label, filter, active) {
                const b = document.createElement('button');
                b.className = 'filter-btn' + (active ? ' active' : '');
                b.textContent = label;
                b.dataset.filter = filter;
                return b;
            }

            function renderGames(list) {
                const container = document.getElementById('games-container');

                // Separate 3D and 2D
                const games3d = list.filter(g => g.dimension === '3D');
                const games2d = list.filter(g => g.dimension !== '3D');

                let html = '';

                // 3D section
                if (games3d.length > 0) {
                    html += '<div class="section-divider"><div class="line"></div><span class="label">🧊 3D 立体世界</span><div class="line"></div></div>';
                    html += '<div class="games-grid">' + games3d.map((g,i) => cardHTML(g, i)).join('') + '</div>';
                }

                // 2D section
                if (games2d.length > 0) {
                    html += '<div class="section-divider"><div class="line"></div><span class="label">🎨 2D 游戏乐园</span><div class="line"></div></div>';
                    html += '<div class="games-grid">' + games2d.map((g,i) => cardHTML(g, i + games3d.length)).join('') + '</div>';
                }

                if (list.length === 0) {
                    html = '<div class="loading"><p>👀 没有找到游戏，换个分类试试吧！</p></div>';
                }

                container.innerHTML = html;
            }

            function cardHTML(game, idx) {
                const isNew = game.addedDate && (now - new Date(game.addedDate).getTime()) < NEW_MS;
                return `<a href="${game.path}" class="game-card" style="animation-delay:${idx * 0.06}s">
                    ${isNew ? '<span class="badge-new">NEW</span>' : ''}
                    <span class="game-emoji">${game.emoji}</span>
                    <div class="game-title">${game.title}</div>
                    <div class="game-meta">
                        <span class="game-tag tag-${game.type}">${game.typeLabel}</span>
                        ${game.dimension === '3D' ? '<span class="game-tag tag-3d">🧊 3D</span>' : ''}
                        <span class="game-tag tag-age">${game.age}</span>
                        <span class="game-tag tag-${diffClass(game.difficulty)}">${game.difficulty}</span>
                    </div>
                    <p class="game-description">${game.description}</p>
                </a>`;
            }

            function diffClass(d) {
                if (d === '简单') return 'easy';
                if (d === '中等') return 'medium';
                return 'easy';
            }

        } catch(err) {
            document.getElementById('games-container').innerHTML =
                '<div class="loading"><p>😵 加载失败，请刷新重试</p></div>';
            console.error(err);
        }
    })();
    </script>
</body>
</html>
