<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝游戏乐园 - Baby Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.9;
        }

        .stats {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px 30px;
            display: inline-block;
            margin-top: 20px;
            backdrop-filter: blur(10px);
        }

        .stats span {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .filter-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.4s ease forwards;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-emoji {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .game-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        .game-age {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            background: #dfe6e9;
            color: #636e72;
        }

        .game-difficulty {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        .difficulty-easy { background: #dfe6e9; color: #636e72; }
        .difficulty-medium { background: #ffeaa7; color: #d63031; }
        .difficulty-hard { background: #fab1a0; color: #e17055; }

        .type-cognitive { background: #ffeaa7; color: #d63031; }
        .type-logic { background: #74b9ff; color: #0984e3; }
        .type-creative { background: #fab1a0; color: #e17055; }
        .type-motor { background: #55efc4; color: #00b894; }
        .type-social { background: #a29bfe; color: #6c5ce7; }

        .badge-3d {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
        }

        .game-description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 18px;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            padding: 20px 0;
        }

        @media (max-width: 600px) {
            h1 { font-size: 28px; }
            .games-grid { grid-template-columns: 1fr; }
            .game-emoji { font-size: 60px; }
            .game-title { font-size: 20px; }
            .filter-bar { gap: 6px; }
            .filter-btn { padding: 6px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 宝宝游戏乐园</h1>
            <p class="subtitle">适合 2-6 岁儿童的益智游戏</p>
            <div class="stats">
                <span>🎯 游戏: <strong id="game-count">...</strong> 个</span>
            </div>
        </header>

        <nav class="filter-bar" id="filter-bar">
            <!-- 筛选按钮由 JS 动态生成 -->
        </nav>

        <main class="games-grid" id="games-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载游戏中...</p>
            </div>
        </main>

        <footer>
            <p>💝 每天一个新游戏，陪伴宝宝快乐成长</p>
        </footer>
    </div>

    <script>
        (async function() {
            try {
                // 加载游戏数据
                const response = await fetch('games.json');
                if (!response.ok) throw new Error('加载 games.json 失败');
                const games = await response.json();

                // 更新游戏数量
                document.getElementById('game-count').textContent = games.length;

                // 生成筛选按钮
                const types = [...new Set(games.map(g => g.typeLabel))];
                const typeMap = {};
                games.forEach(g => { typeMap[g.typeLabel] = g.type; });

                const filterBar = document.getElementById('filter-bar');
                const allBtn = createFilterBtn('全部', 'all', true);
                filterBar.appendChild(allBtn);
                types.forEach(label => {
                    filterBar.appendChild(createFilterBtn(label, typeMap[label], false));
                });

                // 渲染游戏卡片
                renderGames(games);

                // 筛选逻辑
                filterBar.addEventListener('click', function(e) {
                    if (!e.target.classList.contains('filter-btn')) return;
                    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const filter = e.target.dataset.filter;
                    renderGames(filter === 'all' ? games : games.filter(g => g.type === filter));
                });

            } catch (err) {
                document.getElementById('games-grid').innerHTML =
                    '<div class="loading"><p>😵 加载失败，请刷新重试</p></div>';
                console.error(err);
            }

            function createFilterBtn(label, filter, active) {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (active ? ' active' : '');
                btn.textContent = label;
                btn.dataset.filter = filter;
                return btn;
            }

            function renderGames(list) {
                const grid = document.getElementById('games-grid');
                grid.innerHTML = list.map((game, i) => `
                    <a href="${game.path}" class="game-card" style="animation-delay: ${i * 0.08}s">
                        <div class="game-emoji">${game.emoji}</div>
                        <div class="game-title">${game.title}</div>
                        <div class="game-meta">
                            <span class="game-type type-${game.type}">${game.typeLabel}</span>
                            ${game.dimension === '3D' ? '<span class="badge-3d">🎮 3D</span>' : ''}
                            <span class="game-age">👶 ${game.age}</span>
                            <span class="game-difficulty difficulty-${difficultyClass(game.difficulty)}">${game.difficulty}</span>
                        </div>
                        <p class="game-description">${game.description}</p>
                    </a>
                `).join('');
            }

            function difficultyClass(d) {
                if (d === '简单') return 'easy';
                if (d === '中等') return 'medium';
                return 'hard';
            }
        })();
    </script>
</body>
</html>
